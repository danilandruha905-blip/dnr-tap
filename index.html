<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Donald Elite Tap v4.0</title>
    <style>
        :root { --gold: #FFD700; --neon: #00f2ff; --glass: rgba(255, 255, 255, 0.1); }
        body { 
            background: #000; color: white; font-family: 'Arial Rounded MT Bold', sans-serif; 
            margin: 0; height: 100vh; overflow: hidden; display: flex; flex-direction: column; align-items: center;
        }

        /* КРАСИВЫЙ ФОН */
        #bg {
            position: fixed; inset: 0; z-index: -1;
            background: radial-gradient(circle at 50% 30%, #0a1f35 0%, #000 100%);
        }
        canvas { position: absolute; inset: 0; pointer-events: none; }

        /* ИНТЕРФЕЙС */
        header { padding: 40px 0 10px; text-align: center; z-index: 10; }
        #balance { font-size: 60px; font-weight: 900; color: var(--gold); text-shadow: 0 0 30px rgba(255,215,0,0.5); }
        .stat { font-size: 14px; opacity: 0.6; letter-spacing: 1px; }

        /* ЦЕНТРАЛЬНАЯ КНОПКА (ДОНАЛЬД) */
        #game-area {
            position: relative; flex: 1; display: flex; align-items: center; justify-content: center;
            width: 100%; cursor: pointer;
        }
        #donald-svg {
            width: 280px; height: 280px; transition: transform 0.05s cubic-bezier(0.1, 0.8, 0.3, 1);
            filter: drop-shadow(0 0 20px rgba(255,215,0,0.2));
        }
        #game-area:active #donald-svg { transform: scale(0.9) translateY(10px); }

        /* НИЖНЕЕ МЕНЮ */
        nav {
            position: fixed; bottom: 25px; width: 92%; height: 80px;
            background: rgba(20, 20, 20, 0.8); backdrop-filter: blur(20px);
            border-radius: 25px; border: 1px solid rgba(255,255,255,0.1);
            display: flex; justify-content: space-around; align-items: center; z-index: 1000;
        }
        .nav-btn { text-align: center; opacity: 0.5; transition: 0.3s; flex: 1; color: white; font-size: 11px; }
        .nav-btn.active { opacity: 1; color: var(--gold); transform: translateY(-5px); }
        .nav-btn span { font-size: 24px; display: block; margin-bottom: 4px; }

        /* МОДАЛКИ (ОКНА) */
        .modal {
            display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95);
            z-index: 2000; padding: 30px 20px; overflow-y: auto;
        }
        .card {
            background: var(--glass); border-radius: 20px; padding: 15px;
            margin-bottom: 12px; display: flex; align-items: center; justify-content: space-between;
            border: 1px solid rgba(255,255,255,0.05);
        }
        .btn-buy { background: var(--gold); border: none; padding: 12px 15px; border-radius: 12px; font-weight: bold; min-width: 90px; }
        
        /* ЭФФЕКТ КЛИКА */
        .particle {
            position: absolute; pointer-events: none; color: gold; font-weight: 900;
            animation: fly 0.6s ease-out forwards; font-size: 24px; z-index: 100;
        }
        @keyframes fly { 0% { opacity: 1; transform: translateY(0); } 100% { opacity: 0; transform: translateY(-120px); } }
    </style>
</head>
<body>

<div id="bg"><canvas id="rain"></canvas></div>

<header>
    <div id="balance">💰 <span id="val">0</span></div>
    <div class="stat">ДОХОД: +<span id="ps">0</span>/СЕК | КЛИК: +<span id="p_tap">1</span></div>
</header>

<div id="game-area" onclick="handleTap(event)">
    <svg id="donald-svg" viewBox="0 0 200 200">
        <defs>
            <radialGradient id="grad" cx="50%" cy="50%" r="50%">
                <stop offset="0%" style="stop-color:#fff" />
                <stop offset="100%" style="stop-color:#eee" />
            </radialGradient>
        </defs>
        <g id="main-skin">
            <ellipse cx="100" cy="140" rx="45" ry="50" fill="url(#grad)" stroke="#333" stroke-width="2"/>
            <circle cx="100" cy="80" r="35" fill="url(#grad)" stroke="#333" stroke-width="2"/>
            <circle cx="88" cy="75" r="4" fill="#000"/>
            <circle cx="112" cy="75" r="4" fill="#000"/>
            <path d="M75 95 Q100 120 125 95 Z" fill="#FF9800" stroke="#000"/>
            <path d="M85 55 L115 55 L100 40 Z" fill="#0066FF"/>
        </g>
    </svg>
</div>

<nav>
    <div class="nav-btn active" onclick="toggleView('main', this)"><span>🏡</span>Главная</div>
    <div class="nav-btn" onclick="toggleView('shop', this)"><span>🚀</span>Магазин</div>
    <div class="nav-btn" onclick="toggleView('skins', this)"><span>👕</span>Скины</div>
    <div class="nav-btn" onclick="toggleView('cases', this)"><span>🎰</span>Кейсы</div>
</nav>

<div id="shop" class="modal">
    <h1 style="color:var(--gold)">УЛУЧШЕНИЯ</h1>
    <div class="card">
        <div><b>Золотое зерно</b><br><small>+2 к клику</small></div>
        <button class="btn-buy" onclick="buy(1)">💰 <span id="c1">100</span></button>
    </div>
    <div class="card">
        <div><b>Авто-ферма</b><br><small>+10/сек</small></div>
        <button class="btn-buy" onclick="buy(2)">💰 <span id="c2">500</span></button>
    </div>
    <button onclick="toggleView('main')" style="width:100%; background:none; color:#555; border:none; padding:20px;">ЗАКРЫТЬ</button>
</div>

<div id="skins" class="modal">
    <h1 style="color:var(--gold)">ТВОЙ ГАРДЕРОБ</h1>
    <div id="skin-list"></div>
    <button onclick="toggleView('main')" style="width:100%; background:none; color:#555; border:none; padding:20px;">ЗАКРЫТЬ</button>
</div>

<div id="cases" class="modal">
    <h1 style="color:var(--gold)">КЕЙСЫ</h1>
    <div class="card">
        <div><b>Элитный кейс</b><br><small>Шанс на Fire Skin</small></div>
        <button class="btn-buy" onclick="openCase()">💰 2000</button>
    </div>
    <div id="drop-res" style="text-align:center; font-size:20px; margin-top:20px;"></div>
    <button onclick="toggleView('main')" style="width:100%; background:none; color:#555; border:none; padding:20px;">ЗАКРЫТЬ</button>
</div>

<script>
    let g = JSON.parse(localStorage.getItem('d_save')) || {
        score: 0, tap: 1, auto: 0, 
        c1: 100, c2: 500,
        owned: [0], current: 0
    };

    const skins = [
        { name: "Classic", color: "#fff", hue: 0 },
        { name: "Neon", color: "#00f2ff", hue: 180 },
        { name: "Gold", color: "#ffd700", hue: 50 },
        { name: "Fire", color: "#ff4400", hue: 340 }
    ];

    function save() { localStorage.setItem('d_save', JSON.stringify(g)); }

    function update() {
        document.getElementById('val').innerText = Math.floor(g.score);
        document.getElementById('ps').innerText = g.auto;
        document.getElementById('p_tap').innerText = g.tap;
        document.getElementById('c1').innerText = g.c1;
        document.getElementById('c2').innerText = g.c2;
        
        const svg = document.getElementById('main-skin');
        svg.style.filter = `hue-rotate(${skins[g.current].hue}deg) drop-shadow(0 0 10px ${skins[g.current].color})`;
        renderSkins();
        save();
    }

    function handleTap(e) {
        g.score += g.tap;
        update();
        const p = document.createElement('div');
        p.className = 'particle'; p.innerText = '+' + g.tap;
        p.style.left = e.clientX + 'px'; p.style.top = e.clientY + 'px';
        document.body.appendChild(p);
        setTimeout(() => p.remove(), 600);
    }

    function buy(type) {
        if (type === 1 && g.score >= g.c1) {
            g.score -= g.c1; g.tap += 2; g.c1 = Math.round(g.c1 * 2.5);
        } else if (type === 2 && g.score >= g.c2) {
            g.score -= g.c2; g.auto += 10; g.c2 = Math.round(g.c2 * 2.5);
        }
        update();
    }

    function renderSkins() {
        const list = document.getElementById('skin-list');
        list.innerHTML = '';
        skins.forEach((s, i) => {
            const isOwned = g.owned.includes(i);
            list.innerHTML += `
                <div class="card">
                    <div style="color:${s.color}"><b>${s.name} Donald</b></div>
                    <button class="btn-buy" onclick="${isOwned ? `setSkin(${i})` : `buySkin(${i})`}" 
                    style="background:${isOwned ? (g.current === i ? '#555' : '#2ecc71') : '#ffd700'}">
                    ${isOwned ? (g.current === i ? 'ВЫБРАНО' : 'ОДЕТЬ') : '💰 5000'}
                    </button>
                </div>`;
        });
    }

    function setSkin(i) { g.current = i; update(); }
    
    function buySkin(i) {
        if(g.score >= 5000) { g.score -= 5000; g.owned.push(i); update(); }
    }

    function openCase() {
        if(g.score >= 2000) {
            g.score -= 2000;
            const res = Math.random();
            let drop = 1;
            if(res > 0.9) drop = 3; else if(res > 0.6) drop = 2;
            if(!g.owned.includes(drop)) g.owned.push(drop);
            document.getElementById('drop-res').innerHTML = `ТЕБЕ ВЫПАЛ: <b style="color:${skins[drop].color}">${skins[drop].name}</b>`;
            update();
        }
    }

    function toggleView(id, el) {
        document.querySelectorAll('.modal').forEach(m => m.style.display = 'none');
        if(id !== 'main') document.getElementById(id).style.display = 'block';
        if(el) {
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            el.classList.add('active');
        }
    }

    setInterval(() => { g.score += g.auto / 10; update(); }, 100);
    update();
</script>
</body>
</html>
