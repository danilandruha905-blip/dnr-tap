<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Donald Farm Fixed V12</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --gold: #FFD700; --sky: #70c5ff; --grass: #44cc22; }
        body { margin: 0; padding: 0; font-family: 'Arial Black', sans-serif; height: 100vh; overflow: hidden; background: var(--sky); display: flex; flex-direction: column; }

        /* МУЛЬТЯШНЫЙ ФОН */
        #sky-bg { position: fixed; inset: 0; z-index: -2; background: linear-gradient(to bottom, #40a0ff, #a0d8ff); }
        .cloud { position: absolute; background: white; border-radius: 50px; opacity: 0.9; animation: move linear infinite; }
        @keyframes move { from { transform: translateX(-120px); } to { transform: translateX(110vw); } }

        #ground { position: fixed; bottom: 0; width: 100%; height: 200px; background: var(--grass); border-top: 5px solid #228811; z-index: -1; border-radius: 50% 50% 0 0 / 20% 20% 0 0; transform: scaleX(1.2); }
        
        /* ПАРТИКЛЫ ВВЕРХ */
        .p { position: absolute; bottom: -50px; pointer-events: none; animation: rise linear forwards; z-index: 0; }
        @keyframes rise { to { transform: translateY(-110vh) rotate(360deg); opacity: 0; } }

        /* ИНТЕРФЕЙС */
        header { padding: 45px 20px 10px; z-index: 10; }
        #stat-card { background: rgba(255,255,255,0.8); padding: 15px; border-radius: 25px; border: 3px solid #000; text-align: center; box-shadow: 0 4px 0 #000; }
        #balance { font-size: 45px; color: #000; margin-bottom: 5px; }
        .e-bar { width: 100%; height: 12px; background: #eee; border: 2px solid #000; border-radius: 10px; overflow: hidden; }
        #e-fill { height: 100%; width: 100%; background: #44ff22; transition: width 0.2s; }

        /* ПЕРСОНАЖ */
        #game { flex: 1; display: flex; align-items: center; justify-content: center; position: relative; z-index: 5; }
        #char-box { position: relative; width: 220px; height: 220px; transition: transform 0.1s; }
        #donald-img { width: 100%; height: 100%; object-fit: contain; }
        
        /* СЛОИ ОДЕЖДЫ (ТЕПЕРЬ ТЕКСТОВЫЕ/EMOJI ДЛЯ НАДЕЖНОСТИ) */
        .item-layer { position: absolute; left: 50%; transform: translateX(-50%); pointer-events: none; font-size: 60px; text-shadow: 2px 2px 0 #000; display: none; }
        #slot-head { top: -30px; font-size: 80px; z-index: 10; }
        #slot-glasses { top: 20px; font-size: 50px; z-index: 11; }
        #slot-shirt { bottom: 20px; font-size: 100px; z-index: 9; opacity: 0.9; }

        /* МЕНЮ */
        nav { background: #8b4513; display: flex; padding: 10px 0 25px; border-top: 4px solid #000; z-index: 100; }
        .nav-btn { flex: 1; text-align: center; color: white; font-size: 10px; opacity: 0.7; }
        .nav-btn.active { opacity: 1; color: var(--gold); }
        .nav-btn div { font-size: 24px; }

        /* МОДАЛКИ */
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 1000; padding: 30px 20px; overflow-y: auto; color: white; }
        .card { background: #333; padding: 15px; border-radius: 15px; margin-bottom: 10px; display: flex; align-items: center; justify-content: space-between; border: 2px solid #555; }
        .buy { background: var(--gold); border: 2px solid #000; padding: 10px; border-radius: 10px; font-weight: bold; }
    </style>
</head>
<body>

<div id="sky-bg"></div>
<div id="ground"></div>

<header>
    <div id="stat-card">
        <div id="balance">💰 <span id="val">0</span></div>
        <div class="e-bar"><div id="e-fill"></div></div>
        <div style="font-size:12px; color:#555; margin-top:5px;">⚡️ <span id="e-num">1000</span>/1000</div>
    </div>
</header>

<div id="game" onclick="tap(event)">
    <div id="char-box">
        <img id="donald-img" src="https://upload.wikimedia.org/wikipedia/en/thumb/b/b4/Donald_Duck.svg/220px-Donald_Duck.svg.png">
        <div id="slot-head" class="item-layer"></div>
        <div id="slot-glasses" class="item-layer"></div>
        <div id="slot-shirt" class="item-layer"></div>
    </div>
</div>

<nav>
    <div class="nav-btn active" onclick="show('main',this)"><div>🏠</div>Farm</div>
    <div class="nav-btn" onclick="show('wardrobe',this)"><div>👕</div>Одежда</div>
    <div class="nav-btn" onclick="show('shop',this)"><div>🚀</div>Up</div>
</nav>

<div id="wardrobe" class="modal">
    <h2>ГАРДЕРОБ (EMOJI)</h2>
    <div id="items-list"></div>
    <button onclick="show('main')" style="width:100%; padding:15px; margin-top:20px;">ЗАКРЫТЬ</button>
</div>

<div id="shop" class="modal">
    <h2>ПРОКАЧКА</h2>
    <div class="card"><span>Тап +5</span> <button class="buy" onclick="up('t')">💰 <span id="c-t">100</span></button></div>
    <div class="card"><span>Авто +20</span> <button class="buy" onclick="up('a')">💰 <span id="c-a">500</span></button></div>
    <button onclick="show('main')" style="width:100%; padding:15px;">ЗАКРЫТЬ</button>
</div>

<script>
    const tg = window.Telegram.WebApp;
    tg.expand();

    let s = JSON.parse(localStorage.getItem('d_v12')) || {
        score:0, tap:1, auto:0, ct:100, ca:500, e:1000,
        inv:[], eq:{head:null, glasses:null, shirt:null}
    };

    const items = [
        {id:'h1', cat:'head', name:'Кепка', sym:'🧢', p:500},
        {id:'h2', cat:'head', name:'Ковбой', sym:'🤠', p:5000},
        {id:'g1', cat:'glasses', name:'Очки', sym:'🕶', p:1500},
        {id:'s1', cat:'shirt', name:'Майка', sym:'👕', p:3000},
        {id:'s2', cat:'shirt', name:'Костюм', sym:'👔', p:10000}
    ];

    function save() { localStorage.setItem('d_v12', JSON.stringify(s)); }

    function update() {
        document.getElementById('val').innerText = Math.floor(s.score);
        document.getElementById('e-num').innerText = Math.floor(s.e);
        document.getElementById('e-fill').style.width = (s.e/10) + '%';
        document.getElementById('c-t').innerText = s.ct;
        document.getElementById('c-a').innerText = s.ca;

        ['head','glasses','shirt'].forEach(c => {
            const el = document.getElementById('slot-'+c);
            if(s.eq[c]) {
                el.innerText = items.find(i=>i.id===s.eq[c]).sym;
                el.style.display = 'block';
            } else el.style.display = 'none';
        });
        
        const list = document.getElementById('items-list');
        list.innerHTML = '';
        items.forEach(i => {
            const bought = s.inv.includes(i.id);
            const active = s.eq[i.cat] === i.id;
            list.innerHTML += `<div class="card"><span>${i.sym} ${i.name}</span>
                <button class="buy" onclick="manage('${i.cat}','${i.id}',${i.p})" style="background:${active?'#44ff22':(bought?'#aaa':var(--gold))}">${active?'СНЯТЬ':(bought?'НАДЕТЬ':'КУПИТЬ '+i.p)}</button></div>`;
        });
        save();
    }

    function tap(e) {
        if(s.e < 1) return;
        s.score += s.tap; s.e -= 1;
        tg.HapticFeedback.impactOccurred('medium');
        
        const box = document.getElementById('char-box');
        box.style.transform = 'scale(0.9) translateY(10px)';
        setTimeout(()=>box.style.transform='scale(1)', 50);

        const x = e.clientX || e.touches[0].clientX;
        const p = document.createElement('div');
        p.className = 'p'; p.innerText = '🌽';
        p.style.left = x + 'px';
        p.style.animationDuration = '1s';
        document.body.appendChild(p);
        setTimeout(()=>p.remove(), 1000);
        update();
    }

    function up(t){
        if(t==='t' && s.score>=s.ct){ s.score-=s.ct; s.tap+=5; s.ct*=3; }
        if(t==='a' && s.score>=s.ca){ s.score-=s.ca; s.auto+=20; s.ca*=3; }
        update();
    }

    function manage(cat, id, p) {
        if(!s.inv.includes(id)) {
            if(s.score >= p) { s.score -= p; s.inv.push(id); } else return;
        }
        s.eq[cat] = (s.eq[cat] === id) ? null : id;
        update();
    }

    function show(id, btn) {
        document.querySelectorAll('.modal').forEach(m=>m.style.display='none');
        if(id!=='main') document.getElementById(id).style.display='block';
        document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
        if(btn) btn.classList.add('active');
    }

    // Облака
    for(let i=0; i<3; i++) {
        let c = document.createElement('div'); c.className='cloud';
        c.style.width = (100+i*20)+'px'; c.style.height='40px';
        c.style.top = (100+i*50)+'px'; c.style.left = (i*100)+'px';
        c.style.animationDuration = (15+i*5)+'s';
        document.body.appendChild(c);
    }

    setInterval(() => { s.score += s.auto/10; if(s.e<1000) s.e+=1; update(); }, 100);
    update();
</script>
</body>
</html>
