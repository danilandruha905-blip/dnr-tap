<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Donald Combat Pro</title>
    <style>
        :root { --gold: #ffd700; --bg: #001a33; }
        body { background: var(--bg); color: white; font-family: 'Arial', sans-serif; margin: 0; display: flex; flex-direction: column; align-items: center; height: 100vh; overflow: hidden; user-select: none; }
        #header { width: 100%; padding: 20px; text-align: center; background: rgba(0,0,0,0.3); box-shadow: 0 5px 15px rgba(0,0,0,0.5); }
        #score-container { font-size: 48px; font-weight: bold; color: var(--gold); text-shadow: 0 0 10px rgba(255,215,0,0.5); display: flex; align-items: center; justify-content: center; gap: 10px; }
        #coin { width: 260px; height: 260px; border-radius: 50%; background: url('https://img.icons8.com/color/512/donald-duck.png') center/80% no-repeat, radial-gradient(circle, #ffd700, #b8860b); border: 8px solid #fff; box-shadow: 0 0 40px var(--gold); margin-top: 40px; transition: transform 0.05s; cursor: pointer; -webkit-tap-highlight-color: transparent; }
        #coin:active { transform: scale(0.92); }
        .fly-text { position: absolute; color: var(--gold); font-size: 32px; font-weight: bold; animation: flyUp 0.6s ease-out forwards; pointer-events: none; }
        @keyframes flyUp { 0% { opacity: 1; transform: translateY(0); } 100% { opacity: 0; transform: translateY(-200px); } }
        #nav-menu { position: fixed; bottom: 0; width: 100%; display: flex; justify-content: space-around; background: #000; padding: 15px 0; border-top: 2px solid var(--gold); }
        .nav-item { text-align: center; color: #888; font-size: 12px; flex: 1; }
        .nav-item.active { color: var(--gold); }
        #energy-container { width: 80%; margin-top: 30px; }
        #energy-text { margin-bottom: 5px; font-size: 14px; }
        #energy-bar { width: 100%; height: 12px; background: #333; border-radius: 10px; overflow: hidden; }
        #energy-fill { height: 100%; width: 100%; background: linear-gradient(90deg, #ffd700, #ff8800); transition: 0.2s; }
        /* Магазин */
        #shop-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg); z-index: 1000; padding: 20px; box-sizing: border-box; }
        .upgrade-card { background: #002b55; border: 1px solid var(--gold); padding: 15px; border-radius: 15px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
        .buy-btn { background: var(--gold); color: #000; border: none; padding: 10px 15px; border-radius: 8px; font-weight: bold; }
        .close-shop { position: absolute; top: 10px; right: 20px; font-size: 30px; color: var(--gold); }
    </style>
</head>
<body>
    <div id="header">
        <div id="score-container">💰 <span id="balance">0</span></div>
        <div style="color: #aaa; font-size: 12px; margin-top: 5px;">ПРИБЫЛЬ В ЧАС: +<span id="p-hour">0</span></div>
    </div>

    <div id="coin"></div>

    <div id="energy-container">
        <div id="energy-text">⚡ <span id="e-val">1000</span> / 1000</div>
        <div id="energy-bar"><div id="energy-fill"></div></div>
    </div>

    <div id="nav-menu">
        <div class="nav-item active">🏠<br>Биржа</div>
        <div class="nav-item" onclick="openShop()">🚀<br>Майнинг</div>
        <div class="nav-item">👥<br>Друзья</div>
        <div class="nav-item">💰<br>Airdrop</div>
    </div>

    <div id="shop-modal">
        <div class="close-shop" onclick="closeShop()">×</div>
        <h2 style="color: var(--gold)">Mining / Upgrades</h2>
        <div class="upgrade-card">
            <div>
                <b>Мультитап</b><br>
                <small>+1 за клик</small><br>
                <span style="color:var(--gold)">Цена: 500</span>
            </div>
            <button class="buy-btn" onclick="buyUpgrade(500, 'tap')">BUY</button>
        </div>
        <div class="upgrade-card">
            <div>
                <b>Бизнес Дональда</b><br>
                <small>+100/час пассивно</small><br>
                <span style="color:var(--gold)">Цена: 2000</span>
            </div>
            <button class="buy-btn" onclick="buyUpgrade(2000, 'passive')">BUY</button>
        </div>
    </div>

    <script>
        let balance = 0, energy = 1000, tapPower = 1, passiveIncome = 0;
        const balanceEl = document.getElementById('balance');
        const coin = document.getElementById('coin');

        coin.addEventListener('pointerdown', (e) => {
            if (energy < tapPower) return;
            balance += tapPower;
            energy -= tapPower;
            updateUI();
            showFlyText(e.clientX, e.clientY, `+${tapPower}`);
        });

        function updateUI() {
            balanceEl.innerText = Math.floor(balance);
            document.getElementById('e-val').innerText = energy;
            document.getElementById('energy-fill').style.width = (energy/10) + '%';
            document.getElementById('p-hour').innerText = passiveIncome;
        }

        function showFlyText(x, y, text) {
            const el = document.createElement('div');
            el.className = 'fly-text';
            el.style.left = x + 'px'; el.style.top = y + 'px';
            el.innerText = text;
            document.body.appendChild(el);
            setTimeout(() => el.remove(), 600);
        }

        function openShop() { document.getElementById('shop-modal').style.display = 'block'; }
        function closeShop() { document.getElementById('shop-modal').style.display = 'none'; }

        function buyUpgrade(price, type) {
            if (balance >= price) {
                balance -= price;
                if (type === 'tap') tapPower += 1;
                if (type === 'passive') passiveIncome += 100;
                updateUI();
                alert('Улучшение куплено!');
            } else { alert('Недостаточно монет!'); }
        }

        // Пассивный доход и реген энергии
        setInterval(() => {
            balance += passiveIncome / 3600;
            if (energy < 1000) energy = Math.min(1000, energy + 1);
            updateUI();
        }, 1000);
    </script>
</body>
</html>
