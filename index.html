<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Donald Gold Empire</title>
    <style>
        :root { --gold: #FFD700; --accent: #00F2FF; }
        body { 
            background: #000; color: white; font-family: 'Segoe UI', Roboto, sans-serif;
            margin: 0; height: 100vh; overflow: hidden; display: flex; flex-direction: column;
        }

        /* Анимированный фон с частицами */
        #canvas { position: fixed; inset: 0; z-index: -1; background: radial-gradient(circle at center, #001a33 0%, #000 100%); }

        /* Интерфейс */
        header { padding: 40px 20px 0; text-align: center; z-index: 10; }
        #balance-container { display: flex; align-items: center; justify-content: center; gap: 15px; }
        #balance-container img { width: 50px; filter: drop-shadow(0 0 15px var(--gold)); }
        #balance { font-size: 72px; font-weight: 900; color: var(--gold); text-shadow: 0 0 30px rgba(255,215,0,0.5); }
        .stats { font-size: 14px; opacity: 0.6; text-transform: uppercase; letter-spacing: 2px; margin-top: 5px; }

        /* Игровая сцена */
        #game-scene {
            position: relative; flex: 1; display: flex; align-items: center; justify-content: center;
            perspective: 1000px;
        }
        
        #ground {
            position: absolute; bottom: 0; width: 150%; height: 25vh;
            background: radial-gradient(ellipse at top, #2d5a27 0%, #0a1a05 100%);
            border-top: 4px solid #4CAF50; border-radius: 50% 50% 0 0;
            box-shadow: 0 -20px 50px rgba(0,255,0,0.15);
        }

        #tree {
            position: absolute; right: 10%; bottom: 18vh; width: 150px; height: 350px;
            background: url('https://cdn-icons-png.flaticon.com/512/490/490406.png') center/contain no-repeat;
            filter: drop-shadow(0 0 20px rgba(0,0,0,0.5));
        }

        #donald {
            width: 280px; height: 280px; z-index: 5; cursor: pointer;
            transition: transform 0.1s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            filter: drop-shadow(0 20px 40px rgba(0,0,0,0.6));
            -webkit-user-drag: none;
        }
        #donald:active { transform: scale(0.9) rotate(-3deg); }

        /* Навигация (Glassmorphism) */
        nav {
            position: fixed; bottom: 30px; left: 5%; width: 90%; height: 80px;
            background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(20px);
            border-radius: 25px; border: 1px solid rgba(255, 255, 255, 0.1);
            display: flex; justify-content: space-around; align-items: center; z-index: 100;
        }
        .nav-item { text-align: center; opacity: 0.5; transition: 0.3s; flex: 1; cursor: pointer; }
        .nav-item.active { opacity: 1; color: var(--gold); transform: translateY(-5px); }
        .nav-item i { font-size: 24px; display: block; margin-bottom: 4px; }

        /* Окна (Модалки) */
        .modal {
            display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9);
            z-index: 1000; padding: 40px 20px; animation: fadeIn 0.3s ease;
        }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        
        .card {
            background: rgba(255,255,255,0.05); border-radius: 20px; padding: 20px;
            margin-bottom: 15px; display: flex; justify-content: space-between; align-items: center;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .buy-btn {
            background: var(--gold); color: black; border: none; padding: 12px 20px;
            border-radius: 15px; font-weight: 800; font-size: 14px; cursor: pointer;
        }

        /* Эффект клика */
        .click-value {
            position: absolute; pointer-events: none; color: white; font-weight: 900;
            font-size: 40px; text-shadow: 0 0 15px gold; animation: fly 0.8s ease-out forwards;
        }
        @keyframes fly { 0% { opacity: 1; transform: translateY(0); } 100% { opacity: 0; transform: translateY(-200px) scale(1.5); } }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>
    
    <header>
        <div class="stats">Auto-Profit: +<span id="ps">0</span>/sec</div>
        <div id="balance-container">
            <img src="https://cdn-icons-png.flaticon.com/512/2311/2311992.png" alt="coin">
            <span id="balance">0</span>
        </div>
    </header>

    <div id="game-scene">
        <div id="ground"></div>
        <div id="tree"></div>
        <img id="donald" src="https://www.pngarts.com/files/3/Donald-Duck-PNG-Transparent-Image.png" alt="Donald" onclick="tap(event)">
    </div>

    <nav>
        <div class="nav-item active" onclick="openScreen('game')">🏠<br>Main</div>
        <div class="nav-item" onclick="openScreen('shop')">🚀<br>Empire</div>
        <div class="nav-item" onclick="openScreen('vip')">💎<br>VIP</div>
    </nav>

    <div id="shop" class="modal">
        <h1 style="color:var(--gold); text-align:center;">MARKET</h1>
        <div class="card">
            <div><b>Double Tap</b><br><small>Level <span id="lvl1">1</span></small></div>
            <button class="buy-btn" onclick="buy(1)">Cost: <span id="c1">100</span></button>
        </div>
        <div class="card">
            <div><b>Gold Mining</b><br><small>Level <span id="lvl2">1</span></small></div>
            <button class="buy-btn" onclick="buy(2)">Cost: <span id="c2">500</span></button>
        </div>
        <button onclick="openScreen('game')" style="width:100%; padding:20px; background:none; border:1px solid #333; color:white; border-radius:20px;">BACK</button>
    </div>

    <script>
        let score = 0, income = 0, power = 1, costs = [100, 500];

        // Canvas Анимация (Золотые частицы)
        const cvs = document.getElementById('canvas');
        const ctx = cvs.getContext('2d');
        cvs.width = window.innerWidth; cvs.height = window.innerHeight;
        let particles = Array.from({length: 50}, () => ({
            x: Math.random() * cvs.width,
            y: Math.random() * cvs.height,
            s: Math.random() * 2 + 1,
            o: Math.random()
        }));

        function draw() {
            ctx.clearRect(0, 0, cvs.width, cvs.height);
            ctx.fillStyle = "rgba(255, 215, 0, 0.3)";
            particles.forEach(p => {
                ctx.beginPath(); ctx.arc(p.x, p.y, p.s, 0, Math.PI*2); ctx.fill();
                p.y += p.s; if(p.y > cvs.height) p.y = -10;
            });
            requestAnimationFrame(draw);
        }
        draw();

        function tap(e) {
            score += power; updateUI();
            const val = document.createElement('div');
            val.className = 'click-value';
            val.innerText = '+' + power;
            val.style.left = e.clientX + 'px';
            val.style.top = e.clientY + 'px';
            document.body.appendChild(val);
            setTimeout(() => val.remove(), 800);
        }

        function updateUI() {
            document.getElementById('balance').innerText = Math.floor(score);
            document.getElementById('ps').innerText = income;
            document.getElementById('c1').innerText = costs[0];
            document.getElementById('c2').innerText = costs[1];
        }

        function openScreen(id) {
            document.querySelectorAll('.modal').forEach(m => m.style.display = 'none');
            if(id !== 'game') document.getElementById(id).style.display = 'block';
        }

        function buy(n) {
            let i = n - 1;
            if(score >= costs[i]) {
                score -= costs[i];
                if(n === 1) power += 2; else income += 5;
                costs[i] = Math.floor(costs[i] * 1.8);
                updateUI();
            }
        }

        setInterval(() => { score += income; updateUI(); }, 1000);
    </script>
</body>
</html>
