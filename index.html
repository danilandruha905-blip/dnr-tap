<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Donald Gold Elite</title>
    <style>
        :root { --gold: #FFD700; --neon: #00F2FF; --bg: #050a0f; }
        
        body { 
            margin: 0; padding: 0; background: var(--bg); color: white;
            font-family: -apple-system, system-ui, sans-serif;
            height: 100vh; overflow: hidden; display: flex; flex-direction: column;
        }

        /* АНИМИРОВАННЫЙ ФОН С ПАДАЮЩИМ ЗОЛОТОМ */
        #bg-animate {
            position: fixed; inset: 0; z-index: -1;
            background: radial-gradient(circle at 50% 20%, #102a43 0%, #050a0f 100%);
        }
        
        .money-drop {
            position: absolute;
            top: -50px;
            font-size: 24px;
            user-select: none;
            pointer-events: none;
            animation: fall linear infinite;
        }

        @keyframes fall {
            to { transform: translateY(110vh) rotate(360deg); }
        }

        /* ВЕРХНЯЯ ПАНЕЛЬ */
        header { padding: 50px 20px 20px; text-align: center; z-index: 10; }
        #balance-box {
            background: rgba(255, 255, 255, 0.05); padding: 15px; border-radius: 25px;
            backdrop-filter: blur(15px); border: 1px solid rgba(255, 215, 0, 0.2);
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
        }
        #balance { font-size: 50px; font-weight: 900; color: var(--gold); text-shadow: 0 0 20px rgba(255,215,0,0.4); }
        .stats { font-size: 12px; opacity: 0.6; text-transform: uppercase; letter-spacing: 2px; margin-top: 10px; }

        /* ИГРОВАЯ ЗОНА */
        #game {
            flex: 1; display: flex; align-items: center; justify-content: center;
            position: relative; cursor: pointer; -webkit-tap-highlight-color: transparent;
        }
        
        #donald {
            width: 280px; height: 280px; object-fit: contain;
            filter: drop-shadow(0 10px 30px rgba(0,0,0,0.8));
            transition: transform 0.1s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 5;
        }

        /* АНИМАЦИЯ ПРЫЖКА */
        .jump { transform: translateY(-50px) scale(1.1) !important; }

        .coin-pop {
            position: absolute; pointer-events: none; font-size: 30px;
            animation: popUp 0.6s ease-out forwards; z-index: 100;
        }
        @keyframes popUp { 
            0% { transform: translateY(0) scale(1); opacity: 1; } 
            100% { transform: translateY(-150px) scale(1.5); opacity: 0; } 
        }

        /* НИЖНЕЕ МЕНЮ */
        nav {
            position: fixed; bottom: 25px; left: 5%; width: 90%; height: 80px;
            background: rgba(15, 25, 35, 0.8); backdrop-filter: blur(25px);
            border-radius: 30px; border: 1px solid rgba(255,255,255,0.1);
            display: flex; justify-content: space-around; align-items: center; z-index: 1000;
        }
        .btn { text-align: center; flex: 1; opacity: 0.5; transition: 0.3s; color: white; cursor: pointer; text-decoration: none; }
        .btn.active { opacity: 1; color: var(--gold); transform: translateY(-5px); }
        .btn i { font-size: 22px; display: block; margin-bottom: 5px; }

        /* МОДАЛКИ */
        .modal {
            display: none; position: fixed; inset: 0; z-index: 2000;
            background: rgba(5, 10, 15, 0.98); padding: 40px 20px;
        }
        .card {
            background: rgba(255,255,255,0.05); border-radius: 20px; padding: 20px;
            margin-bottom: 15px; display: flex; align-items: center; justify-content: space-between;
            border: 1px solid rgba(255,255,255,0.05);
        }
        .buy-btn {
            background: linear-gradient(45deg, #FFD700, #FFA500);
            border: none; padding: 12px 20px; border-radius: 15px; font-weight: 900; color: #000;
        }
        .donate-btn {
            background: linear-gradient(45deg, #00f2ff, #0066ff);
            color: white;
        }
    </style>
</head>
<body>

    <div id="bg-animate"></div>

    <header>
        <div id="balance-box">
            <div id="balance">💰 <span id="score">0</span></div>
            <div class="stats">AUTO: +<span id="pps">0</span>/SEC | TAP: +<span id="p_tap">1</span></div>
        </div>
    </header>

    <div id="game" onmousedown="handleTap(event)" ontouchstart="handleTap(event)">
        <img id="donald" src="https://www.pngarts.com/files/3/Donald-Duck-PNG-Transparent-Image.png" alt="Donald">
    </div>

    <nav>
        <div class="btn active" onclick="show('main', this)"><i>🏠</i>Farm</div>
        <div class="btn" onclick="show('shop', this)"><i>🚀</i>Upgrade</div>
        <div class="btn" onclick="show('donate-modal', this)"><i>💎</i>Donate</div>
    </nav>

    <div id="shop" class="modal">
        <h1 style="color:var(--gold); text-align:center;">MARKET</h1>
        <div class="card">
            <div><b>Golden Corn</b><br><small>+2 per tap</small></div>
            <button class="buy-btn" onclick="buy(1)">💰 <span id="c1">100</span></button>
        </div>
        <div class="card">
            <div><b>Tractor</b><br><small>+10 per sec</small></div>
            <button class="buy-btn" onclick="buy(2)">💰 <span id="c2">500</span></button>
        </div>
        <button onclick="show('main')" style="width:100%; padding:20px; background:none; color:#555; border:none; font-weight:900;">CLOSE</button>
    </div>

    <div id="donate-modal" class="modal">
        <h1 style="color:var(--neon); text-align:center;">DONATE</h1>
        <p style="text-align:center; opacity:0.7;">Поддержите проект и получите бонусы!</p>
        <div class="card">
            <div><b>Starter Pack</b><br><small>10,000 Gold</small></div>
            <a href="https://твой-сайт-для-оплаты.com" target="_blank" class="buy-btn donate-btn" style="text-decoration:none;">BUY $1</a>
        </div>
        <div class="card">
            <div><b>Whale Pack</b><br><small>1,000,000 Gold</small></div>
            <a href="https://твой-сайт-для-оплаты.com" target="_blank" class="buy-btn donate-btn" style="text-decoration:none;">BUY $10</a>
        </div>
        <button onclick="show('main')" style="width:100%; padding:20px; background:none; color:#555; border:none; font-weight:900;">CLOSE</button>
    </div>

    <script>
        let state = JSON.parse(localStorage.getItem('donald_save')) || {
            score: 0, tap: 1, auto: 0, c1: 100, c2: 500
        };

        // СОЗДАНИЕ ПАДАЮЩИХ ДЕНЕГ
        function createMoney() {
            const symbols = ['💰', '💵', '🪙', '💎'];
            const money = document.createElement('div');
            money.className = 'money-drop';
            money.innerText = symbols[Math.floor(Math.random() * symbols.length)];
            money.style.left = Math.random() * 100 + 'vw';
            money.style.animationDuration = Math.random() * 3 + 2 + 's';
            money.style.opacity = Math.random() * 0.5 + 0.2;
            document.getElementById('bg-animate').appendChild(money);
            
            setTimeout(() => money.remove(), 5000);
        }
        setInterval(createMoney, 300);

        function save() { localStorage.setItem('donald_save', JSON.stringify(state)); }

        function updateUI() {
            document.getElementById('score').innerText = Math.floor(state.score);
            document.getElementById('pps').innerText = state.auto;
            document.getElementById('p_tap').innerText = state.tap;
            document.getElementById('c1').innerText = state.c1;
            document.getElementById('c2').innerText = state.c2;
            save();
        }

        function handleTap(e) {
            // Предотвращаем двойное срабатывание на мобилках
            if (e.type === 'touchstart') e.preventDefault();
            
            state.score += state.tap;
            updateUI();
            
            // Анимация прыжка
            const img = document.getElementById('donald');
            img.classList.remove('jump');
            void img.offsetWidth; // Магия для перезапуска анимации
            img.classList.add('jump');
            setTimeout(() => img.classList.remove('jump'), 100);

            // Текст +1
            const clientX = e.clientX || e.touches[0].clientX;
            const clientY = e.clientY || e.touches[0].clientY;
            
            const coin = document.createElement('div');
            coin.className = 'coin-pop';
            coin.innerText = '💰';
            coin.style.left = clientX + 'px';
            coin.style.top = clientY + 'px';
            document.body.appendChild(coin);
            setTimeout(() => coin.remove(), 600);
        }

        function buy(type) {
            if(type === 1 && state.score >= state.c1) {
                state.score -= state.c1; state.tap += 2; state.c1 *= 3;
            } else if(type === 2 && state.score >= state.c2) {
                state.score -= state.c2; state.auto += 10; state.c2 *= 3;
            }
            updateUI();
        }

        function show(id, el) {
            document.querySelectorAll('.modal').forEach(m => m.style.display = 'none');
            if(id !== 'main') document.getElementById(id).style.display = 'block';
            
            // Смена активной кнопки в меню
            if(el) {
                document.querySelectorAll('.btn').forEach(b => b.classList.remove('active'));
                el.classList.add('active');
            }
        }

        setInterval(() => { state.score += state.auto / 10; updateUI(); }, 100);
        updateUI();
    </script>
</body>
</html>
