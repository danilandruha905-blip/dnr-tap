<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Donald Elite Tap</title>

<style>
:root{
--gold:#ffd700;
--blue:#00f2ff;
--pink:#ff00ff;
}

body{
margin:0;
font-family:Arial Black;
color:#fff;
background: radial-gradient(circle at top,#001122,#000);
overflow:hidden;
}

/* фон */
body::before{
content:"";
position:fixed;
width:100%;
height:100%;
background:linear-gradient(45deg,#000,#001a33,#000);
animation:bg 10s infinite alternate;
z-index:-1;
}
@keyframes bg{
0%{filter:hue-rotate(0deg)}
100%{filter:hue-rotate(60deg)}
}

/* баланс */
#balance{
font-size:48px;
text-align:center;
margin-top:20px;
color:var(--gold);
text-shadow:0 0 20px gold;
}

/* кнопка */
#donald-btn{
width:230px;
height:230px;
margin:30px auto;
border-radius:50%;
border:5px solid rgba(255,255,255,0.2);
backdrop-filter:blur(10px);
box-shadow:0 0 40px rgba(255,215,0,0.4);
transition:0.1s;
background-size:80%;
background-position:center;
background-repeat:no-repeat;
}

#donald-btn:active{
transform:scale(0.9);
box-shadow:0 0 80px gold;
}

/* всплывающие +1 */
.fly{
position:absolute;
color:gold;
font-weight:bold;
animation:fly 0.7s forwards;
pointer-events:none;
}
@keyframes fly{
0%{opacity:1;transform:translateY(0)}
100%{opacity:0;transform:translateY(-80px)}
}

/* меню */
#footer{
position:fixed;
bottom:15px;
width:90%;
left:5%;
display:flex;
justify-content:space-around;
padding:15px;
border-radius:25px;
background:rgba(255,255,255,0.05);
backdrop-filter:blur(15px);
border:1px solid rgba(255,255,255,0.2);
}

.nav{
text-align:center;
font-size:12px;
color:#aaa;
}
.nav span{
font-size:22px;
display:block;
}

/* окна */
.modal{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.95);
padding:20px;
overflow:auto;
animation:fade 0.3s;
}
@keyframes fade{
from{opacity:0;transform:scale(0.9)}
to{opacity:1}
}

/* карточки */
.card{
padding:15px;
margin:10px 0;
border-radius:20px;
background:rgba(255,255,255,0.05);
backdrop-filter:blur(10px);
border:1px solid rgba(255,255,255,0.2);
box-shadow:0 0 15px rgba(0,0,0,0.5);
}

/* кнопки */
button{
padding:10px 15px;
border:none;
border-radius:12px;
background:linear-gradient(45deg,var(--gold),orange);
font-weight:bold;
}

/* редкость */
.common{color:#fff}
.rare{color:var(--blue);text-shadow:0 0 10px var(--blue)}
.legend{color:var(--pink);text-shadow:0 0 10px var(--pink)}
</style>
</head>

<body>

<div id="balance">💰 <span id="val">0</span></div>
<div id="donald-btn"></div>

<div id="footer">
<div class="nav" onclick="openModal('shop')"><span>🚀</span>Shop</div>
<div class="nav" onclick="openModal('skins')"><span>🎭</span>Skins</div>
<div class="nav" onclick="openModal('cases')"><span>🎰</span>Cases</div>
</div>

<!-- SHOP -->
<div id="shop" class="modal">
<h2>UPGRADE</h2>
<div class="card">
+1 Tap (100)
<button onclick="buyTap()">BUY</button>
</div>
</div>

<!-- SKINS -->
<div id="skins" class="modal">
<h2>SKINS</h2>
<div id="skins-list"></div>
</div>

<!-- CASES -->
<div id="cases" class="modal">
<h2>CASES</h2>
<div class="card">
Open Case (1000)
<button onclick="openCase()">OPEN</button>
</div>
<div id="drop"></div>
</div>

<script>

let data=JSON.parse(localStorage.getItem("game"))||{
score:0,
tap:1,
skins:[
{id:0,name:"Classic",url:"https://www.pngarts.com/files/3/Donald-Duck-PNG-Transparent-Image.png",rarity:"common",owned:true},
{id:1,name:"Golden",url:"https://i.imgur.com/7yUvePI.png",rarity:"rare",owned:false},
{id:2,name:"Dark",url:"https://i.imgur.com/1X6zYpS.png",rarity:"rare",owned:false},
{id:3,name:"Fire",url:"https://i.imgur.com/UWb6F4R.png",rarity:"legend",owned:false}
],
currentSkin:0
};

function save(){localStorage.setItem("game",JSON.stringify(data));}

function update(){
val.innerText=data.score;
donald.style.backgroundImage=`url(${data.skins[data.currentSkin].url})`;
renderSkins();
save();
}

donald.onclick=(e)=>{
data.score+=data.tap;
spawnText(e);
update();
}

function spawnText(e){
let t=document.createElement("div");
t.className="fly";
t.innerText="+"+data.tap;
t.style.left=e.clientX+"px";
t.style.top=e.clientY+"px";
document.body.appendChild(t);
setTimeout(()=>t.remove(),700);
}

function buyTap(){
if(data.score>=100){
data.score-=100;
data.tap++;
update();
}
}

function renderSkins(){
let list=document.getElementById("skins-list");
list.innerHTML="";
data.skins.forEach(s=>{
let div=document.createElement("div");
div.className="card";
div.innerHTML=`
<b class="${s.rarity}">${s.name}</b><br>
${s.owned ?
`<button onclick="setSkin(${s.id})">USE</button>`:
`<button onclick="buySkin(${s.id})">BUY</button>`}
`;
list.appendChild(div);
});
}

function setSkin(id){
if(!data.skins[id].owned)return;
data.currentSkin=id;
update();
}

function buySkin(id){
if(data.score>=2000){
data.score-=2000;
data.skins[id].owned=true;
update();
}
}

function openCase(){
if(data.score<1000)return;
data.score-=1000;

let r=Math.random();
let drop=r<0.6?1:r<0.9?2:3;

data.skins[drop].owned=true;
document.getElementById("drop").innerHTML=
`DROP: <b class="${data.skins[drop].rarity}">${data.skins[drop].name}</b>`;
update();
}

function openModal(id){
document.querySelectorAll(".modal").forEach(m=>m.style.display="none");
document.getElementById(id).style.display="block";
}

update();

</script>

</body>
</html>
