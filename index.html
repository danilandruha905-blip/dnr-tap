<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Donald Elite Empire</title>
    <style>
        :root { --gold: #FFD700; --blue: #00F2FF; --bg: #00050a; }
        body { 
            background: var(--bg); color: white; font-family: -apple-system, sans-serif; 
            margin: 0; height: 100vh; overflow: hidden; display: flex; flex-direction: column;
        }

        /* Живой фон с частицами */
        #canvas { position: fixed; inset: 0; z-index: -1; }

        /* Шапка */
        header { padding: 40px 0 10px; text-align: center; z-index: 10; }
        #balance { font-size: 64px; font-weight: 900; color: var(--gold); text-shadow: 0 0 40px rgba(255,215,0,0.5); }
        .stats-bar { font-size: 12px; opacity: 0.6; text-transform: uppercase; letter-spacing: 2px; }

        /* Игровая сцена */
        #game-scene {
            position: relative; flex: 1; display: flex; align-items: center; justify-content: center;
            cursor: pointer; perspective: 1000px;
        }
        
        #landscape {
            position: absolute; bottom: 50px; width: 120%; height: 180px;
            background: radial-gradient(ellipse at top, #2d5a27 0%, #0a1a05 100%);
            border-top: 5px solid #4CAF50; border-radius: 50% 50% 0 0;
            box-shadow: 0 -20px 50px rgba(0,255,0,0.1);
        }

        #tree {
            position: absolute; right: 15%; bottom: 120px; width: 120px; height: 300px;
            background: url('https://cdn-icons-png.flaticon.com/512/490/490406.png') center/contain no-repeat;
            filter: drop-shadow(0 0 20px rgba(0,0,0,0.8));
        }

        #donald {
            position: relative; width: 220px; height: 220px; z-index: 5;
            transition: transform 0.05s cubic-bezier(0.17, 0.67, 0.83, 0.67);
            filter: drop-shadow(0 10px 30px rgba(0,0,0,0.5));
        }
        #game-scene:active #donald { transform: scale(0.9) rotate(-3deg); }

        /* Магазин и меню */
        .glass-panel {
            background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.08); border-radius: 30px;
        }

        #nav {
            position: fixed; bottom: 30px; left: 5%; width: 90%; height: 80px;
            display: flex; justify-content: space-around; align-items: center; z-index: 100;
        }
        .nav-btn { text-align: center; opacity: 0.5; transition: 0.3s; flex: 1; }
        .nav-btn.active { opacity: 1; color: var(--gold); transform: translateY(-5px); }
        .nav-btn i { font-size: 28px; display: block; }

        .modal {
            display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9);
            z-index: 1000; padding: 40px 20px; overflow-y: auto;
        }
        .item-card {
            background: rgba(255,255,255,0.05); border-radius: 20px; padding: 20px;
            margin-bottom: 15px; display: flex; justify-content: space-between; align-items: center;
            border: 1px solid rgba(255,255,255,0.05);
        }
        .btn-buy {
            background: var(--gold); color: black; border: none; padding: 12px 20px;
            border-radius: 15px; font-weight: 800; font-size: 14px;
        }

        /* Эффект клика */
        .click-ani {
            position: absolute; pointer-events: none; color: white; font-weight: 900;
            font-size: 40px; text-shadow: 0 0 10px gold; animation: fly 0.8s ease-out forwards;
        }
        @keyframes fly { 0% { opacity: 1; transform: translateY(0); } 100% { opacity: 0; transform: translateY(-200px) scale(1.5); } }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>
    
    <header>
        <div class="stats-bar">Auto-Profit: +<span id="ps">0</span>/sec</div>
        <div id="balance">💰 <span id="val">0</span></div>
    </header>

    <div id="game-scene" onclick="tap(event)">
        <div id="landscape"></div>
        <div id="tree"></div>
        <img id="donald" src="https://www.pngarts.com/files/3/Donald-Duck-PNG-Transparent-Image.png" alt="Donald">
    </div>

    <div id="nav" class="glass-panel">
        <div class="nav-btn active" onclick="show('game')">🏠<br>Main</div>
        <div class="nav-btn" onclick="show('shop')">🚀<br>Empire</div>
        <div class="nav-btn" onclick="show('skins')">👕<br>Skins</div>
    </div>

    <div id="shop" class="modal">
        <h1 style="color:var(--gold); text-align:center;">EMPIRE UPGRADES</h1>
        <div class="item-card">
            <div><b>Super Tap</b><br><small>Level <span id="lvl1">1</span></small></div>
            <button class="btn-buy" onclick="buy(1)">Cost: <span id="c1">100</span></button>
        </div>
        <div class="item-card">
            <div><b>Gold Mine</b><br><small>Level <span id="lvl2">1</span></small></div>
            <button class="btn-buy" onclick="buy(2)">Cost: <span id="c2">500</span></button>
        </div>
        <button onclick="show('game')" style="width:100%; padding:20px; border-radius:20px; background:none; color:#555; border:1px solid #333;">BACK</button>
    </div>

    <div id="skins" class="modal">
        <h1 style="color:var(--gold); text-align:center;">WARDROBE</h1>
        <div id="skin-list"></div>
        <button onclick="show('game')" style="width:100%; padding:20px; border-radius:20px; background:none; color:#555; border:1px solid #333;">BACK</button>
    </div>

    <script>
        let score = 0, income = 0, tapPower = 1;
        let costs = [100, 500];

        // Анимация фона
        const cvs = document.getElementById('canvas');
        const ctx = cvs.getContext('2d');
        cvs.width = window.innerWidth; cvs.height = window.innerHeight;
        let parts = Array.from({length: 50}, () => ({x: Math.random()*cvs.width, y: Math.random()*cvs.height, s: Math.random()*2}));
        function draw() {
            ctx.clearRect(0,0,cvs.width,cvs.height); ctx.fillStyle = "rgba(255,215,0,0.1)";
            parts.forEach(p => { ctx.beginPath(); ctx.arc(p.x, p.y, 1, 0, 7); ctx.fill(); p.y += p.s; if(p.y>cvs.height) p.y=0; });
            requestAnimationFrame(draw);
        }
        draw();

        function tap(e) {
            score += tapPower; updateUI();
            const div = document.createElement('div');
            div.className = 'click-ani'; div.innerText = '+' + tapPower;
            div.style.left = e.clientX + 'px'; div.style.top = e.clientY + 'px';
            document.body.appendChild(div);
            setTimeout(() => div.remove(), 800);
        }

        function updateUI() {
            document.getElementById('val').innerText = Math.floor(score);
            document.getElementById('ps').innerText = income;
            document.getElementById('c1').innerText = costs[0];
            document.getElementById('c2').innerText = costs[1];
        }

        function show(id) {
            document.querySelectorAll('.modal').forEach(m => m.style.display = 'none');
            if(id !== 'game') document.getElementById(id).style.display = 'block';
        }

        function buy(n) {
            let i = n-1;
            if(score >= costs[i]) {
                score -= costs[i];
                if(n===1) tapPower += 2; else income += 5;
                costs[i] *= 2; updateUI();
            }
        }

        // Рендер скинов
        const skinNames = ["Casual", "Business", "Cyber", "Gold", "King", "Space", "Ninja", "Zombie", "Mafia", "God"];
        const list = document.getElementById('skin-list');
        skinNames.forEach((name, i) => {
            const price = (i + 1) * 1000;
            list.innerHTML += `<div class="item-card">
                <div><b>${name} Donald</b><br><small>Price: ${price}</small></div>
                <button class="btn-buy" onclick="buySkin(${price}, ${i})">BUY</button>
            </div>`;
        });

        function buySkin(p, i) {
            if(score >= p) {
                score -= p; updateUI();
                document.getElementById('donald').style.filter = `hue-rotate(${i*40}deg) drop-shadow(0 0 20px gold)`;
                show('game');
            } else { alert("Not enough coins!"); }
        }

        setInterval(() => { score += income; updateUI(); }, 1000);
    </script>
</body>
</html>
