<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Donald Golden Empire</title>
    <style>
        :root { --gold: #FFD700; --neon: #00F2FF; --glass: rgba(255, 255, 255, 0.08); }
        body { 
            background: radial-gradient(circle at center, #001a33 0%, #000 100%); 
            color: white; font-family: -apple-system, sans-serif; 
            margin: 0; height: 100vh; overflow: hidden; display: flex; flex-direction: column; align-items: center;
        }

        #bg-canvas { position: fixed; inset: 0; z-index: -1; opacity: 0.6; }

        /* ИНТЕРФЕЙС БАЛАНСА */
        #header { padding: 40px 0 10px; text-align: center; z-index: 10; }
        #balance { font-size: 65px; font-weight: 900; color: var(--gold); text-shadow: 0 0 30px rgba(255, 215, 0, 0.6); }

        /* ТАП-ЗОНА С ДОНАЛЬДОМ */
        #tap-target {
            position: relative; width: 300px; height: 300px; margin-top: 20px;
            cursor: pointer; display: flex; align-items: center; justify-content: center; z-index: 5;
        }
        
        /* ПЬЕДЕСТАЛ (ТРАВА + ДЕРЕВО) */
        #ground {
            position: absolute; bottom: -20px; width: 380px; height: 130px;
            background: linear-gradient(180deg, #1A4D1A 0%, #0D260D 100%);
            border-radius: 50% 50% 0 0; border-top: 5px solid #2ECC71;
            box-shadow: 0 -10px 40px rgba(0,255,0,0.4);
        }

        /* SVG ДОНАЛЬД (РЕАЛИСТИЧНО СЖИМАЕТСЯ) */
        svg#donald-scene { 
            position: relative; width: 100%; height: 100%; pointer-events: none;
            transition: transform 0.08s cubic-bezier(0.18, 0.89, 0.32, 1.28);
        }
        #tap-target:active svg#donald-scene { transform: scale(0.85); } /* СЖАТИЕ */

        /* ЭФФЕКТ ЧАСТИЦ ПРИ КЛИКЕ */
        .tap-particle {
            position: absolute; pointer-events: none; font-size: 30px;
            color: #FFF; text-shadow: 0 0 15px gold; z-index: 1000;
            animation: explode 0.7s ease-out forwards;
        }
        @keyframes explode {
            0% { transform: translate(0,0) scale(1.2); opacity: 1; }
            100% { transform: translate(var(--x), var(--y)) scale(0.2); opacity: 0; }
        }

        /* МАГАЗИНЫ И МЕНЮ (GLASSMORPHISM) */
        .modal { 
            display: none; position: fixed; inset: 0; z-index: 1000;
            background: rgba(0,0,0,0.9); backdrop-filter: blur(20px);
            padding: 30px 20px; animation: slideUp 0.3s ease-out;
        }
        @keyframes slideUp { from { transform: translateY(100%); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

        .item-card {
            background: var(--glass); border-radius: 20px; padding: 15px;
            border: 1px solid rgba(255,255,255,0.08); display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px;
        }
        .buy-btn { background: var(--gold); color: #000; border: none; padding: 12px 20px; border-radius: 12px; font-weight: 900; }

        #nav { 
            position: fixed; bottom: 25px; width: 90%; height: 75px;
            background: var(--glass); backdrop-filter: blur(20px);
            border-radius: 25px; border: 1px solid rgba(255,255,255,0.08);
            display: flex; justify-content: space-around; align-items: center; z-index: 100;
        }
        .nav-link { text-align: center; opacity: 0.5; transition: 0.3s; cursor: pointer; flex: 1; }
        .nav-link.active { opacity: 1; transform: translateY(-5px); color: var(--gold); }
    </style>
</head>
<body>
    <canvas id="bg-canvas"></canvas>

    <div id="header">
        <div id="balance">💰 <span id="val">0</span></div>
        <div style="opacity: 0.4; font-size: 11px;">AUTO-MINING: +<span id="ps">0</span>/SEC</div>
    </div>

    <div id="tap-target" onclick="tap(event)">
        <div id="ground"></div>
        <svg id="donald-scene" viewBox="0 0 200 200">
            <path d="M160 200 Q150 150 160 50" stroke="#5D4037" stroke-width="12" fill="none"/>
            <g id="body" filter="drop-shadow(0 0 10px gold)">
                <ellipse cx="100" cy="130" rx="30" ry="40" fill="white" stroke="black"/>
                <circle cx="100" cy="80" r="22" fill="white" stroke="black"/>
                <ellipse cx="90" cy="75" rx="3" ry="6" fill="black"/>
                <ellipse cx="110" cy="75" rx="3" ry="6" fill="black"/>
                <path d="M80 95 Q100 115 120 95 Z" fill="#FF8800" stroke="black"/>
                <path d="M90 60 L110 60 L100 50 Z" fill="#0044FF"/>
            </g>
        </svg>
    </div>

    <div id="nav">
        <div class="nav-link active" onclick="show('game')">🏠<span>Main</span></div>
        <div class="nav-link" onclick="show('shop')">🚀<span>Empire</span></div>
        <div class="nav-link" onclick="show('stars')">💎<span>Donate</span></div>
    </div>

    <div id="shop" class="modal">
        <h1 style="color:var(--gold); text-align:center;">EMPIRE HUB</h1>
        <div class="item-card" style="border-color: #00F2FF;">
            <div><b>Quantum Tap</b><span>Cost: <span id="c1">100</span>💰</span></div>
            <button class="buy-btn" onclick="buy(1)">UP</button>
        </div>
        <div class="item-card" style="border-color: #BC13FE;">
            <div><b>Auto Mine</b><span>Cost: <span id="c2">500</span>💰</span></div>
            <button class="buy-btn" onclick="buy(2)">UP</button>
        </div>
        <button onclick="show('game')" style="width: 100%; padding: 15px; background: none; border: none; color: #555;">BACK</button>
    </div>

    <div id="stars" class="modal">
        <h1 style="color:var(--gold); text-align:center;">VIP TREASURY</h1>
        <div class="item-card" style="border-color: #ff0055;">
            <div><b>1,000,000 COINS</b><span>Instantly</span></div>
            <button class="buy-btn" style="background: #0088CC; color: #fff;" onclick="alert('Stars...')">1000 ⭐</button>
        </div>
        <button onclick="show('game')" style="width: 100%; padding: 15px; background: none; border: none; color: #555;">CLOSE</button>
    </div>

    <script>
        let score = 0, tapPower = 1, auto = 0, costs = [100, 500];

        // ЗОЛОТОЙ ДОЖДЬ НА ФОНЕ
        const canvas = document.getElementById('bg-canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;
        let rain = Array.from({length: 40}, () => ({x: Math.random()*canvas.width, y: Math.random()*canvas.height, s: Math.random()*2+1}));
        
        function animateBg() {
            ctx.clearRect(0,0,canvas.width,canvas.height);
            ctx.fillStyle = "rgba(255, 215, 0, 0.15)";
            rain.forEach(p => { ctx.font = "20px serif"; ctx.fillText("💰", p.x, p.y); p.y += p.s; if(p.y > canvas.height) p.y = -20; });
            requestAnimationFrame(animateBg);
        }
        animateBg();

        function sync() {
            document.getElementById('val').innerText = Math.floor(score);
            document.getElementById('ps').innerText = auto;
            document.getElementById('c1').innerText = costs[0];
            document.getElementById('c2').innerText = costs[1];
        }

        // ТАП С РАЗЛЕТАЮЩИМИСЯ ЧАСТИЦАМИ
        function tap(e) {
            score += tapPower; sync();
            for(let i=0; i<6; i++) {
                let div = document.createElement('div'); div.className = 'tap-particle'; div.innerText = '💰';
                div.style.left = e.clientX + 'px'; div.style.top = e.clientY + 'px';
                div.style.setProperty('--x', (Math.random()-0.5)*300 + 'px');
                div.style.setProperty('--y', (Math.random()-0.5)*300 + 'px');
                document.body.appendChild(div); setTimeout(() => div.remove(), 700);
            }
        }

        function show(id) {
            document.querySelectorAll('.modal').forEach(m => m.style.display = 'none');
            if(id !== 'game') document.getElementById(id).style.display = 'block';
        }

        function buy(n) {
            let i = n - 1;
            if(score >= costs[i]) {
                score -= costs[i]; if(n===1) tapPower += 3; else auto += 10;
                costs[i] *= 3; sync();
            }
        }

        setInterval(() => { score += auto; sync(); }, 1000);
    </script>
</body>
</html>
