<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Donald Gold Elite V8</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --gold: #FFD700; --bg: #010305; }
        body { margin: 0; background: var(--bg); color: white; font-family: 'Segoe UI', Roboto, sans-serif; height: 100vh; overflow: hidden; display: flex; flex-direction: column; }
        
        /* ЖИВОЙ ФОН */
        #bg-canvas { position: fixed; inset: 0; z-index: -1; background: radial-gradient(circle at 50% 40%, #0d1e36 0%, #010305 100%); }
        .particle { position: absolute; pointer-events: none; animation: float linear infinite; opacity: 0.6; }
        @keyframes float { 0% { transform: translateY(110vh) scale(0); opacity: 0; } 50% { opacity: 0.8; } 100% { transform: translateY(-10vh) scale(1.2); opacity: 0; } }

        /* ВЕРХНЯЯ ПАНЕЛЬ */
        header { padding: 45px 20px 10px; text-align: center; z-index: 100; }
        #balance-box { background: rgba(255,255,255,0.03); padding: 18px; border-radius: 30px; backdrop-filter: blur(20px); border: 1px solid rgba(255,215,0,0.3); box-shadow: 0 0 30px rgba(0,0,0,0.5); position: relative; }
        #balance { font-size: 50px; font-weight: 900; color: var(--gold); text-shadow: 0 0 20px rgba(255,215,0,0.4); }
        .energy-wrapper { width: 100%; height: 8px; background: rgba(255,255,255,0.1); border-radius: 4px; margin-top: 15px; overflow: hidden; }
        #energy-bar { height: 100%; width: 100%; background: linear-gradient(90deg, #FFD700, #FFA500); transition: width 0.2s; box-shadow: 0 0 10px var(--gold); }

        /* ИГРОВОЕ ПОЛЕ */
        #game { flex: 1; display: flex; align-items: center; justify-content: center; position: relative; perspective: 1000px; }
        #donald { width: 280px; height: 280px; object-fit: contain; filter: drop-shadow(0 20px 40px rgba(0,0,0,0.8)); transition: transform 0.1s cubic-bezier(0.17, 0.67, 0.83, 0.67); user-select: none; -webkit-user-drag: none; }
        .jump-anim { transform: scale(1.1) translateY(-40px) rotate(5deg) !important; }

        /* ЛЕТЯЩИЙ ДОНАЛЬД */
        .fly-donald { position: fixed; width: 40px; pointer-events: none; z-index: 200; animation: flyToBalance 0.8s cubic-bezier(0.1, 0.5, 0.5, 1) forwards; }
        @keyframes flyToBalance { 0% { opacity: 1; transform: scale(1); } 100% { opacity: 0; transform: translate(var(--tx), var(--ty)) scale(0.2); } }

        /* МЕНЮ */
        nav { position: fixed; bottom: 25px; width: 92%; left: 4%; height: 75px; background: rgba(10,20,30,0.9); border-radius: 25px; display: flex; justify-content: space-around; align-items: center; border: 1px solid rgba(255,255,255,0.1); backdrop-filter: blur(20px); }
        .nav-btn { text-align: center; opacity: 0.4; font-size: 11px; cursor: pointer; transition: 0.3s; color: white; }
        .nav-btn.active { opacity: 1; color: var(--gold); transform: translateY(-5px); }
        .nav-btn span { font-size: 24px; display: block; margin-bottom: 2px; }

        /* МОДАЛКИ */
        .modal { display: none; position: fixed; inset: 0; background: rgba(1,3,5,0.98); padding: 30px 20px; z-index: 1000; overflow-y: auto; }
        .card { background: rgba(255,255,255,0.05); border-radius: 20px; padding: 20px; margin-bottom: 15px; display: flex; align-items: center; justify-content: space-between; border: 1px solid rgba(255,255,255,0.1); }
        .buy-btn { background: var(--gold); border: none; padding: 12px 20px; border-radius: 12px; font-weight: 900; color: #000; }
        .buy-btn.owned { background: #2ecc71; color: white; }
    </style>
</head>
<body>

<div id="bg-canvas"></div>

<header id="header">
    <div id="balance-box">
        <div id="balance">💰 <span id="score">0</span></div>
        <div class="energy-wrapper"><div id="energy-bar"></div></div>
        <div style="font-size:12px; margin-top:8px; opacity:0.7;">⚡️ <span id="energy-num">1000</span> / 1000</div>
    </div>
</header>

<div id="game" onmousedown="tap(event)" ontouchstart="tap(event)">
    <img id="donald" src="https://www.pngarts.com/files/3/Donald-Duck-PNG-Transparent-Image.png" alt="Donald">
</div>

<nav>
    <div class="nav-btn active" onclick="show('main', this)"><span>🏠</span>Farm</div>
    <div class="nav-item nav-btn" onclick="show('shop', this)"><span>🚀</span>Shop</div>
    <div class="nav-item nav-btn" onclick="show('skins', this)"><span>👕</span>Outfits</div>
    <div class="nav-item nav-btn" onclick="show('donate', this)"><span>💎</span>Donate</div>
</nav>

<div id="shop" class="modal">
    <h2 style="text-align:center; color:var(--gold)">UPGRADES</h2>
    <div class="card"><div><b>Golden Seed</b><br><small>+2 per tap</small></div><button class="buy-btn" onclick="buy('tap')">💰 <span id="c-tap">100</span></button></div>
    <div class="card"><div><b>Tractor</b><br><small>+10 per sec</small></div><button class="buy-btn" onclick="buy('auto')">💰 <span id="c-auto">500</span></button></div>
    <button onclick="show('main')" style="width:100%; padding:20px; background:none; color:gray; border:none;">BACK</button>
</div>

<div id="skins" class="modal">
    <h2 style="text-align:center; color:var(--gold)">WARDROBE</h2>
    <div id="skin-list"></div>
    <button onclick="show('main')" style="width:100%; padding:20px; background:none; color:gray; border:none;">BACK</button>
</div>

<div id="donate" class="modal">
    <h2 style="text-align:center; color:var(--gold)">DONATE</h2>
    <div class="card">
        <div><b>Premium Pack</b><br><small>Support the Dev</small></div>
        <a href="https://t.me/wallet?startapp=transfer-UQAkVfSEE83-fup86oEFV6a7rxgD5DKPfoEfVVDUk8C1WeEQ" class="buy-btn" style="text-decoration:none;">SEND TON</a>
    </div>
    <button onclick="show('main')" style="width:100%; padding:20px; background:none; color:gray; border:none;">BACK</button>
</div>

<script>
    const tg = window.Telegram.WebApp;
    tg.expand();

    let state = JSON.parse(localStorage.getItem('donald_v8')) || {
        score: 0, tap: 1, auto: 0, cTap: 100, cAuto: 500,
        energy: 1000, skins: [0], currentSkin: 0
    };

    const skins = [
        { name: "Classic", img: "https://www.pngarts.com/files/3/Donald-Duck-PNG-Transparent-Image.png", price: 0 },
        { name: "Rich Boy", img: "https://static.wikia.nocookie.net/disney/images/c/c5/Donald_Duck_standard.png", price: 5000 },
        { name: "Sheikh", img: "https://www.pngall.com/wp-content/uploads/15/Donald-Duck-PNG-Cutout.png", price: 50000 }
    ];

    function save() { localStorage.setItem('donald_v8', JSON.stringify(state)); }

    function update() {
        document.getElementById('score').innerText = Math.floor(state.score);
        document.getElementById('energy-num').innerText = Math.floor(state.energy);
        document.getElementById('energy-bar').style.width = (state.energy / 10) + '%';
        document.getElementById('c-tap').innerText = state.cTap;
        document.getElementById('c-auto').innerText = state.cAuto;
        document.getElementById('donald').src = skins[state.currentSkin].img;
        renderSkins();
        save();
    }

    function tap(e) {
        if (state.energy < 1) return;
        if (e.type === 'touchstart') e.preventDefault();

        state.score += state.tap;
        state.energy -= 1;

        // Вибрация
        tg.HapticFeedback.impactOccurred('medium');

        // Прыжок
        const img = document.getElementById('donald');
        img.classList.remove('jump-anim');
        void img.offsetWidth;
        img.classList.add('jump-anim');

        // Летающий мини-Дональд
        const x = e.clientX || e.touches[0].clientX;
        const y = e.clientY || e.touches[0].clientY;
        createFlyingDonald(x, y);
        
        update();
    }

    function createFlyingDonald(x, y) {
        const f = document.createElement('img');
        f.src = skins[state.currentSkin].img;
        f.className = 'fly-donald';
        f.style.left = x - 20 + 'px';
        f.style.top = y - 20 + 'px';
        
        const target = document.getElementById('balance').getBoundingClientRect();
        const tx = target.left - x + 50;
        const ty = target.top - y + 20;
        
        f.style.setProperty('--tx', `${tx}px`);
        f.style.setProperty('--ty', `${ty}px`);
        
        document.body.appendChild(f);
        setTimeout(() => f.remove(), 800);
    }

    function buy(type) {
        if (type === 'tap' && state.score >= state.cTap) { state.score -= state.cTap; state.tap += 2; state.cTap *= 3; }
        if (type === 'auto' && state.score >= state.cAuto) { state.score -= state.cAuto; state.auto += 10; state.cAuto *= 3; }
        update();
    }

    function renderSkins() {
        const container = document.getElementById('skin-list');
        container.innerHTML = '';
        skins.forEach((s, i) => {
            const owned = state.skins.includes(i);
            container.innerHTML += `
                <div class="card">
                    <div><b>${s.name}</b><br><small>${owned ? 'Owned' : 'Price: '+s.price}</small></div>
                    <button class="buy-btn ${owned ? 'owned' : ''}" onclick="${owned ? `selectSkin(${i})` : `buySkin(${i})`}">
                        ${owned ? (state.currentSkin === i ? 'ACTIVE' : 'WEAR') : 'BUY'}
                    </button>
                </div>`;
        });
    }

    function buySkin(i) { if(state.score >= skins[i].price) { state.score -= skins[i].price; state.skins.push(i); update(); } }
    function selectSkin(i) { state.currentSkin = i; update(); }

    function show(id, el) {
        document.querySelectorAll('.modal').forEach(m => m.style.display = 'none');
        if (id !== 'main') document.getElementById(id).style.display = 'block';
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        if (el) el.classList.add('active');
    }

    // ЗОЛОТЫЕ ЧАСТИЦЫ НА ФОНЕ
    setInterval(() => {
        const p = document.createElement('div');
        p.className = 'particle';
        p.innerText = Math.random() > 0.5 ? '🪙' : '✨';
        p.style.left = Math.random() * 100 + 'vw';
        p.style.fontSize = Math.random() * 20 + 10 + 'px';
        p.style.animationDuration = Math.random() * 3 + 2 + 's';
        document.getElementById('bg-canvas').appendChild(p);
        setTimeout(() => p.remove(), 5000);
    }, 400);

    setInterval(() => {
        state.score += state.auto / 10;
        if (state.energy < 1000) state.energy += 1;
        update();
    }, 100);

    update();
</script>
</body>
</html>
