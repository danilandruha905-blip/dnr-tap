<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Donald Coin ULTRA</title>

<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>
:root {
  --gold: #FFD700;
  --bg: #0a0a0a;
}

body {
  margin: 0;
  background: var(--bg);
  color: white;
  font-family: Arial;
  overflow: hidden;
  text-align: center;
}

/* 🌈 ЖИВОЙ ФОН */
.bg {
  position: fixed;
  width: 100%;
  height: 100%;
  background: linear-gradient(270deg, #ffcc00, #ff0000, #000);
  background-size: 600% 600%;
  animation: gradient 10s ease infinite;
  z-index: -1;
}

@keyframes gradient {
  0% { background-position: 0% }
  50% { background-position: 100% }
  100% { background-position: 0% }
}

/* 💰 UI */
.container {
  margin-top: 80px;
}

#balance {
  font-size: 48px;
  font-weight: bold;
}

#energy {
  margin-top: 10px;
  font-size: 18px;
}

/* ⚡ энергия бар */
.bar {
  width: 80%;
  height: 10px;
  background: #333;
  margin: 10px auto;
  border-radius: 10px;
}

.fill {
  height: 100%;
  background: lime;
  width: 100%;
  border-radius: 10px;
}

/* 💥 кнопка */
.tap {
  margin-top: 40px;
  width: 180px;
  height: 180px;
  border-radius: 50%;
  background: radial-gradient(circle, gold, orange);
  font-size: 24px;
  border: none;
  transition: 0.1s;
}

.tap:active {
  transform: scale(0.9);
}

/* ✨ эффект цифр */
.coin {
  position: absolute;
  font-size: 20px;
  color: gold;
  animation: fly 1s forwards;
}

@keyframes fly {
  to {
    transform: translateY(-100px);
    opacity: 0;
  }
}
</style>
</head>

<body>

<div class="bg"></div>

<div class="container">
  <div id="balance">0</div>
  <div id="energy">⚡ 100 / 100</div>

  <div class="bar">
    <div class="fill" id="bar"></div>
  </div>

  <button class="tap" onclick="tap()">TAP</button>
</div>

<script>
let balance = 0;
let energy = 100;
let maxEnergy = 100;

const tg = window.Telegram.WebApp;
tg.expand();

function updateUI() {
  document.getElementById("balance").innerText = balance + " DC";
  document.getElementById("energy").innerText = "⚡ " + energy + " / " + maxEnergy;
  document.getElementById("bar").style.width = (energy/maxEnergy*100)+"%";
}

function tap() {
  if (energy <= 0) return;

  balance++;
  energy--;

  updateUI();

  // 💥 анимация +1
  let el = document.createElement("div");
  el.className = "coin";
  el.innerText = "+1";
  el.style.left = (window.innerWidth/2 + Math.random()*50-25)+"px";
  el.style.top = "50%";
  document.body.appendChild(el);

  setTimeout(()=>el.remove(),1000);

  // 📡 отправка в бота
  tg.sendData("tap");
}

// ⚡ реген энергии
setInterval(()=>{
  if (energy < maxEnergy) {
    energy++;
    updateUI();
  }
}, 1000);

updateUI();
</script>

</body>
</html>
