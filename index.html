<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Donald Golden Elite</title>
    <style>
        :root { --gold: #ffd700; --glass: rgba(255, 255, 255, 0.1); }
        body { 
            background: #000; color: white; font-family: 'Arial', sans-serif; 
            margin: 0; display: flex; flex-direction: column; align-items: center; 
            height: 100vh; overflow: hidden; user-select: none;
        }

        /* Живой фон */
        body::before {
            content: ''; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at center, #003366 0%, #000 100%);
            z-index: -2;
        }
        #gold-rain { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; pointer-events: none; }

        /* ВЕРХНЯЯ ПАНЕЛЬ - ТЕПЕРЬ ПРОЗРАЧНАЯ */
        #header { 
            width: 90%; margin-top: 10px; padding: 15px; 
            text-align: center; z-index: 10;
        }
        #balance { 
            font-size: 54px; font-weight: 900; color: var(--gold); 
            text-shadow: 0 0 30px rgba(255, 215, 0, 0.8), 2px 2px 5px black; 
        }

        /* ДОНАЛЬД */
        #donald-btn {
            width: 270px; height: 270px; border-radius: 50%;
            background: url('https://www.pngarts.com/files/3/Donald-Duck-PNG-Transparent-Image.png') center/80% no-repeat,
                        radial-gradient(circle, #ffd700 0%, #b8860b 100%);
            border: 6px solid rgba(255,255,255,0.8); 
            box-shadow: 0 0 60px rgba(255, 215, 0, 0.4);
            margin-top: 40px; cursor: pointer; transition: transform 0.05s;
        }
        #donald-btn:active { transform: scale(0.92); }

        .fly-item {
            position: absolute; width: 50px; height: 50px;
            background: url('https://www.pngarts.com/files/3/Donald-Duck-PNG-Transparent-Image.png') center/contain no-repeat;
            pointer-events: none; z-index: 100;
            animation: flyToTop 0.8s ease-in forwards;
        }
        @keyframes flyToTop {
            0% { opacity: 1; transform: scale(1.2); }
            100% { opacity: 0; transform: translateY(-450px) scale(0.1); }
        }

        /* ЭНЕРГИЯ */
        #energy-box { width: 80%; margin-top: 40px; text-align: center; font-weight: bold; }
        #bar { width: 100%; height: 12px; background: rgba(0,0,0,0.5); border-radius: 20px; border: 1px solid var(--gold); overflow: hidden; }
        #fill { width: 100%; height: 100%; background: linear-gradient(90deg, #ffd700, #ff4500); transition: 0.3s; }

        /* НИЖНЕЕ МЕНЮ - СТИЛЬ "СТЕКЛО" */
        #footer { 
            position: fixed; bottom: 20px; width: 92%; 
            background: rgba(255, 255, 255, 0.07); 
            backdrop-filter: blur(15px); 
            border: 1px solid rgba(255, 215, 0, 0.3);
            border-radius: 25px; padding: 12px 0; 
            display: flex; justify-content: space-around; 
            z-index: 100; box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .nav-item { 
            text-align: center; color: #ccc; font-size: 11px; 
            transition: 0.3s; position: relative; flex: 1;
        }
        .nav-item span { font-size: 24px; display: block; margin-bottom: 2px; }
        .nav-item.active { 
            color: var(--gold); transform: translateY(-5px); 
            text-shadow: 0 0 10px gold;
        }
        .nav-item.active::after {
            content: ''; position: absolute; bottom: -8px; left: 50%; 
            transform: translateX(-50%); width: 5px; height: 5px; 
            background: var(--gold); border-radius: 50%; box-shadow: 0 0 10px gold;
        }

        /* ОКНА */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,20,0.98); z-index: 1000; padding: 30px 20px; box-sizing: border-box; }
        .card { background: rgba(255,215,0,0.1); border: 1px solid var(--gold); border-radius: 20px; padding: 20px; margin-bottom: 15px; display: flex; justify-content: space-between; align-items: center; }
        .btn-buy { background: var(--gold); color: #000; border: none; padding: 12px 20px; border-radius: 12px; font-weight: bold; }
        .close-btn { background: #ff4444; color: white; width: 100%; padding: 15px; border-radius: 15px; border: none; font-weight: bold; margin-top: 20px; }
    </style>
</head>
<body>
    <canvas id="gold-rain"></canvas>
    
    <div id="header">
        <div style="color: #aaa; font-size: 14px; text-transform: uppercase; letter-spacing: 1px;">Profit per sec: +<span id="ps">0</span></div>
        <div id="balance">💰 <span id="val">0</span></div>
    </div>

    <div id="donald-btn"></div>

    <div id="energy-box">
        <div style="margin-bottom: 10px; font-size: 18px;">⚡ <span id="e">1000</span></div>
        <div id="bar"><div id="fill"></div></div>
    </div>

    <div id="footer">
        <div class="nav-item active" onclick="closeModals(this)"><span>🏠</span>Home</div>
        <div class="nav-item" onclick="openModal('shop', this)"><span>🚀</span>Mining</div>
        <div class="nav-item" onclick="openModal('donate', this)"><span>💎</span>Stars</div>
    </div>

    <div id="shop" class="modal">
        <h1 style="color:var(--gold); text-align:center;">MARKET</h1>
        <div class="card">
            <div><b>Elite Tap</b><br>Price: <span id="c1">100</span></div>
            <button class="btn-buy" onclick="buy(1)">UPGRADE</button>
        </div>
        <div class="card">
            <div><b>Duck Factory</b><br>Price: <span id="c2">500</span></div>
            <button class="btn-buy" onclick="buy(2)">UPGRADE</button>
        </div>
        <button class="close-btn" onclick="closeModals()">GO BACK</button>
    </div>

    <div id="donate" class="modal">
        <h1 style="color:var(--gold); text-align:center;">DONATE</h1>
        <div class="card">
            <div><b>1,000,000 COINS</b><br>Price: 1000 ⭐</div>
            <button class="btn-buy" style="background:#0088cc; color:white;" onclick="alert('Stars payment...')">BUY</button>
        </div>
        <button class="close-btn" onclick="closeModals()">GO BACK</button>
    </div>

    <script>
        // --- Золотой дождь ---
        const canvas = document.getElementById('gold-rain');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;
        const goldParticles = [];
        const types = ['💰', '💵', '✨', '🪙'];

        class Particle {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height - canvas.height;
                this.size = Math.random() * 20 + 10;
                this.speed = Math.random() * 2.5 + 1.5;
                this.type = types[Math.floor(Math.random() * types.length)];
                this.angle = Math.random() * 360;
            }
            update() {
                this.y += this.speed; this.angle += 1;
                if (this.y > canvas.height) { this.y = -50; this.x = Math.random() * canvas.width; }
            }
            draw() {
                ctx.save(); ctx.translate(this.x, this.y); ctx.rotate(this.angle * Math.PI / 180);
                ctx.font = `${this.size}px serif`; ctx.fillText(this.type, 0, 0); ctx.restore();
            }
        }
        for (let i = 0; i < 40; i++) goldParticles.push(new Particle());
        function animate() {
            ctx.clearRect(0,0,canvas.width,canvas.height);
            goldParticles.forEach(p => { p.update(); p.draw(); });
            requestAnimationFrame(animate);
        }
        animate();

        // --- Логика ---
        let score = 0, energy = 1000, tap = 1, income = 0;
        let costs = [100, 500];

        function updateUI() {
            document.getElementById('val').innerText = Math.floor(score);
            document.getElementById('e').innerText = energy;
            document.getElementById('fill').style.width = (energy/10) + '%';
            document.getElementById('ps').innerText = income;
            document.getElementById('c1').innerText = costs[0];
            document.getElementById('c2').innerText = costs[1];
        }

        document.getElementById('donald-btn').addEventListener('pointerdown', (e) => {
            if (energy < tap) return;
            score += tap; energy -= tap; updateUI();
            const fly = document.createElement('div');
            fly.className = 'fly-item';
            fly.style.left = (e.clientX - 25) + 'px'; fly.style.top = (e.clientY - 25) + 'px';
            document.body.appendChild(fly);
            setTimeout(() => fly.remove(), 800);
        });

        function openModal(id, el) {
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            el.classList.add('active');
            document.getElementById(id).style.display = 'block';
        }
        function closeModals(el) {
            document.querySelectorAll('.modal').forEach(m => m.style.display = 'none');
            if(el) {
                document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
                el.classList.add('active');
            }
        }

        function buy(id) {
            let idx = id - 1;
            if (score >= costs[idx]) {
                score -= costs[idx];
                if (id === 1) tap += 1; else income += 10;
                costs[idx] = Math.floor(costs[idx] * 2);
                updateUI();
            }
        }

        setInterval(() => { score += income; if(energy < 1000) energy = Math.min(1000, energy + 5); updateUI(); }, 1000);
    </script>
</body>
</html>
