<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Donald Elite Combat</title>
    <style>
        :root { --gold: #ffd700; --neon-blue: #00f2ff; --neon-green: #39ff14; }
        body { 
            background: #000; color: white; font-family: 'Arial Black', sans-serif; 
            margin: 0; display: flex; flex-direction: column; align-items: center; 
            height: 100vh; overflow: hidden; user-select: none;
        }

        /* Анимированный фон с частицами */
        body::before {
            content: ''; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at center, #002244 0%, #000 100%);
            z-index: -2;
        }
        #gold-rain { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; pointer-events: none; }

        /* Шапка */
        #header { width: 100%; padding: 20px 0; text-align: center; z-index: 10; }
        #balance { 
            font-size: 56px; font-weight: 900; color: var(--gold); 
            text-shadow: 0 0 25px rgba(255, 215, 0, 0.7); 
        }

        /* Дональд */
        #donald-btn {
            width: 260px; height: 260px; border-radius: 50%;
            background: url('https://www.pngarts.com/files/3/Donald-Duck-PNG-Transparent-Image.png') center/80% no-repeat,
                        radial-gradient(circle, #ffd700 0%, #b8860b 100%);
            border: 6px solid #fff; box-shadow: 0 0 50px rgba(255, 215, 0, 0.5);
            margin-top: 30px; cursor: pointer; transition: transform 0.05s;
        }
        #donald-btn:active { transform: scale(0.9); }

        .fly-item {
            position: absolute; width: 50px; height: 50px;
            background: url('https://www.pngarts.com/files/3/Donald-Duck-PNG-Transparent-Image.png') center/contain no-repeat;
            pointer-events: none; z-index: 100;
            animation: flyToTop 0.8s ease-in forwards;
        }
        @keyframes flyToTop {
            0% { opacity: 1; transform: scale(1.3); }
            100% { opacity: 0; transform: translateY(-450px) scale(0.2); }
        }

        /* Энергия */
        #energy-box { width: 85%; margin-top: 35px; text-align: center; }
        #bar { width: 100%; height: 14px; background: rgba(255,255,255,0.1); border-radius: 20px; border: 1px solid var(--gold); overflow: hidden; }
        #fill { width: 100%; height: 100%; background: linear-gradient(90deg, var(--gold), #ff8800); transition: 0.3s; }

        /* Нижнее меню (Стеклянное) */
        #footer { 
            position: fixed; bottom: 20px; width: 90%; 
            background: rgba(255, 255, 255, 0.08); backdrop-filter: blur(20px); 
            border: 1px solid rgba(255, 215, 0, 0.4); border-radius: 30px; 
            padding: 15px 0; display: flex; justify-content: space-around; z-index: 50;
        }
        .nav-item { text-align: center; color: #bbb; font-size: 12px; flex: 1; transition: 0.3s; }
        .nav-item span { font-size: 26px; display: block; }
        .nav-item.active { color: var(--gold); transform: translateY(-5px); text-shadow: 0 0 10px gold; }

        /* --- КРАСИВЫЕ ОКНА МАГАЗИНА И ДОНАТА --- */
        .modal { 
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,10,0.95); z-index: 1000; padding: 25px; box-sizing: border-box;
            animation: modalFade 0.4s cubic-bezier(0.18, 0.89, 0.32, 1.28); 
        }
        @keyframes modalFade {
            from { opacity: 0; transform: scale(0.8) translateY(50px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }

        .card { 
            background: linear-gradient(135deg, rgba(255,215,0,0.15) 0%, rgba(0,0,0,0.4) 100%);
            border: 2px solid var(--gold); border-radius: 25px; padding: 20px; 
            margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center;
            box-shadow: 0 5px 15px rgba(0,0,0,0.5); transition: 0.2s;
        }
        .card:active { transform: scale(0.98); }
        
        .card b { font-size: 20px; color: var(--gold); text-shadow: 0 0 5px rgba(255,215,0,0.5); }
        .card small { color: #ccc; font-family: sans-serif; }

        .btn-buy { 
            background: linear-gradient(to bottom, var(--gold), #cc9900); 
            color: #000; border: none; padding: 12px 22px; border-radius: 15px; 
            font-weight: bold; font-size: 14px; box-shadow: 0 4px 0 #886600;
        }
        .btn-buy:active { box-shadow: none; transform: translateY(3px); }

        .btn-stars {
            background: linear-gradient(to bottom, #00d2ff, #0088cc);
            color: white; border: none; padding: 12px 22px; border-radius: 15px;
            font-weight: bold; font-size: 14px; box-shadow: 0 4px 0 #005588;
        }

        .close-btn { 
            background: rgba(255, 68, 68, 0.2); color: #ff4444; border: 1px solid #ff4444;
            width: 100%; padding: 18px; border-radius: 20px; font-weight: bold; margin-top: 10px;
        }
    </style>
</head>
<body>
    <canvas id="gold-rain"></canvas>
    
    <div id="header">
        <div style="color: #888; font-size: 12px; letter-spacing: 2px;">INCOME: +<span id="ps">0</span>/SEC</div>
        <div id="balance">💰 <span id="val">0</span></div>
    </div>

    <div id="donald-btn"></div>

    <div id="energy-box">
        <div style="margin-bottom: 8px;">⚡ <span id="e">1000</span></div>
        <div id="bar"><div id="fill"></div></div>
    </div>

    <div id="footer">
        <div class="nav-item active" onclick="closeModals(this)"><span>🏠</span>Home</div>
        <div class="nav-item" onclick="openModal('shop', this)"><span>🚀</span>Mining</div>
        <div class="nav-item" onclick="openModal('donate', this)"><span>💎</span>Stars</div>
    </div>

    <div id="shop" class="modal">
        <h1 style="color:var(--gold); text-align:center; font-size: 32px; text-shadow: 0 0 15px gold;">UPGRADES</h1>
        <div class="card" style="border-color: var(--neon-green);">
            <div><b>Golden Tap</b><br><small>+2 per click</small><br>Price: <span id="c1">100</span></div>
            <button class="btn-buy" onclick="buy(1)">UPGRADE</button>
        </div>
        <div class="card" style="border-color: var(--neon-blue);">
            <div><b>Duck Miner</b><br><small>+10 per sec</small><br>Price: <span id="c2">500</span></div>
            <button class="btn-buy" onclick="buy(2)">UPGRADE</button>
        </div>
        <button class="close-btn" onclick="closeModals()">BACK TO WORK</button>
    </div>

    <div id="donate" class="modal">
        <h1 style="color:var(--neon-blue); text-align:center; font-size: 32px; text-shadow: 0 0 15px #00f2ff;">ELITE STORE</h1>
        <div class="card" style="border-color: #ff00ff; background: rgba(255,0,255,0.05);">
            <div><b>STRIKE PACK</b><br><small>50,000 COINS</small></div>
            <button class="btn-stars" onclick="alert('Stars...')">100 ⭐</button>
        </div>
        <div class="card" style="border-color: var(--gold);">
            <div><b>RICH DUCK</b><br><small>1,000,000 COINS</small></div>
            <button class="btn-stars" style="background: linear-gradient(to bottom, #ffd700, #ff8800);" onclick="alert('Stars...')">1000 ⭐</button>
        </div>
        <button class="close-btn" onclick="closeModals()">NOT NOW</button>
    </div>

    <script>
        // --- Золотой дождь (💰💵✨) ---
        const canvas = document.getElementById('gold-rain');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;
        const goldParticles = [];
        const types = ['💰', '💵', '✨', '💎'];

        class Particle {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height - canvas.height;
                this.size = Math.random() * 20 + 10;
                this.speed = Math.random() * 3 + 1;
                this.type = types[Math.floor(Math.random() * types.length)];
                this.angle = Math.random() * 360;
            }
            update() {
                this.y += this.speed; this.angle += 2;
                if (this.y > canvas.height) { this.y = -50; this.x = Math.random() * canvas.width; }
            }
            draw() {
                ctx.save(); ctx.translate(this.x, this.y); ctx.rotate(this.angle * Math.PI / 180);
                ctx.font = `${this.size}px serif`; ctx.fillText(this.type, 0, 0); ctx.restore();
            }
        }
        for (let i = 0; i < 40; i++) goldParticles.push(new Particle());
        function animate() {
            ctx.clearRect(0,0,canvas.width,canvas.height);
            goldParticles.forEach(p => { p.update(); p.draw(); });
            requestAnimationFrame(animate);
        }
        animate();

        // --- Логика Игры ---
        let score = 0, energy = 1000, tap = 1, income = 0;
        let costs = [100, 500];

        function updateUI() {
            document.getElementById('val').innerText = Math.floor(score);
            document.getElementById('e').innerText = energy;
            document.getElementById('fill').style.width = (energy/10) + '%';
            document.getElementById('ps').innerText = income;
            document.getElementById('c1').innerText = costs[0];
            document.getElementById('c2').innerText = costs[1];
        }

        document.getElementById('donald-btn').addEventListener('pointerdown', (e) => {
            if (energy < tap) return;
            score += tap; energy -= tap; updateUI();
            const fly = document.createElement('div');
            fly.className = 'fly-item';
            fly.style.left = (e.clientX - 25) + 'px'; fly.style.top = (e.clientY - 25) + 'px';
            document.body.appendChild(fly);
            setTimeout(() => fly.remove(), 800);
        });

        function openModal(id, el) {
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            el.classList.add('active');
            document.getElementById(id).style.display = 'block';
        }
        function closeModals(el) {
            document.querySelectorAll('.modal').forEach(m => m.style.display = 'none');
            if(el) {
                document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
                el.classList.add('active');
            }
        }

        function buy(id) {
            let idx = id - 1;
            if (score >= costs[idx]) {
                score -= costs[idx];
                if (id === 1) tap += 2; else income += 10;
                costs[idx] = Math.floor(costs[idx] * 2.2);
                updateUI();
            }
        }

        setInterval(() => { score += income; if(energy < 1000) energy = Math.min(1000, energy + 6); updateUI(); }, 1000);
    </script>
</body>
</html>
