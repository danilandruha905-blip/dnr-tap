<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Donald Gold Ultimate</title>
    <style>
        :root { --gold: #FFD700; --neon: #00F2FF; --bg: #020508; }
        
        body { 
            margin: 0; padding: 0; background: var(--bg); color: white;
            font-family: -apple-system, system-ui, sans-serif;
            height: 100vh; overflow: hidden; display: flex; flex-direction: column;
        }

        #viewport { position: fixed; inset: 0; z-index: -1; background: radial-gradient(circle at 50% 30%, #0a192f 0%, #020508 100%); perspective: 1000px; }
        .money-particle { position: absolute; top: -10vh; pointer-events: none; animation: fall-real linear forwards; }
        @keyframes fall-real { 0% { transform: translateY(0) rotate(0); opacity: 0; } 10% { opacity: 1; } 100% { transform: translateY(110vh) rotate(360deg); opacity: 0; } }

        header { padding: 40px 20px 10px; text-align: center; z-index: 10; }
        #balance-box { background: rgba(255, 255, 255, 0.03); padding: 15px; border-radius: 28px; backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.1); }
        #balance { font-size: 48px; font-weight: 900; color: var(--gold); }

        /* ЭНЕРГИЯ */
        #energy-container { width: 80%; height: 12px; background: rgba(255,255,255,0.1); border-radius: 10px; margin: 15px auto; overflow: hidden; border: 1px solid rgba(255,255,255,0.05); }
        #energy-bar { height: 100%; width: 100%; background: linear-gradient(90deg, #ffcc00, #ffea00); transition: width 0.2s; box-shadow: 0 0 10px var(--gold); }
        #energy-text { font-size: 12px; margin-top: 5px; opacity: 0.8; }

        #game { flex: 1; display: flex; align-items: center; justify-content: center; position: relative; cursor: pointer; }
        #donald { width: 260px; height: 260px; object-fit: contain; filter: drop-shadow(0 20px 40px rgba(0,0,0,0.7)); transition: 0.1s; z-index: 5; }
        .jump { transform: translateY(-50px) scale(1.1) !important; }

        nav { position: fixed; bottom: 20px; left: 5%; width: 90%; height: 75px; background: rgba(10, 20, 30, 0.9); backdrop-filter: blur(30px); border-radius: 25px; display: flex; justify-content: space-around; align-items: center; border: 1px solid rgba(255,255,255,0.1); }
        .btn { text-align: center; flex: 1; opacity: 0.4; transition: 0.3s; color: white; cursor: pointer; }
        .btn.active { opacity: 1; color: var(--gold); }

        .modal { display: none; position: fixed; inset: 0; z-index: 2000; background: rgba(2, 5, 8, 0.98); padding: 30px 20px; overflow-y: auto; }
        .card { background: rgba(255,255,255,0.05); border-radius: 20px; padding: 15px; margin-bottom: 12px; display: flex; align-items: center; justify-content: space-between; border: 1px solid rgba(255,255,255,0.1); }
        .buy-btn { background: var(--gold); border: none; padding: 10px 15px; border-radius: 12px; font-weight: 800; color: #000; cursor: pointer; }
        .buy-btn.owned { background: #2ecc71; color: white; }
    </style>
</head>
<body>

    <div id="viewport"></div>

    <header>
        <div id="balance-box">
            <div id="balance">💰 <span id="score">0</span></div>
            <div id="energy-container"><div id="energy-bar"></div></div>
            <div id="energy-text">⚡️ <span id="cur-energy">1000</span> / 1000</div>
        </div>
    </header>

    <div id="game" onclick="handleTap(event)">
        <img id="donald" src="https://www.pngarts.com/files/3/Donald-Duck-PNG-Transparent-Image.png" alt="Donald">
    </div>

    <nav>
        <div class="btn active" onclick="show('main', this)">🏠<br>Farm</div>
        <div class="btn" onclick="show('shop', this)">🚀<br>Shop</div>
        <div class="btn" onclick="show('skins', this)">👕<br>Outfits</div>
        <div class="btn" onclick="show('donate', this)">💎<br>Donate</div>
    </nav>

    <div id="shop" class="modal">
        <h2>EMPIRE UPGRADES</h2>
        <div class="card"><div><b>Gold Corn</b><br><small>+2 per tap</small></div><button class="buy-btn" onclick="buy(1)">💰 <span id="c1">100</span></button></div>
        <div class="card"><div><b>Auto-Tractor</b><br><small>+10 per sec</small></div><button class="buy-btn" onclick="buy(2)">💰 <span id="c2">500</span></button></div>
        <button onclick="show('main')" style="color:gray; border:none; background:none; width:100%; padding:20px;">BACK</button>
    </div>

    <div id="skins" class="modal">
        <h2>CLOTHING SHOP</h2>
        <div id="skin-list"></div>
        <button onclick="show('main')" style="color:gray; border:none; background:none; width:100%; padding:20px;">BACK</button>
    </div>

    <div id="donate" class="modal">
        <h2>PREMIUM SHOP</h2>
        <div class="card">
            <div><b>Support Dev</b><br><small>Direct donation</small></div>
            <a href="https://t.me/wallet?startapp=transfer-UQAkVfSEE83-fup86oEFV6a7rxgD5DKPfoEfVVDUk8C1WeEQ" target="_blank" class="buy-btn" style="text-decoration:none;">SEND TON</a>
        </div>
        <button onclick="show('main')" style="color:gray; border:none; background:none; width:100%; padding:20px;">BACK</button>
    </div>

    <script>
        let g = JSON.parse(localStorage.getItem('donald_v6')) || {
            score: 0, tap: 1, auto: 0, c1: 100, c2: 500,
            energy: 1000, maxEnergy: 1000,
            skins: [0], currentSkin: 0
        };

        const skinData = [
            { name: "Classic", color: "none", price: 0 },
            { name: "Cyber Blue", color: "hue-rotate(180deg) brightness(1.2)", price: 5000 },
            { name: "Golden Rich", color: "sepia(1) saturate(5) brightness(1.1)", price: 25000 },
            { name: "Demon Fire", color: "hue-rotate(320deg) saturate(3) contrast(1.5)", price: 100000 }
        ];

        function save() { localStorage.setItem('donald_v6', JSON.stringify(g)); }

        function update() {
            document.getElementById('score').innerText = Math.floor(g.score);
            document.getElementById('c1').innerText = g.c1;
            document.getElementById('c2').innerText = g.c2;
            document.getElementById('cur-energy').innerText = Math.floor(g.energy);
            document.getElementById('energy-bar').style.width = (g.energy / g.maxEnergy * 100) + '%';
            document.getElementById('donald').style.filter = skinData[g.currentSkin].color;
            renderSkins();
            save();
        }

        function handleTap(e) {
            if(g.energy < 1) return;
            g.score += g.tap;
            g.energy -= 1;
            update();

            const img = document.getElementById('donald');
            img.classList.remove('jump'); void img.offsetWidth; img.classList.add('jump');

            const x = e.clientX || e.touches[0].clientX;
            const y = e.clientY || e.touches[0].clientY;
            const p = document.createElement('div');
            p.style.cssText = `position:fixed; left:${x}px; top:${y}px; color:gold; font-weight:900; pointer-events:none; animation: fall-real 0.6s forwards;`;
            p.innerText = `+${g.tap}`;
            document.body.appendChild(p);
            setTimeout(() => p.remove(), 600);
        }

        function buy(type) {
            if(type === 1 && g.score >= g.c1) { g.score -= g.c1; g.tap += 2; g.c1 *= 2; }
            if(type === 2 && g.score >= g.c2) { g.score -= g.c2; g.auto += 10; g.c2 *= 2; }
            update();
        }

        function renderSkins() {
            const list = document.getElementById('skin-list');
            list.innerHTML = '';
            skinData.forEach((s, i) => {
                const owned = g.skins.includes(i);
                list.innerHTML += `
                    <div class="card">
                        <div><b>${s.name}</b><br><small>${owned ? 'Unlocked' : 'Price: ' + s.price}</small></div>
                        <button class="buy-btn ${owned ? 'owned' : ''}" onclick="${owned ? `setSkin(${i})` : `buySkin(${i})`}">
                            ${owned ? (g.currentSkin === i ? 'ACTIVE' : 'WEAR') : 'BUY'}
                        </button>
                    </div>`;
            });
        }

        function setSkin(i) { g.currentSkin = i; update(); }
        function buySkin(i) { if(g.score >= skinData[i].price) { g.score -= skinData[i].price; g.skins.push(i); update(); } }

        function show(id, el) {
            document.querySelectorAll('.modal').forEach(m => m.style.display = 'none');
            if(id !== 'main') document.getElementById(id).style.display = 'block';
            document.querySelectorAll('.btn').forEach(b => b.classList.remove('active'));
            if(el) el.classList.add('active');
        }

        // Авто-доход и реген энергии
        setInterval(() => {
            g.score += g.auto / 10;
            if(g.energy < g.maxEnergy) g.energy += 0.5;
            update();
        }, 100);

        // Частицы фона
        setInterval(() => {
            const p = document.createElement('div');
            p.className = 'money-particle';
            p.innerText = Math.random() > 0.5 ? '🪙' : '💵';
            p.style.left = Math.random() * 100 + 'vw';
            p.style.animationDuration = (Math.random() * 2 + 2) + 's';
            document.getElementById('viewport').appendChild(p);
            setTimeout(() => p.remove(), 4000);
        }, 300);

        update();
    </script>
</body>
</html>
