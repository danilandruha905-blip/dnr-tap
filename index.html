<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Donald Combat</title>
    <style>
        body {
            background: radial-gradient(circle at center, #003366 0%, #000 100%);
            color: #ffd700; font-family: 'Arial Black', sans-serif; margin: 0; height: 100vh;
            display: flex; flex-direction: column; align-items: center; justify-content: center; overflow: hidden;
        }
        #score { font-size: 50px; margin-bottom: 20px; text-shadow: 0 0 15px #ffd700; }
        #coin-container { position: relative; perspective: 1000px; }
        #coin {
            width: 250px; height: 250px; border-radius: 50%;
            background: url('https://img.icons8.com/color/512/donald-duck.png') center/cover;
            border: 8px solid #ffd700; box-shadow: 0 0 30px #ffd700; transition: transform 0.1s;
        }
        .fly-duck {
            position: absolute; width: 60px; height: 60px;
            background: url('https://img.icons8.com/color/96/donald-duck.png') center/contain no-repeat;
            pointer-events: none; animation: fly 0.6s ease-out forwards; z-index: 100;
        }
        @keyframes fly { 0% { opacity: 1; transform: translateY(0) scale(1); } 100% { opacity: 0; transform: translateY(-350px) scale(0.5); } }
        #footer { position: fixed; bottom: 20px; width: 85%; background: rgba(0,0,0,0.8); padding: 15px; border-radius: 20px; border: 2px solid #ffd700; text-align: center; }
        #energy-bar { width: 100%; height: 12px; background: #333; border-radius: 6px; margin-top: 10px; overflow: hidden; border: 1px solid #555; }
        #energy-fill { height: 100%; width: 100%; background: linear-gradient(90deg, #ffd700, #ff8800); transition: 0.2s; }
    </style>
</head>
<body>
    <div id="score">💰 0</div>
    <div id="coin-container"><div id="coin"></div></div>
    <div id="footer">
        <div>⚡ Энергия: <span id="e-val">1000</span></div>
        <div id="energy-bar"><div id="energy-fill"></div></div>
        <button style="background:#ffd700; border:none; padding:10px; border-radius:10px; width:100%; font-weight:bold; margin-top:10px;">UPGRADES 🚀</button>
    </div>
    <script>
        let s = 0, e = 1000;
        const scoreEl = document.getElementById('score');
        const coin = document.getElementById('coin');
        coin.addEventListener('pointerdown', (event) => {
            if (e <= 0) return;
            s++; e--;
            scoreEl.innerText = '💰 ' + s;
            document.getElementById('e-val').innerText = e;
            document.getElementById('energy-fill').style.width = (e/10) + '%';
            const duck = document.createElement('div');
            duck.className = 'fly-duck';
            duck.style.left = event.clientX - 30 + 'px';
            duck.style.top = event.clientY - 30 + 'px';
            document.body.appendChild(duck);
            setTimeout(() => duck.remove(), 600);
            coin.style.transform = 'scale(0.95)';
        });
        coin.addEventListener('pointerup', () => coin.style.transform = 'scale(1)');
        setInterval(() => { if(e < 1000) { e++; document.getElementById('e-val').innerText = e; document.getElementById('energy-fill').style.width = (e/10) + '%'; } }, 1000);
    </script>
</body>
</html>
