<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Donald Golden Combat Pro</title>
    <style>
        :root { 
            --gold: #ffd700; 
            --neon-blue: #00f2ff; 
            --neon-green: #39ff14;
            --neon-pink: #ff00ff;
        }
        body { 
            background: #000; color: white; font-family: 'Segoe UI', sans-serif; 
            margin: 0; display: flex; flex-direction: column; align-items: center; 
            height: 100vh; overflow: hidden; user-select: none;
        }

        /* Глубокий анимированный фон */
        #gold-rain { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; pointer-events: none; }
        body::before {
            content: ''; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at center, #001a33 0%, #000 100%);
            z-index: -2; animation: bgGlow 10s infinite alternate;
        }
        @keyframes bgGlow { from { opacity: 0.8; } to { opacity: 1; } }

        /* Баланс - СТИЛЬНО И КРАСИВО */
        #header { width: 100%; padding: 30px 0; text-align: center; z-index: 10; }
        #balance-box { display: flex; align-items: center; justify-content: center; gap: 10px; }
        #balance { font-size: 65px; font-weight: 900; color: var(--gold); text-shadow: 0 0 35px rgba(255, 215, 0, 0.9); }
        .balance-img { width: 60px; height: 60px; filter: drop-shadow(0 0 10px gold); }
        #profit { color: #666; font-size: 16px; margin-top: -10px; letter-spacing: 1px; }

        /* ДОНАЛЬД - ГЛАВНАЯ ЗВЕЗДА! */
        #donald-btn {
            width: 275px; height: 275px; border-radius: 50%;
            /* ИСПОЛЬЗУЕМ КЛАССИЧЕСКОГО ЦВЕТНОГО ДОНАЛЬДА */
            background: url('https://w7.pngwing.com/pngs/30/157/png-transparent-donald-duck-illustration-donald-duck-daisy-duck-mickey-mouse-scrooge-mcduck-donald-duck-heroes-duck-cartoon-thumbnail.png') center/80% no-repeat,
                        radial-gradient(circle, #ffd700 0%, #b8860b 100%);
            border: 8px solid #fff; box-shadow: 0 0 70px rgba(255, 215, 0, 0.7);
            margin-top: 15px; cursor: pointer; transition: transform 0.05s; z-index: 5;
        }
        #donald-btn:active { transform: scale(0.92); }

        /* Энергия - СТИЛЬНЫЙ ПРОГРЕСС-БАР */
        #energy-container { width: 85%; margin-top: 35px; text-align: center; }
        #e-text { font-size: 18px; font-weight: bold; margin-bottom: 8px; color: #fff; }
        #bar { width: 100%; height: 12px; background: rgba(0,0,0,0.5); border-radius: 20px; border: 1px solid var(--gold); overflow: hidden; box-shadow: 0 0 10px rgba(255,215,0,0.2); }
        #fill { width: 100%; height: 100%; background: linear-gradient(90deg, #ffd700, #ff4500); transition: 0.3s; }

        /* СТИЛЬНОЕ НИЖНЕЕ МЕНЮ (ЦВЕТНЫЕ ИКОНКИ!) */
        #footer { 
            position: fixed; bottom: 15px; width: 94%; 
            background: rgba(20, 20, 40, 0.8); backdrop-filter: blur(15px); 
            border: 2px solid rgba(255, 215, 0, 0.4); border-radius: 30px; 
            padding: 12px 0; display: flex; justify-content: space-around; z-index: 100;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .nav-item { text-align: center; color: #aaa; font-size: 12px; flex: 1; transition: 0.3s; cursor: pointer; }
        /* ИСПОЛЬЗУЕМ ЯРКИЕ ЦВЕТНЫЕ ИКОНКИ */
        .nav-item img { width: 34px; height: 34px; display: block; margin: 0 auto 6px; transition: 0.3s; }
        .nav-item.active { color: var(--gold); transform: translateY(-3px); font-weight: bold; text-shadow: 0 0 10px gold;}
        .nav-item.active img { filter: drop-shadow(0 0 10px var(--gold)); }

        /* ПЛАВНЫЕ И НЕОНОВЫЕ ОКНА */
        .modal { 
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0, 0, 0, 0.92); backdrop-filter: blur(12px);
            z-index: 1000; padding: 25px; box-sizing: border-box;
            animation: modalSlide 0.4s cubic-bezier(0.18, 0.89, 0.32, 1.28) forwards;
        }
        @keyframes modalSlide {
            from { opacity: 0; transform: scale(0.8) translateY(100px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }

        .modal-title { font-size: 38px; color: var(--gold); text-align: center; margin-bottom: 25px; text-shadow: 0 0 20px var(--gold); letter-spacing: 2px; }

        .card { 
            background: rgba(255, 255, 255, 0.04);
            border-left: 5px solid var(--gold); border-radius: 20px; padding: 20px; 
            margin-bottom: 18px; display: flex; justify-content: space-between; align-items: center;
            box-shadow: 0 8px 15px rgba(0,0,0,0.4); transition: 0.2s;
        }
        .card:active { transform: scale(0.98); }
        .card-info b { font-size: 24px; display: block; color: #fff; text-shadow: 0 0 5px rgba(255,215,0,0.3); }
        .card-info span { color: var(--gold); font-size: 15px; font-weight: bold;}

        .buy-button { 
            background: linear-gradient(180deg, #ffd700 0%, #ff8800 100%);
            color: #000; border: none; padding: 14px 22px; border-radius: 14px;
            font-weight: 900; font-size: 15px; box-shadow: 0 4px 15px rgba(255,215,0,0.4);
        }

        .stars-button {
            background: linear-gradient(to bottom, var(--neon-blue), #0077aa);
            color: white; border: none; padding: 14px 22px; border-radius: 14px;
            font-weight: 900; font-size: 15px; box-shadow: 0 4px 15px rgba(0, 242, 255, 0.3);
        }

        .close-btn {
            width: 100%; padding: 18px; border-radius: 18px; border: 2px solid #555;
            background: rgba(255, 255, 255, 0.1); color: #fff; font-weight: bold; font-size: 16px; margin-top: 15px;
        }

        /* Эффект полета монет при тапе */
        .fly-item {
            position: absolute; width: 45px; height: 45px;
            background: url('https://img.icons8.com/emoji/96/money-bag-emoji.png') center/contain no-repeat;
            pointer-events: none; z-index: 100;
            animation: flyToTop 0.8s ease-in forwards;
        }
        @keyframes flyToTop {
            0% { opacity: 1; transform: scale(1.1); }
            100% { opacity: 0; transform: translateY(-420px) scale(0.3) rotate(20deg); }
        }
    </style>
</head>
<body>
    <canvas id="gold-rain"></canvas>
    
    <div id="header">
        <div id="balance-box">
            <img src="https://img.icons8.com/emoji/96/money-bag-emoji.png" class="balance-img">
            <div id="balance">0</div>
        </div>
        <div id="profit">ПРИБЫЛЬ: +<span id="ps">0</span>/сек</div>
    </div>

    <div id="donald-btn"></div>

    <div id="energy-container">
        <div id="e-text">⚡ <span id="e">1000</span> / 1000</div>
        <div id="bar"><div id="fill"></div></div>
    </div>

    <div id="footer">
        <div class="nav-item active" onclick="closeModals(this)">
            <img src="https://img.icons8.com/fluency/96/home.png">Home
        </div>
        <div class="nav-item" onclick="openModal('shop', this)">
            <img src="https://img.icons8.com/fluency/96/rocket.png">Mining
        </div>
        <div class="nav-item" onclick="openModal('donate', this)">
            <img src="https://img.icons8.com/fluency/96/diamond.png">Stars
        </div>
    </div>

    <div id="shop" class="modal">
        <div class="modal-title">MINING</div>
        <div class="card" style="border-left-color: var(--neon-green); box-shadow: 0 0 15px rgba(57, 255, 20, 0.3);">
            <div class="card-info"><b>Golden Click</b><span>Цена: <span id="c1">100</span> 💰</span></div>
            <button class="buy-button" onclick="buy(1)">UPGRADE</button>
        </div>
        <div class="card" style="border-left-color: var(--neon-blue); box-shadow: 0 0 15px rgba(0, 242, 255, 0.3);">
            <div class="card-info"><b>Auto Farm</b><span>Цена: <span id="c2">500</span> 💰</span></div>
            <button class="buy-button" onclick="buy(2)">UPGRADE</button>
        </div>
        <button class="close-btn" onclick="closeModals()">НАЗАД</button>
    </div>

    <div id="donate" class="modal">
        <div class="modal-title">ELITE STORE</div>
        <div class="card" style="border-left-color: var(--neon-pink); box-shadow: 0 0 15px rgba(255, 0, 255, 0.3); background: rgba(255,0,255,0.03);">
            <div class="card-info"><b>150,000 МОНЕТ</b><span>Пакет: Starter</span></div>
            <button class="stars-button" onclick="alert('Оплата Stars...')">150 ⭐</button>
        </div>
        <div class="card" style="border-left-color: var(--gold); box-shadow: 0 0 15px rgba(255, 215, 0, 0.4);">
            <div class="card-info"><b>1,500,000 МОНЕТ</b><span>Пакет: Whale</span></div>
            <button class="stars-button" onclick="alert('Оплата Stars...')">1000 ⭐</button>
        </div>
        <button class="close-btn" onclick="closeModals()">НАЗАД</button>
    </div>

    <script>
        // --- Золотой дождь (💰💵✨💎) ---
        const canvas = document.getElementById('gold-rain');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;
        const goldParticles = [];
        const types = ['💰', '💵', '✨', '💎'];

        class Particle {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height - canvas.height;
                this.size = Math.random() * 20 + 10;
                this.speed = Math.random() * 2.5 + 1.5;
                this.type = types[Math.floor(Math.random() * types.length)];
                this.angle = Math.random() * 360;
            }
            update() {
                this.y += this.speed; this.angle += 1;
                if (this.y > canvas.height) { this.y = -50; this.x = Math.random() * canvas.width; }
            }
            draw() {
                ctx.save(); ctx.translate(this.x, this.y); ctx.rotate(this.angle * Math.PI / 180);
                ctx.font = `${this.size}px serif`; ctx.fillText(this.type, 0, 0); ctx.restore();
            }
        }
        for (let i = 0; i < 40; i++) goldParticles.push(new Particle());
        function animate() {
            ctx.clearRect(0,0,canvas.width,canvas.height);
            goldParticles.forEach(p => { p.update(); p.draw(); });
            requestAnimationFrame(animate);
        }
        animate();

        // --- Логика игры ---
        let score = 0, energy = 1000, tap = 1, income = 0;
        let costs = [100, 500];

        function updateUI() {
            document.getElementById('balance').innerText = Math.floor(score);
            document.getElementById('e').innerText = energy;
            document.getElementById('fill').style.width = (energy/10) + '%';
            document.getElementById('ps').innerText = income;
            document.getElementById('c1').innerText = costs[0];
            document.getElementById('c2').innerText = costs[1];
        }

        document.getElementById('donald-btn').addEventListener('pointerdown', (e) => {
            if (energy < tap) return;
            score += tap; energy -= tap; updateUI();
            const fly = document.createElement('div');
            fly.className = 'fly-item';
            fly.style.left = (e.clientX - 22) + 'px'; fly.style.top = (e.clientY - 22) + 'px';
            document.body.appendChild(fly);
            setTimeout(() => fly.remove(), 800);
        });

        function openModal(id, el) {
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            el.classList.add('active');
            document.getElementById(id).style.display = 'block';
        }
        function closeModals(el) {
            document.querySelectorAll('.modal').forEach(m => m.style.display = 'none');
            if(el) {
                document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
                el.classList.add('active');
            }
        }

        function buy(id) {
            let idx = id - 1;
            if (score >= costs[idx]) {
                score -= costs[idx];
                if (id === 1) tap += 2; else income += 15;
                costs[idx] = Math.floor(costs[idx] * 2.8); // Удорожание
                updateUI();
            } else { alert('Мало денег!'); }
        }

        // Авто-доход и реген энергии
        setInterval(() => {
            score += income;
            if(energy < 1000) energy = Math.min(1000, energy + 5); 
            updateUI();
        }, 1000);

        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        });
    </script>
</body>
</html>
