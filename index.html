<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Donald Combat Pro</title>
    <style>
        :root { --gold: #ffd700; --blue: #002244; }
        body { 
            background: radial-gradient(circle, #003366 0%, #000 100%); 
            color: white; font-family: 'Arial Black', sans-serif; 
            margin: 0; display: flex; flex-direction: column; align-items: center; 
            height: 100vh; overflow: hidden; user-select: none;
        }
        #header { width: 100%; padding: 20px; text-align: center; background: rgba(0,0,0,0.7); border-bottom: 2px solid var(--gold); box-sizing: border-box; }
        #balance-container { font-size: 45px; color: var(--gold); text-shadow: 0 0 15px gold; margin: 10px 0; }
        
        /* Главная кнопка */
        #donald-main {
            width: 260px; height: 260px; border-radius: 50%;
            background: url('https://img.icons8.com/color/512/donald-duck.png') center/80% no-repeat, 
                        radial-gradient(circle, #ffd700, #cc9900);
            border: 8px solid #fff; box-shadow: 0 0 40px var(--gold);
            margin-top: 30px; cursor: pointer; transition: transform 0.05s;
            -webkit-tap-highlight-color: transparent;
        }
        #donald-main:active { transform: scale(0.92); }

        /* Летящий Дональд с цифрой */
        .fly {
            position: absolute; pointer-events: none; z-index: 100;
            display: flex; align-items: center; gap: 5px;
            animation: flyUp 0.8s ease-out forwards;
        }
        .fly img { width: 40px; height: 40px; }
        .fly span { color: var(--gold); font-size: 24px; font-weight: bold; }
        @keyframes flyUp {
            0% { opacity: 1; transform: translateY(0); }
            100% { opacity: 0; transform: translateY(-250px) scale(0.5); }
        }

        /* Энергия */
        #energy-box { width: 80%; margin-top: 20px; text-align: center; }
        #bar { width: 100%; height: 12px; background: #222; border-radius: 10px; overflow: hidden; border: 1px solid #444; }
        #fill { width: 100%; height: 100%; background: linear-gradient(90deg, #ffd700, #ffaa00); transition: 0.2s; }

        /* Магазин (Окно) */
        #shop-ui { 
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: #001a33; z-index: 200; padding: 20px; box-sizing: border-box;
        }
        .shop-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--gold); padding-bottom: 10px; }
        .upgrade-card { 
            background: rgba(255,215,0,0.1); border: 1px solid var(--gold); 
            padding: 15px; border-radius: 15px; margin-top: 15px;
            display: flex; justify-content: space-between; align-items: center;
        }
        .buy-btn { background: var(--gold); color: black; border: none; padding: 10px 20px; border-radius: 10px; font-weight: bold; cursor: pointer; }

        /* Нижнее меню */
        #footer { position: fixed; bottom: 0; width: 100%; background: #000; padding: 10px 0; display: flex; justify-content: space-around; border-top: 2px solid var(--gold); }
        .nav-btn { text-align: center; color: #888; font-size: 11px; flex: 1; cursor: pointer; }
        .nav-btn.active { color: var(--gold); }
    </style>
</head>
<body>

    <div id="header">
        <div style="font-size: 12px; color: #aaa;">ПРИБЫЛЬ В СЕКУНДУ: +<span id="ps-val">0</span></div>
        <div id="balance-container">💰 <span id="money">0</span></div>
    </div>

    <div id="donald-main"></div>

    <div id="energy-box">
        <div style="font-size: 16px; margin-bottom: 5px;">⚡ <span id="e-now">1000</span> / 1000</div>
        <div id="bar"><div id="fill"></div></div>
    </div>

    <div id="footer">
        <div class="nav-btn active" onclick="closeShop()">🏠<br>Биржа</div>
        <div class="nav-btn" onclick="openShop()">🚀<br>Майнинг</div>
        <div class="nav-btn">👥<br>Друзья</div>
        <div class="nav-btn">💎<br>Airdrop</div>
    </div>

    <div id="shop-ui">
        <div class="shop-header">
            <h2>UPGRADES</h2>
            <button onclick="closeShop()" style="background:none; border:none; color:var(--gold); font-size:30px;">×</button>
        </div>
        <p>Твой баланс: 💰 <span id="shop-balance">0</span></p>

        <div class="upgrade-card">
            <div>
                <b>Multitap</b><br>
                <small>+1 к каждому клику</small><br>
                <span style="color:var(--gold)">Цена: <span id="cost-tap">100</span></span>
            </div>
            <button class="buy-btn" onclick="buyTap()">BUY</button>
        </div>

        <div class="upgrade-card">
            <div>
                <b>Auto-Duck</b><br>
                <small>+2 монеты в секунду</small><br>
                <span style="color:var(--gold)">Цена: <span id="cost-passive">500</span></span>
            </div>
            <button class="buy-btn" onclick="buyPassive()">BUY</button>
        </div>
    </div>

    <script>
        let score = 0, energy = 1000, tapPower = 1, passiveIncome = 0;
        let tapPrice = 100, passivePrice = 500;

        const moneyEl = document.getElementById('money');
        const shopBalanceEl = document.getElementById('shop-balance');

        function updateUI() {
            moneyEl.innerText = Math.floor(score);
            shopBalanceEl.innerText = Math.floor(score);
            document.getElementById('e-now').innerText = energy;
            document.getElementById('fill').style.width = (energy/10) + '%';
            document.getElementById('ps-val').innerText = passiveIncome;
            document.getElementById('cost-tap').innerText = tapPrice;
            document.getElementById('cost-passive').innerText = passivePrice;
        }

        document.getElementById('donald-main').addEventListener('pointerdown', (e) => {
            if (energy < tapPower) return;
            score += tapPower;
            energy -= tapPower;
            updateUI();

            const fly = document.createElement('div');
            fly.className = 'fly';
            fly.style.left = (e.clientX - 20) + 'px';
            fly.style.top = (e.clientY - 20) + 'px';
            fly.innerHTML = `<img src="https://img.icons8.com/color/96/donald-duck.png"> <span>+${tapPower}</span>`;
            document.body.appendChild(fly);
            setTimeout(() => fly.remove(), 800);
        });

        function openShop() { document.getElementById('shop-ui').style.display = 'block'; }
        function closeShop() { document.getElementById('shop-ui').style.display = 'none'; }

        function buyTap() {
            if (score >= tapPrice) {
                score -= tapPrice;
                tapPower++;
                tapPrice *= 2;
                updateUI();
            } else { alert('Мало денег!'); }
        }

        function buyPassive() {
            if (score >= passivePrice) {
                score -= passivePrice;
                passiveIncome += 2;
                passivePrice *= 2;
                updateUI();
            } else { alert('Мало денег!'); }
        }

        // Авто-доход и реген энергии
        setInterval(() => {
            score += passiveIncome;
            if (energy < 1000) energy = Math.min(1000, energy + 2);
            updateUI();
        }, 1000);
    </script>
</body>
</html>
