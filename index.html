<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Donald Gold Luxury V9</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --gold: #FFD700; --neon: #00ff88; --accent: #ff00ff; }
        
        body { 
            margin: 0; padding: 0; color: white; font-family: 'Arial Black', sans-serif;
            height: 100vh; overflow: hidden; display: flex; flex-direction: column;
            background: #000;
        }

        /* ЖИВОЙ АНИМИРОВАННЫЙ ФОН */
        #bg {
            position: fixed; inset: 0; z-index: -1;
            background: linear-gradient(45deg, #050505, #0a192f, #1a0a2f, #050505);
            background-size: 400% 400%;
            animation: gradientBG 10s ease infinite;
        }
        @keyframes gradientBG { 0% {background-position: 0% 50%;} 50% {background-position: 100% 50%;} 100% {background-position: 0% 50%;} }

        .star { position: absolute; background: white; border-radius: 50%; opacity: 0.5; animation: twinkle var(--d) linear infinite; }
        @keyframes twinkle { from { transform: translateY(100vh); } to { transform: translateY(-10vh); } }

        /* ИНТЕРФЕЙС */
        header { padding: 50px 20px 10px; text-align: center; }
        #balance-card {
            background: rgba(255, 255, 255, 0.1); padding: 20px; border-radius: 30px;
            backdrop-filter: blur(15px); border: 2px solid var(--gold);
            box-shadow: 0 0 30px rgba(255, 215, 0, 0.3);
        }
        #balance { font-size: 55px; color: var(--gold); text-shadow: 2px 2px 0 #000; }
        
        .energy-bar-bg { width: 100%; height: 15px; background: #222; border-radius: 10px; margin-top: 10px; overflow: hidden; border: 1px solid #444; }
        #energy-fill { height: 100%; width: 100%; background: linear-gradient(90deg, var(--neon), var(--gold)); transition: width 0.2s; }

        /* ПЕРСОНАЖ И ОДЕЖДА */
        #game-area { flex: 1; display: flex; align-items: center; justify-content: center; position: relative; }
        #character-container { position: relative; width: 300px; height: 300px; transition: transform 0.1s cubic-bezier(0.17, 0.89, 0.32, 1.49); }
        .character-layer { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: contain; pointer-events: none; }
        
        /* ЭФФЕКТ ПРЫЖКА */
        .tap-bounce { transform: scale(0.85) translateY(20px); }

        /* ЛЕТЯЩИЕ МОНЕТЫ */
        .fly-coin { position: fixed; font-size: 24px; pointer-events: none; animation: flyUp 0.7s ease-out forwards; z-index: 1000; }
        @keyframes flyUp { 0% { opacity: 1; transform: translateY(0); } 100% { opacity: 0; transform: translateY(-150px) scale(1.5); } }

        /* НИЖНЕЕ МЕНЮ */
        nav { position: fixed; bottom: 20px; width: 94%; left: 3%; height: 80px; background: rgba(0,0,0,0.8); border-radius: 25px; display: flex; border: 2px solid rgba(255,255,255,0.1); backdrop-filter: blur(20px); }
        .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; opacity: 0.5; transition: 0.3s; cursor: pointer; }
        .nav-item.active { opacity: 1; color: var(--gold); transform: translateY(-5px); }

        /* МАГАЗИН ОДЕЖДЫ */
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 2000; padding: 40px 20px; overflow-y: auto; }
        .item-card { background: #111; border-radius: 20px; padding: 15px; margin-bottom: 10px; display: flex; align-items: center; justify-content: space-between; border: 1px solid #333; }
        .buy-btn { background: var(--gold); border: none; padding: 10px 20px; border-radius: 12px; font-weight: bold; cursor: pointer; }
        .buy-btn.active { background: var(--neon); }
    </style>
</head>
<body>

<div id="bg"></div>

<header>
    <div id="balance-card">
        <div id="balance">💰 <span id="score">0</span></div>
        <div class="energy-bar-bg"><div id="energy-fill"></div></div>
        <div style="font-size: 14px; margin-top: 5px;">⚡️ <span id="e-val">1000</span>/1000</div>
    </div>
</header>

<div id="game-area" onclick="handleTap(event)">
    <div id="character-container">
        <img class="character-layer" src="https://www.pngarts.com/files/3/Donald-Duck-PNG-Transparent-Image.png">
        <img id="layer-glasses" class="character-layer" src="" style="display: none;">
        <img id="layer-shirt" class="character-layer" src="" style="display: none;">
        <img id="layer-acc" class="character-layer" src="" style="display: none;">
    </div>
</div>

<nav>
    <div class="nav-item active" onclick="show('main', this)">🏠<span>Farm</span></div>
    <div class="nav-item" onclick="show('shop', this)">🚀<span>Upgrades</span></div>
    <div class="nav-item" onclick="show('wardrobe', this)">👕<span>Одежда</span></div>
    <div class="nav-item" onclick="show('donate', this)">💎<span>Donate</span></div>
</nav>

<div id="wardrobe" class="modal">
    <h2 style="color:var(--gold); text-align:center;">ГАРДЕРОБ</h2>
    
    <h3 style="color:var(--neon)">ОЧКИ</h3>
    <div id="category-glasses"></div>

    <h3 style="color:var(--neon)">ОДЕЖДА</h3>
    <div id="category-shirt"></div>

    <button onclick="show('main')" style="width:100%; padding:20px; color:gray; background:none; border:none; font-weight:bold;">ВЕРНУТЬСЯ</button>
</div>

<div id="shop" class="modal">
    <h2 style="color:var(--gold); text-align:center;">ПРОКАЧКА</h2>
    <div class="item-card"><div><b>Усиленный Тап</b><br><small>+5 к клику</small></div><button class="buy-btn" onclick="buyUpgrade('tap')">💰 <span id="c-tap">100</span></button></div>
    <div class="item-card"><div><b>Авто-Ферма</b><br><small>+20/сек</small></div><button class="buy-btn" onclick="buyUpgrade('auto')">💰 <span id="c-auto">500</span></button></div>
    <button onclick="show('main')" style="width:100%; padding:20px; color:gray; background:none; border:none;">ВЕРНУТЬСЯ</button>
</div>

<div id="donate" class="modal">
    <h2 style="color:var(--gold); text-align:center;">DONATE</h2>
    <div class="item-card">
        <div><b>Крипто-Пак</b><br><small>Поддержать автора</small></div>
        <a href="https://t.me/wallet?startapp=transfer-UQAkVfSEE83-fup86oEFV6a7rxgD5DKPfoEfVVDUk8C1WeEQ" class="buy-btn" style="text-decoration:none;">SEND TON</a>
    </div>
    <button onclick="show('main')" style="width:100%; padding:20px; color:gray; background:none; border:none;">ВЕРНУТЬСЯ</button>
</div>

<script>
    const tg = window.Telegram.WebApp;
    tg.expand();

    let g = JSON.parse(localStorage.getItem('donald_v9')) || {
        score: 0, tap: 1, auto: 0, cTap: 100, cAuto: 500,
        energy: 1000,
        ownedItems: [],
        equipped: { glasses: null, shirt: null, acc: null }
    };

    // ДАННЫЕ ОДЕЖДЫ
    const wardrobeData = {
        glasses: [
            { id: 'g1', name: "Черные очки", img: "https://www.pngall.com/wp-content/uploads/5/Sunglasses-PNG-Free-Download.png", price: 1000 },
            { id: 'g2', name: "Золотые очки", img: "https://www.pngall.com/wp-content/uploads/5/Sunglasses-PNG-Transparent-HD-Photo.png", price: 5000 }
        ],
        shirt: [
            { id: 's1', name: "Худи Стиляги", img: "https://www.pngall.com/wp-content/uploads/2/T-Shirt-PNG-Clipart.png", price: 3000 },
            { id: 's2', name: "Кофта Богача", img: "https://www.pngall.com/wp-content/uploads/2/T-Shirt-PNG-Transparent-HD-Photo.png", price: 15000 }
        ]
    };

    function save() { localStorage.setItem('donald_v9', JSON.stringify(g)); }

    function update() {
        document.getElementById('score').innerText = Math.floor(g.score);
        document.getElementById('e-val').innerText = Math.floor(g.energy);
        document.getElementById('energy-fill').style.width = (g.energy / 10) + '%';
        document.getElementById('c-tap').innerText = g.cTap;
        document.getElementById('c-auto').innerText = g.cAuto;
        
        // Обновляем слои одежды
        ['glasses', 'shirt'].forEach(cat => {
            const el = document.getElementById('layer-' + cat);
            if (g.equipped[cat]) {
                const item = wardrobeData[cat].find(i => i.id === g.equipped[cat]);
                el.src = item.img;
                el.style.display = 'block';
            } else {
                el.style.display = 'none';
            }
        });
        renderWardrobe();
        save();
    }

    function handleTap(e) {
        if (g.energy < 1) return;
        g.score += g.tap; g.energy -= 1;
        tg.HapticFeedback.impactOccurred('heavy');

        const cont = document.getElementById('character-container');
        cont.classList.add('tap-bounce');
        setTimeout(() => cont.classList.remove('tap-bounce'), 100);

        const x = e.clientX || e.touches[0].clientX;
        const y = e.clientY || e.touches[0].clientY;
        const coin = document.createElement('div');
        coin.className = 'fly-coin';
        coin.innerText = '💰 +' + g.tap;
        coin.style.left = x + 'px';
        coin.style.top = y + 'px';
        document.body.appendChild(coin);
        setTimeout(() => coin.remove(), 700);
        update();
    }

    function buyUpgrade(type) {
        if (type === 'tap' && g.score >= g.cTap) { g.score -= g.cTap; g.tap += 5; g.cTap *= 3; }
        if (type === 'auto' && g.score >= g.cAuto) { g.score -= g.cAuto; g.auto += 20; g.cAuto *= 3; }
        update();
    }

    function renderWardrobe() {
        ['glasses', 'shirt'].forEach(cat => {
            const div = document.getElementById('category-' + cat);
            div.innerHTML = '';
            wardrobeData[cat].forEach(item => {
                const isOwned = g.ownedItems.includes(item.id);
                const isEquipped = g.equipped[cat] === item.id;
                div.innerHTML += `
                    <div class="item-card">
                        <div><b>${item.name}</b><br><small>${isOwned ? 'В наличии' : 'Цена: '+item.price}</small></div>
                        <button class="buy-btn ${isEquipped ? 'active' : ''}" onclick="processItem('${cat}', '${item.id}', ${item.price})">
                            ${isEquipped ? 'СНЯТЬ' : (isOwned ? 'НАДЕТЬ' : 'КУПИТЬ')}
                        </button>
                    </div>`;
            });
        });
    }

    function processItem(cat, id, price) {
        if (!g.ownedItems.includes(id)) {
            if (g.score >= price) { g.score -= price; g.ownedItems.push(id); } else return;
        }
        g.equipped[cat] = (g.equipped[cat] === id) ? null : id;
        update();
    }

    function show(id, el) {
        document.querySelectorAll('.modal').forEach(m => m.style.display = 'none');
        if (id !== 'main') document.getElementById(id).style.display = 'block';
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        if (el) el.classList.add('active');
    }

    // Фоновые звезды
    for(let i=0; i<30; i++) {
        let s = document.createElement('div');
        s.className = 'star';
        s.style.left = Math.random() * 100 + 'vw';
        s.style.width = s.style.height = Math.random() * 4 + 'px';
        s.style.setProperty('--d', (Math.random() * 3 + 2) + 's');
        document.getElementById('bg').appendChild(s);
    }

    setInterval(() => {
        g.score += g.auto / 10;
        if (g.energy < 1000) g.energy += 1.5;
        update();
    }, 100);

    update();
</script>
</body>
</html>
