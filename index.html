<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>DNR Tapping</title>
    <style>
        :root { --main-color: #ffd700; --bg-gradient: radial-gradient(circle, #1e2a3a 0%, #000 100%); }
        body { background: var(--bg-gradient); color: white; text-align: center; font-family: 'Segoe UI', sans-serif; margin: 0; height: 100vh; overflow: hidden; display: flex; flex-direction: column; user-select: none; -webkit-tap-highlight-color: transparent; }
        
        #header { padding: 30px 20px; }
        #score-container { font-size: 52px; font-weight: 900; display: flex; align-items: center; justify-content: center; gap: 10px; text-shadow: 0 0 20px rgba(255,215,0,0.4); }
        #score-container img { width: 45px; }

        #coin-area { flex-grow: 1; display: flex; align-items: center; justify-content: center; position: relative; perspective: 1000px; }
        #coin { width: 280px; height: 280px; border-radius: 50%; background: url('https://cdn-icons-png.flaticon.com/512/2489/2489756.png'); background-size: cover; box-shadow: 0 0 60px rgba(255,215,0,0.3); transition: transform 0.1s; position: relative; z-index: 2; }

        .tap-number { position: absolute; color: white; font-size: 32px; font-weight: bold; pointer-events: none; animation: floatUp 0.7s ease-out forwards; z-index: 10; }
        @keyframes floatUp { 0% { opacity: 1; transform: translateY(0); } 100% { opacity: 0; transform: translateY(-150px); } }

        #bottom-ui { padding: 20px; background: rgba(255,255,255,0.05); border-top-left-radius: 20px; border-top-right-radius: 20px; }
        #energy-box { display: flex; align-items: center; gap: 10px; margin-bottom: 15px; font-size: 18px; }
        #energy-bar { flex-grow: 1; height: 12px; background: #333; border-radius: 6px; overflow: hidden; }
        #energy-fill { height: 100%; width: 100%; background: linear-gradient(90deg, #ffd700, #ffaa00); transition: width 0.2s; }

        #shop-btn { background: #ffd700; color: black; border: none; padding: 12px 25px; border-radius: 12px; font-weight: bold; font-size: 16px; cursor: pointer; width: 100%; }
        
        /* Modal Shop */
        #shop-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 100; flex-direction: column; align-items: center; justify-content: center; }
        .shop-item { background: #222; padding: 20px; border-radius: 15px; width: 80%; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
        .close-shop { margin-top: 20px; color: #ffd700; text-decoration: underline; cursor: pointer; }
    </style>
</head>
<body>

<div id="header">
    <div id="score-container">
        <img src="https://cdn-icons-png.flaticon.com/512/2489/2489756.png">
        <span id="score">0</span>
    </div>
    <div style="color: #888; margin-top: 5px;">Bronze League</div>
</div>

<div id="coin-area">
    <div id="coin"></div>
</div>

<div id="bottom-ui">
    <div id="energy-box">
        <span>⚡</span>
        <div id="energy-bar"><div id="energy-fill"></div></div>
        <span id="energy-text">1000/1000</span>
    </div>
    <button id="shop-btn" onclick="toggleShop(true)">Магазин Улучшений 🚀</button>
</div>

<div id="shop-modal">
    <h2 style="color: #ffd700;">Boosts</h2>
    <div class="shop-item">
        <div>
            <b>Multi-tap</b><br>
            <small id="tap-lvl-text">Lvl 1 (+1 per tap)</small>
        </div>
        <button id="buy-tap" onclick="buyUpgrade()" style="padding: 10px; border-radius: 8px; border: none; background: #444; color: white;">Price: 100</button>
    </div>
    <div class="close-shop" onclick="toggleShop(false)">Закрыть</div>
</div>

<script>
    let score = parseInt(localStorage.getItem('score')) || 0;
    let energy = parseInt(localStorage.getItem('energy')) || 1000;
    let multi = parseInt(localStorage.getItem('multi')) || 1;
    let upgradePrice = parseInt(localStorage.getItem('price')) || 100;
    const maxEnergy = 1000;

    const scoreEl = document.getElementById('score');
    const energyFill = document.getElementById('energy-fill');
    const energyText = document.getElementById('energy-text');
    const coin = document.getElementById('coin');

    function updateUI() {
        scoreEl.innerText = score.toLocaleString();
        energyFill.style.width = (energy / maxEnergy * 100) + '%';
        energyText.innerText = `${Math.floor(energy)}/${maxEnergy}`;
        document.getElementById('tap-lvl-text').innerText = `Lvl ${multi} (+${multi} per tap)`;
        document.getElementById('buy-tap').innerText = `Price: ${upgradePrice}`;
    }

    coin.addEventListener('pointerdown', (e) => {
        if (energy < multi) return;

        score += multi;
        energy -= multi;
        
        // 3D Animation
        const rect = coin.getBoundingClientRect();
        const x = e.clientX - rect.left - rect.width/2;
        const y = e.clientY - rect.top - rect.height/2;
        coin.style.transform = `perspective(1000px) rotateX(${-y/5}deg) rotateY(${x/5}deg) scale(0.95)`;

        // Floating number
        const num = document.createElement('div');
        num.className = 'tap-number';
        num.innerText = `+${multi}`;
        num.style.left = e.clientX + 'px';
        num.style.top = e.clientY + 'px';
        document.body.appendChild(num);
        setTimeout(() => num.remove(), 700);

        save();
        updateUI();
    });

    coin.addEventListener('pointerup', () => {
        coin.style.transform = 'perspective(1000px) rotateX(0) rotateY(0) scale(1)';
    });

    function toggleShop(show) {
        document.getElementById('shop-modal').style.display = show ? 'flex' : 'none';
    }

    function buyUpgrade() {
        if (score >= upgradePrice) {
            score -= upgradePrice;
            multi++;
            upgradePrice *= 2;
            save();
            updateUI();
        } else {
            alert('Недостаточно коинов!');
        }
    }

    function save() {
        localStorage.setItem('score', score);
        localStorage.setItem('energy', energy);
        .setItem('multi', multi);
