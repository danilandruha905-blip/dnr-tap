<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Donald Golden Empire</title>
    <style>
        :root { 
            --gold: #ffd700; 
            --neon-blue: #00f2ff; 
            --neon-green: #39ff14;
            --neon-pink: #ff00ff;
        }
        body { 
            background: #000; color: white; font-family: 'Arial Black', sans-serif; 
            margin: 0; display: flex; flex-direction: column; align-items: center; 
            height: 100vh; overflow: hidden; user-select: none;
        }

        /* Живой фон */
        #gold-rain { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; pointer-events: none; }
        body::before {
            content: ''; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at center, #001a33 0%, #000 100%);
            z-index: -2;
        }

        /* Интерфейс баланса */
        #header { width: 100%; padding: 25px 0; text-align: center; z-index: 10; }
        #balance { 
            font-size: 60px; font-weight: 900; color: var(--gold); 
            text-shadow: 0 0 30px rgba(255, 215, 0, 0.8), 2px 2px 0px #443300; 
        }

        /* Главная кнопка */
        #donald-btn {
            width: 270px; height: 270px; border-radius: 50%;
            background: url('https://www.pngarts.com/files/3/Donald-Duck-PNG-Transparent-Image.png') center/80% no-repeat,
                        radial-gradient(circle, #ffd700 0%, #b8860b 100%);
            border: 8px solid rgba(255,255,255,0.9); 
            box-shadow: 0 0 60px rgba(255, 215, 0, 0.6);
            margin-top: 20px; cursor: pointer; transition: transform 0.05s;
        }
        #donald-btn:active { transform: scale(0.9); }

        /* Стильное нижнее меню */
        #footer { 
            position: fixed; bottom: 15px; width: 94%; 
            background: rgba(20, 20, 40, 0.8); backdrop-filter: blur(15px); 
            border: 2px solid rgba(255, 215, 0, 0.3); border-radius: 30px; 
            padding: 10px 0; display: flex; justify-content: space-around; z-index: 100;
        }
        .nav-item { text-align: center; color: #888; font-size: 11px; flex: 1; transition: 0.3s; cursor: pointer; }
        .nav-item img { width: 32px; height: 32px; display: block; margin: 0 auto 4px; filter: grayscale(1); transition: 0.3s; }
        .nav-item.active { color: var(--gold); transform: translateY(-3px); }
        .nav-item.active img { filter: grayscale(0) drop-shadow(0 0 8px var(--gold)); }

        /* ПЛАВНЫЕ ОКНА (MODALS) */
        .modal { 
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0, 0, 0, 0.9); backdrop-filter: blur(10px);
            z-index: 1000; padding: 20px; box-sizing: border-box;
            animation: modalSlide 0.5s cubic-bezier(0.18, 0.89, 0.32, 1.28) forwards;
        }
        @keyframes modalSlide {
            0% { opacity: 0; transform: scale(0.7) translateY(100px); }
            100% { opacity: 1; transform: scale(1) translateY(0); }
        }

        .modal-title { 
            font-size: 36px; color: var(--gold); text-align: center; 
            margin-bottom: 25px; text-shadow: 0 0 15px var(--gold);
            letter-spacing: 2px;
        }

        /* Карточки товаров */
        .card { 
            background: rgba(255, 255, 255, 0.05);
            border-left: 5px solid var(--gold); border-radius: 20px; 
            padding: 20px; margin-bottom: 15px; 
            display: flex; justify-content: space-between; align-items: center;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
        }
        .card-info b { font-size: 22px; display: block; color: #fff; }
        .card-info span { color: var(--gold); font-size: 14px; }

        .buy-button { 
            background: linear-gradient(180deg, #ffd700 0%, #ff8800 100%);
            color: #000; border: none; padding: 12px 20px; border-radius: 12px;
            font-weight: 900; font-size: 14px; box-shadow: 0 4px 15px rgba(255,215,0,0.3);
        }

        .close-btn {
            width: 100%; padding: 18px; border-radius: 15px; border: 2px solid #555;
            background: none; color: #aaa; font-weight: bold; margin-top: 10px;
        }

        /* Эффект полета при тапе */
        .fly-item {
            position: absolute; width: 40px; height: 40px;
            background: url('https://img.icons8.com/emoji/96/money-bag-emoji.png') center/contain no-repeat;
            pointer-events: none; z-index: 100;
            animation: flyToTop 0.8s ease-in forwards;
        }
        @keyframes flyToTop {
            0% { opacity: 1; transform: scale(1); }
            100% { opacity: 0; transform: translateY(-400px) scale(0.5); }
        }
    </style>
</head>
<body>
    <canvas id="gold-rain"></canvas>
    
    <div id="header">
        <div id="balance">💰 <span id="val">0</span></div>
        <div style="color: #666; font-size: 14px; margin-top: -10px;">PROFIT: +<span id="ps">0</span>/sec</div>
    </div>

    <div id="donald-btn"></div>

    <div style="width: 80%; margin-top: 40px;">
        <div style="text-align: center; margin-bottom: 8px;">⚡ <span id="e">1000</span></div>
        <div style="width: 100%; height: 10px; background: #222; border-radius: 10px; overflow: hidden; border: 1px solid var(--gold);">
            <div id="fill" style="width: 100%; height: 100%; background: linear-gradient(90deg, var(--gold), #ff4500); transition: 0.3s;"></div>
        </div>
    </div>

    <div id="footer">
        <div class="nav-item active" onclick="closeModals(this)">
            <img src="https://img.icons8.com/fluency/96/home.png">Home
        </div>
        <div class="nav-item" onclick="openModal('shop', this)">
            <img src="https://img.icons8.com/fluency/96/rocket.png">Mining
        </div>
        <div class="nav-item" onclick="openModal('donate', this)">
            <img src="https://img.icons8.com/fluency/96/diamond.png">Stars
        </div>
    </div>

    <div id="shop" class="modal">
        <div class="modal-title">UPGRADES</div>
        <div class="card" style="border-left-color: var(--neon-green);">
            <div class="card-info"><b>Golden Click</b><span>Price: <span id="c1">100</span></span></div>
            <button class="buy-button" onclick="buy(1)">UPGRADE</button>
        </div>
        <div class="card" style="border-left-color: var(--neon-blue);">
            <div class="card-info"><b>Auto Farm</b><span>Price: <span id="c2">500</span></span></div>
            <button class="buy-button" onclick="buy(2)">UPGRADE</button>
        </div>
        <button class="close-btn" onclick="closeModals()">BACK</button>
    </div>

    <div id="donate" class="modal">
        <div class="modal-title">ELITE VAULT</div>
        <div class="card" style="border-left-color: var(--neon-pink);">
            <div class="card-info"><b>100,000 COINS</b><span>Package: Starter</span></div>
            <button class="buy-button" style="background: #0088cc; color: white;" onclick="alert('Stars payment...')">250 ⭐</button>
        </div>
        <div class="card" style="border-left-color: var(--gold);">
            <div class="card-info"><b>1,000,000 COINS</b><span>Package: Whale</span></div>
            <button class="buy-button" style="background: #0088cc; color: white;" onclick="alert('Stars payment...')">1500 ⭐</button>
        </div>
        <button class="close-btn" onclick="closeModals()">BACK</button>
    </div>

    <script>
        // --- Золотой дождь ---
        const canvas = document.getElementById('gold-rain');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;
        const goldParticles = [];
        const types = ['💰', '💵', '✨'];

        class Particle {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height - canvas.height;
                this.speed = Math.random() * 2 + 1.5;
                this.type = types[Math.floor(Math.random() * types.length)];
            }
            update() {
                this.y += this.speed;
                if (this.y > canvas.height) { this.y = -50; this.x = Math.random() * canvas.width; }
            }
            draw() { ctx.font = `20px serif`; ctx.fillText(this.type, this.x, this.y); }
        }
        for (let i = 0; i < 35; i++) goldParticles.push(new Particle());
        function animate() {
            ctx.clearRect(0,0,canvas.width,canvas.height);
            goldParticles.forEach(p => { p.update(); p.draw(); });
            requestAnimationFrame(animate);
        }
        animate();

        // --- Логика игры ---
        let score = 0, energy = 1000, tap = 1, income = 0;
        let costs = [100, 500];

        function updateUI() {
            document.getElementById('val').innerText = Math.floor(score);
            document.getElementById('e').innerText = energy;
            document.getElementById('fill').style.width = (energy/10) + '%';
            document.getElementById('ps').innerText = income;
            document.getElementById('c1').innerText = costs[0];
            document.getElementById('c2').innerText = costs[1];
        }

        document.getElementById('donald-btn').addEventListener('pointerdown', (e) => {
            if (energy < tap) return;
            score += tap; energy -= tap; updateUI();
            const fly = document.createElement('div');
            fly.className = 'fly-item';
            fly.style.left = (e.clientX - 20) + 'px'; fly.style.top = (e.clientY - 20) + 'px';
            document.body.appendChild(fly);
            setTimeout(() => fly.remove(), 800);
        });

        function openModal(id, el) {
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            el.classList.add('active');
            document.getElementById(id).style.display = 'block';
        }
        function closeModals(el) {
            document.querySelectorAll('.modal').forEach(m => m.style.display = 'none');
            if(el) {
                document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
                el.classList.add('active');
            }
        }

        function buy(id) {
            let idx = id - 1;
            if (score >= costs[idx]) {
                score -= costs[idx];
                if (id === 1) tap += 2; else income += 15;
                costs[idx] = Math.floor(costs[idx] * 2.5);
                updateUI();
            }
        }

        setInterval(() => { score += income; if(energy < 1000) energy = Math.min(1000, energy + 5); updateUI(); }, 1000);
    </script>
</body>
</html>
