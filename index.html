<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Donald Golden Empire</title>
    <style>
        :root { --gold: #FFD700; --neon-blue: #00F2FF; --glass: rgba(255, 255, 255, 0.08); }
        body { 
            background: #000; color: white; font-family: -apple-system, sans-serif; 
            margin: 0; height: 100vh; overflow: hidden; display: flex; flex-direction: column; align-items: center;
        }

        #bg-canvas { position: fixed; inset: 0; z-index: -1; opacity: 0.6; }

        /* ИНТЕРФЕЙС БАЛАНСА */
        #header { padding: 40px 0 10px; text-align: center; z-index: 10; width: 90%; }
        #balance { 
            font-size: 65px; font-weight: 900; color: var(--gold); 
            text-shadow: 0 0 30px rgba(255, 215, 0, 0.6), 2px 2px 5px black;
        }

        /* ТАП-ЗОНА С ДОНАЛЬДОМ */
        #tap-target {
            position: relative; width: 320px; height: 320px; margin-top: 20px;
            cursor: pointer; display: flex; align-items: flex-end; justify-content: center; z-index: 5;
        }
        
        /* ПЬЕДЕСТАЛ (ТРАВА + ДЕРЕВО) */
        #ground {
            position: absolute; bottom: -20px; width: 380px; height: 130px;
            background: radial-gradient(ellipse at top, #1A4D1A 0%, #0D260D 100%);
            border-radius: 50% 50% 0 0; border-top: 5px solid #2ECC71;
            box-shadow: 0 -10px 40px rgba(0,255,0,0.4);
        }

        /* SVG ДОНАЛЬД (РЕАЛИСТИЧНЫЙ И ПОДВИЖНЫЙ) */
        svg#donald-scene { 
            position: relative; width: 200px; height: 280px; margin-bottom: 20px; pointer-events: none;
            transition: transform 0.08s cubic-bezier(0.18, 0.89, 0.32, 1.28);
        }
        #tap-target:active svg#donald-scene { transform: scale(0.85) translateY(20px); } /* СЖАТИЕ-ПРЫЖОК */

        /* ЭФФЕКТ ЧАСТИЦ ПРИ КЛИКЕ */
        .tap-particle {
            position: absolute; pointer-events: none; font-size: 30px;
            color: #FFF; text-shadow: 0 0 15px gold; z-index: 1000;
            animation: explode 0.7s ease-out forwards;
        }
        @keyframes explode {
            0% { transform: translate(0,0) scale(1.2); opacity: 1; }
            100% { transform: translate(var(--x), var(--y)) scale(0.2); opacity: 0; }
        }

        /* МАГАЗИНЫ И МЕНЮ (GLASSMORPHISM) */
        .modal { 
            display: none; position: fixed; inset: 0; z-index: 1000;
            background: rgba(0,0,0,0.92); backdrop-filter: blur(25px);
            padding: 30px 20px; animation: slideUp 0.3s ease-out;
        }
        @keyframes slideUp { from { transform: translateY(100%); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

        .modal-title { font-size: 32px; font-weight: 900; text-align: center; margin-bottom: 20px; color: var(--gold); text-shadow: 0 0 15px gold; }

        .item-card {
            background: var(--glass); border-radius: 20px; padding: 15px; margin-bottom: 12px;
            border: 1px solid rgba(255,255,255,0.08); display: flex; justify-content: space-between; align-items: center;
        }
        .item-preview { width: 50px; height: 50px; border-radius: 12px; background: rgba(255,255,255,0.05); display: flex; align-items: center; justify-content: center; }
        .buy-btn { background: var(--gold); color: #000; border: none; padding: 12px 20px; border-radius: 12px; font-weight: 900; }

        #nav { 
            position: fixed; bottom: 25px; width: 90%; height: 75px;
            background: rgba(0,0,0,0.6); backdrop-filter: blur(20px);
            border-radius: 25px; border: 1px solid rgba(255,255,255,0.08);
            display: flex; justify-content: space-around; align-items: center; z-index: 100;
        }
        .nav-link { text-align: center; opacity: 0.5; transition: 0.3s; cursor: pointer; flex: 1; color: #fff; text-decoration: none; }
        .nav-link.active { opacity: 1; transform: translateY(-5px); color: var(--gold); }
    </style>
</head>
<body>
    <canvas id="bg-canvas"></canvas>

    <div id="header">
        <div id="balance">💰 <span id="val">0</span></div>
        <div style="opacity: 0.4; font-size: 11px;">AUTO-MINING: +<span id="ps">0</span>/SEC</div>
    </div>

    <div id="tap-target" onclick="tap(event)">
        <div id="ground"></div>
        <svg id="donald-scene" viewBox="0 0 200 300">
            <path d="M160 300 Q150 200 160 100" stroke="#5D4037" stroke-width="12" fill="none"/>
            <circle cx="160" cy="80" r="25" fill="#2E7D32"/>
            
            <g id="body" filter="drop-shadow(0 0 10px gold)">
                <ellipse cx="100" cy="150" rx="35" ry="45" fill="white" stroke="black"/>
                <circle cx="100" cy="100" r="25" fill="white" stroke="black"/>
                <ellipse cx="90" cy="95" rx="3" ry="6" fill="black"/>
                <ellipse cx="110" cy="95" rx="3" ry="6" fill="black"/>
                <path d="M80 115 Q100 135 120 115 Z" fill="#FF8800" stroke="black"/>
                <path d="M90 75 L110 75 L100 65 Z" fill="#0044FF"/>
                <path d="M100 195 L90 230 L110 230 Z" fill="#FF8800"/>
            </g>
        </svg>
    </div>

    <div id="nav">
        <div class="nav-link active" onclick="showMod('main', this)">🏠<span>Farm</span></div>
        <div class="nav-link" onclick="showMod('shop', this)">🚜<span>Empire</span></div>
        <div class="nav-link" onclick="showMod('stars', this)">💎<span>VIP</span></div>
    </div>

    <div id="shop" class="modal">
        <div class="modal-title">FARM MARKET</div>
        <div class="item-card" style="border-color: var(--neon-blue);">
            <div class="item-preview">🌾</div>
            <div><b>Hyper Tap</b><span>+5/тап</span></div>
            <button class="buy-btn" onclick="buy(1)">Цена: <span id="c1">100</span></button>
        </div>
        <div class="item-card" style="border-color: #BC13FE;">
            <div class="item-preview">🚜</div>
            <div><b>Auto Mine</b><span>+10/сек</span></div>
            <button class="buy-btn" onclick="buy(2)">Цена: <span id="c2">500</span></button>
        </div>
        <button onclick="showMod('main')" style="width: 100%; padding: 15px; background: none; border: 1px solid #333; color: #555; border-radius: 15px; font-weight:bold;">CLOSE</button>
    </div>

    <div id="stars" class="modal">
        <div class="modal-title">vip TREASURY</div>
        <div class="item-card" style="border-color: #ff0055;">
            <div class="item-preview">🎁</div>
            <div><b>1,000,000 COINS</b><span>Instantly</span></div>
            <button class="buy-btn" style="background: #0088CC; color: #fff;" onclick="alert('Stars payment...')">1000 ⭐</button>
        </div>
        <button onclick="showMod('main')" style="width: 100%; padding: 15px; background: none; border: 1px solid #333; color: #555; border-radius: 15px; font-weight:bold;">CLOSE</button>
    </div>

    <script>
        let score = 0, tapPower = 1, auto = 0, costs = [100, 500];

        // ЗОЛОТОЙ ДОЖДЬ И НЕОНОВЫЙ ФОН
        const canvas = document.getElementById('bg-canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;
        let rain = Array.from({length: 40}, () => ({x: Math.random()*canvas.width, y: Math.random()*canvas.height, s: Math.random()*2+1}));
        
        function animateBg() {
            ctx.clearRect(0,0,canvas.width,canvas.height);
            // Фон-градиент
            let grad = ctx.createLinearGradient(0,0,0,canvas.height);
            grad.addColorStop(0, "#0a111a"); grad.addColorStop(0.5, "#162a44"); grad.addColorStop(1, "#1a3a16");
            ctx.fillStyle = grad; ctx.fillRect(0,0,canvas.width,canvas.height);
            // Монетки
            ctx.fillStyle = "rgba(255, 215, 0, 0.4)"; ctx.font = "20px serif";
            rain.forEach(p => { ctx.fillText("💰", p.x, p.y); p.y += p.s; if(p.y > canvas.height) p.y = -20; });
            requestAnimationFrame(animateBg);
        }
        animateBg();

        function sync() {
            document.getElementById('val').innerText = Math.floor(score);
            document.getElementById('ps').innerText = auto;
            document.getElementById('c1').innerText = costs[0];
            document.getElementById('c2').innerText = costs[1];
        }

        // ТАП С ПРЫЖКОМ И ЧАСТИЦАМИ
        function tap(e) {
            score += tapPower; sync();
            // Частицы
            for(let i=0; i<6; i++) {
                let div = document.createElement('div'); div.className = 'tap-particle'; div.innerText = '💰';
                div.style.left = e.clientX + 'px'; div.style.top = e.clientY + 'px';
                div.style.setProperty('--x', (Math.random()-0.5)*300 + 'px');
                div.style.setProperty('--y', (Math.random()-0.5)*300 + 'px');
                document.body.appendChild(div); setTimeout(() => div.remove(), 700);
            }
        }

        function showMod(id, el) {
            document.querySelectorAll('.modal').forEach(m => m.style.display = 'none');
            document.querySelectorAll('.nav-link').forEach(n => n.classList.remove('active'));
            if(id !== 'main') document.getElementById(id).style.display = 'block';
            if(el) el.classList.add('active'); else document.querySelectorAll('.nav-link')[0].classList.add('active');
        }

        function buy(n) {
            let i = n - 1;
            if(score >= costs[i]) {
                score -= costs[i]; if(n===1) tapPower += 5; else auto += 10;
                costs[i] *= 3; sync();
            }
        }

        setInterval(() => { score += auto; sync(); }, 1000);
    </script>
</body>
</html>
