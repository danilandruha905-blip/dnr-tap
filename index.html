<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Donald Wealth Evolution</title>
    <style>
        :root { --gold: #ffd700; --neon: #00f2ff; --glass: rgba(255, 255, 255, 0.07); }
        body { 
            background: radial-gradient(circle at center, #001a33 0%, #000 100%); 
            color: white; font-family: 'Arial Rounded MT Bold', sans-serif; 
            margin: 0; display: flex; flex-direction: column; align-items: center; 
            height: 100vh; overflow: hidden; user-select: none;
        }

        #bg-canvas { position: fixed; inset: 0; z-index: -1; pointer-events: none; }

        /* ИНТЕРФЕЙС */
        #header { width: 90%; margin-top: 30px; text-align: center; z-index: 10; }
        #balance { font-size: 55px; font-weight: 900; color: var(--gold); text-shadow: 0 0 25px gold; }
        #status { font-size: 14px; color: var(--neon); text-transform: uppercase; letter-spacing: 2px; margin-top: 5px; }

        /* ГЛАВНЫЙ ГЕРОЙ */
        #main-btn {
            position: relative; width: 250px; height: 250px; border-radius: 50%;
            background: radial-gradient(circle, #fff 0%, #ddd 100%);
            border: 8px solid var(--gold); box-shadow: 0 0 50px rgba(255,215,0,0.3);
            margin-top: 30px; cursor: pointer; transition: transform 0.05s; z-index: 5;
            display: flex; align-items: center; justify-content: center; overflow: hidden;
        }
        #main-btn:active { transform: scale(0.9); }
        #main-btn img { width: 85%; pointer-events: none; }

        /* ЛЕТЯЩИЕ ДОНАЛЬДЫ К БАЛАНСУ */
        .mini-donald {
            position: absolute; width: 40px; height: 40px; z-index: 100;
            background: url('https://www.pngarts.com/files/3/Donald-Duck-PNG-Transparent-Image.png') center/contain no-repeat;
            pointer-events: none; animation: flyUpToBalance 0.7s ease-in forwards;
        }
        @keyframes flyUpToBalance {
            0% { transform: scale(1) translateY(0); opacity: 1; }
            100% { transform: scale(0.2) translateY(-400px); opacity: 0; }
        }

        /* МАГАЗИН И СКИНЫ */
        .modal { 
            display: none; position: fixed; inset: 0; z-index: 1000;
            background: rgba(0,0,0,0.9); backdrop-filter: blur(20px);
            padding: 25px; animation: slideUp 0.3s ease-out;
        }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
        
        .tab-btn { background: var(--glass); border: 1px solid var(--gold); color: white; padding: 10px 20px; border-radius: 10px; margin-right: 10px; }
        .tab-btn.active { background: var(--gold); color: black; }

        .shop-content { margin-top: 20px; height: 70vh; overflow-y: auto; }
        .card { 
            background: var(--glass); border: 1px solid rgba(255,255,255,0.1); 
            border-radius: 20px; padding: 15px; margin-bottom: 12px;
            display: flex; justify-content: space-between; align-items: center;
        }
        .skin-img { width: 50px; height: 50px; background: rgba(255,255,255,0.1); border-radius: 10px; padding: 5px; }

        .btn-buy { background: var(--gold); border: none; padding: 10px 15px; border-radius: 12px; font-weight: 900; }
        .btn-buy.owned { background: #555; color: #aaa; }

        /* МЕНЮ */
        #footer { 
            position: fixed; bottom: 20px; width: 92%; height: 70px;
            background: var(--glass); backdrop-filter: blur(15px); 
            border: 1px solid rgba(255,215,0,0.2); border-radius: 25px; 
            display: flex; justify-content: space-around; align-items: center;
        }
        .nav-item { text-align: center; color: #777; font-size: 11px; cursor: pointer; flex: 1; }
        .nav-item.active { color: var(--gold); }
    </style>
</head>
<body>
    <canvas id="bg-canvas"></canvas>

    <div id="header">
        <div id="balance">💰 <span id="val">0</span></div>
        <div id="status">СТАТУС: НОВИЧОК</div>
    </div>

    <div id="main-btn" onpointerdown="tap(event)">
        <img id="donald-img" src="https://www.pngarts.com/files/3/Donald-Duck-PNG-Transparent-Image.png" alt="Donald">
    </div>

    <div id="footer">
        <div class="nav-item active" onclick="closeModals(this)">🏠<br>Home</div>
        <div class="nav-item" onclick="openModal('shop-modal', this)">🚀<br>Shop</div>
        <div class="nav-item" onclick="openModal('skins-modal', this)">👕<br>Skins</div>
    </div>

    <div id="shop-modal" class="modal">
        <h1>UPGRADES</h1>
        <div class="shop-content">
            <div class="card">
                <div><b>Super Tap</b><br><small>Price: <span id="c1">100</span></small></div>
                <button class="btn-buy" onclick="buy(1)">UP</button>
            </div>
            <div class="card">
                <div><b>Auto Mine</b><br><small>Price: <span id="c2">500</span></small></div>
                <button class="btn-buy" onclick="buy(2)">UP</button>
            </div>
        </div>
        <button onclick="closeModals()" style="width:100%; padding:15px; background:none; border:1px solid #333; color:#fff; border-radius:15px;">BACK</button>
    </div>

    <div id="skins-modal" class="modal">
        <h1>SKINS</h1>
        <div class="shop-content">
            <div class="card">
                <img class="skin-img" src="https://www.pngarts.com/files/3/Donald-Duck-PNG-Transparent-Image.png">
                <div><b>Cyber Duck</b><br><small>Price: 1,000</small></div>
                <button class="btn-buy" id="s1" onclick="buySkin(1, 1000, '#00f2ff')">BUY</button>
            </div>
            <div class="card">
                <img class="skin-img" src="https://www.pngarts.com/files/3/Donald-Duck-PNG-Transparent-Image.png" style="filter: brightness(0.5) sepia(1) hue-rotate(10deg) saturate(10);">
                <div><b>Golden Lord</b><br><small>Price: 5,000</small></div>
                <button class="btn-buy" id="s2" onclick="buySkin(2, 5000, 'gold')">BUY</button>
            </div>
        </div>
        <button onclick="closeModals()" style="width:100%; padding:15px; background:none; border:1px solid #333; color:#fff; border-radius:15px;">BACK</button>
    </div>

    <script>
        // --- ПАДАЮЩИЕ МОНЕТЫ ---
        const canvas = document.getElementById('bg-canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;
        let coins = Array.from({length: 30}, () => ({x: Math.random()*canvas.width, y: Math.random()*canvas.height, s: Math.random()*2+1}));
        function draw() {
            ctx.clearRect(0,0,canvas.width,canvas.height);
            ctx.font = "20px serif";
            coins.forEach(c => {
                ctx.fillText("💰", c.x, c.y);
                c.y += c.s; if(c.y > canvas.height) c.y = -20;
            });
            requestAnimationFrame(draw);
        }
        draw();

        // --- ЛОГИКА ИГРЫ ---
        let balance = 0, tapPower = 1, income = 0, costs = [100, 500], ownedSkins = [0];

        function tap(e) {
            balance += tapPower;
            updateUI();
            checkEvolution();

            // Маленький Дональд летит вверх
            const mini = document.createElement('div');
            mini.className = 'mini-donald';
            mini.style.left = (e.clientX - 20) + 'px';
            mini.style.top = (e.clientY - 20) + 'px';
            document.body.appendChild(mini);
            setTimeout(() => mini.remove(), 700);
        }

        function checkEvolution() {
            const statusEl = document.getElementById('status');
            const imgEl = document.getElementById('donald-img');
            const btnEl = document.getElementById('main-btn');

            if (balance >= 1000) {
                statusEl.innerText = "СТАТУС: МИЛЛИАРДЕР";
                btnEl.style.borderColor = "#ff00ff";
                imgEl.style.filter = "drop-shadow(0 0 10px gold)";
            } else if (balance >= 500) {
                statusEl.innerText = "СТАТУС: МАГНАТ";
                btnEl.style.borderColor = "var(--neon)";
            } else if (balance >= 100) {
                statusEl.innerText = "СТАТУС: БОГАЧ";
                btnEl.style.borderColor = "white";
            }
        }

        function updateUI() {
            document.getElementById('val').innerText = Math.floor(balance);
            document.getElementById('c1').innerText = costs[0];
            document.getElementById('c2').innerText = costs[1];
        }

        function openModal(id, el) {
            document.querySelectorAll('.modal').forEach(m => m.style.display = 'none');
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById(id).style.display = 'block';
            el.classList.add('active');
        }

        function closeModals(el) {
            document.querySelectorAll('.modal').forEach(m => m.style.display = 'none');
            if(el) {
                document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
                el.classList.add('active');
            }
        }

        function buy(n) {
            let i = n - 1;
            if (balance >= costs[i]) {
                balance -= costs[i];
                if (n === 1) tapPower += 2; else income += 10;
                costs[i] *= 3; updateUI();
            }
        }

        function buySkin(id, price, color) {
            const btn = document.getElementById('s' + id);
            if (ownedSkins.includes(id)) {
                document.getElementById('main-btn').style.borderColor = color;
                alert("Скин надет!");
                return;
            }
            if (balance >= price) {
                balance -= price;
                ownedSkins.push(id);
                btn.innerText = "USE";
                btn.classList.add('owned');
                updateUI();
            }
        }

        setInterval(() => { balance += income; updateUI(); }, 1000);
    </script>
</body>
</html>
