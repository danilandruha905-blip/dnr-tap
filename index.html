<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Donald Combat</title>
    <style>
        :root { --gold: #ffd700; --bg: #001a33; }
        body { 
            background: radial-gradient(circle, #003366 0%, #000 100%); 
            color: white; font-family: sans-serif; margin: 0; 
            display: flex; flex-direction: column; align-items: center; 
            height: 100vh; overflow: hidden; user-select: none;
        }
        #header { width: 100%; padding: 20px; text-align: center; background: rgba(0,0,0,0.8); border-bottom: 2px solid var(--gold); }
        #balance { font-size: 50px; font-weight: bold; color: var(--gold); text-shadow: 0 0 15px gold; }
        
        /* ГЛАВНЫЙ ГЕРОЙ - ТЕПЕРЬ С ГАРАНТИЕЙ */
        #coin-wrapper { margin-top: 50px; position: relative; }
        #donald-btn {
            width: 250px; height: 250px; border-radius: 50%;
            background: #ffd700; 
            border: 8px solid #fff; box-shadow: 0 0 50px var(--gold);
            display: flex; align-items: center; justify-content: center;
            font-size: 150px; cursor: pointer; transition: transform 0.05s;
            -webkit-tap-highlight-color: transparent;
        }
        #donald-btn:active { transform: scale(0.9); }
        #donald-btn::after { content: '🦆'; } /* Дональд через эмодзи - он всегда загрузится! */

        .fly {
            position: absolute; font-size: 40px; pointer-events: none; z-index: 100;
            animation: flyUp 0.7s ease-out forwards;
        }
        @keyframes flyUp {
            0% { opacity: 1; transform: translateY(0); }
            100% { opacity: 0; transform: translateY(-300px) scale(0.5); }
        }

        #energy-box { width: 80%; margin-top: 30px; text-align: center; }
        #bar { width: 100%; height: 15px; background: #222; border-radius: 10px; overflow: hidden; border: 1px solid #555; }
        #fill { width: 100%; height: 100%; background: linear-gradient(90deg, gold, orange); transition: 0.2s; }

        #shop-ui { 
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: #000; z-index: 200; padding: 20px; box-sizing: border-box;
        }
        .btn-buy { background: var(--gold); color: #000; padding: 15px; border-radius: 10px; font-weight: bold; margin-top: 20px; text-align: center; }
        
        #footer { position: fixed; bottom: 0; width: 100%; background: #000; padding: 15px 0; display: flex; justify-content: space-around; border-top: 2px solid var(--gold); }
    </style>
</head>
<body>
    <div id="header">
        <div style="font-size: 14px; color: #aaa;">ПРИБЫЛЬ: +<span id="ps">0</span>/сек</div>
        <div id="balance">💰 <span id="val">0</span></div>
    </div>

    <div id="coin-wrapper">
        <div id="donald-btn"></div>
    </div>

    <div id="energy-box">
        <div style="margin-bottom:5px;">⚡ <span id="e">1000</span> / 1000</div>
        <div id="bar"><div id="fill"></div></div>
    </div>

    <div id="footer">
        <div onclick="closeShop()">🏠 Биржа</div>
        <div onclick="openShop()">🚀 Майнинг</div>
    </div>

    <div id="shop-ui">
        <h1 style="color:var(--gold)">МАГАЗИН</h1>
        <div class="btn-buy" onclick="buy(100, 1)">УЛУЧШИТЬ ТАП (+1) - 100 💰</div>
        <div class="btn-buy" onclick="buy(500, 'p')">АВТО-ДОХОД (+5) - 500 💰</div>
        <div class="btn-buy" onclick="closeShop()" style="background:#555; color:#fff">НАЗАД</div>
    </div>

    <script>
        let s = 0, e = 1000, p = 1, ps = 0;
        const val = document.getElementById('val'), en = document.getElementById('e'), fill = document.getElementById('fill');

        document.getElementById('donald-btn').addEventListener('pointerdown', (ev) => {
            if (e < p) return;
            s += p; e -= p; update();
            const f = document.createElement('div');
            f.className = 'fly'; f.style.left = ev.clientX + 'px'; f.style.top = ev.clientY + 'px';
            f.innerText = '🦆'; document.body.appendChild(f);
            setTimeout(() => f.remove(), 700);
        });

        function openShop() { document.getElementById('shop-ui').style.display = 'block'; }
        function closeShop() { document.getElementById('shop-ui').style.display = 'none'; }
        
        function buy(cost, type) {
            if (s >= cost) {
                s -= cost;
                if (type === 'p') ps += 5; else p += 1;
                update(); closeShop();
            } else alert('Мало денег!');
        }

        function update() {
            val.innerText = Math.floor(s);
            en.innerText = e;
            fill.style.width = (e/10) + '%';
            document.getElementById('ps').innerText = ps;
        }

        setInterval(() => {
            s += ps; if (e < 1000) e = Math.min(1000, e + 2);
            update();
        }, 1000);
    </script>
</body>
</html>
