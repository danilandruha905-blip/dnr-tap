<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Donald Gold Empire</title>
    <style>
        :root { 
            --gold: #FFD700; 
            --neon: #00f2ff;
            --bg-dark: #020a12;
        }
        body { 
            background: var(--bg-dark); color: white; 
            font-family: -apple-system, BlinkMacSystemFont, sans-serif; 
            margin: 0; height: 100vh; overflow: hidden; 
            display: flex; flex-direction: column;
        }

        /* ЖИВОЙ КОСМИЧЕСКИЙ ФОН */
        #money-canvas { 
            position: fixed; inset: 0; z-index: -1; 
            background: radial-gradient(circle at 50% 50%, #0a1f35 0%, #020a12 100%);
        }

        header { padding: 50px 0 10px; text-align: center; z-index: 10; pointer-events: none; }
        #balance { 
            font-size: 75px; font-weight: 900; color: var(--gold); 
            text-shadow: 0 0 50px rgba(255,215,0,0.6);
        }
        .profit-text { font-size: 14px; opacity: 0.7; letter-spacing: 2px; font-weight: bold; }

        /* ГЕРОЙ И ПРЫЖКИ */
        #game-area {
            position: relative; flex: 1; display: flex; align-items: center; justify-content: center;
            cursor: pointer;
        }
        
        #ground {
            position: absolute; bottom: -5vh; width: 140%; height: 28vh;
            background: radial-gradient(ellipse at top, #1b4d3e 0%, #051a14 70%);
            border-top: 3px solid var(--neon);
            border-radius: 50% 50% 0 0;
            box-shadow: 0 -15px 60px rgba(0, 242, 255, 0.2);
        }

        #donald-container {
            position: relative; z-index: 5;
            transition: transform 0.1s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        #donald {
            width: 270px; height: 270px;
            filter: drop-shadow(0 0 30px rgba(0,0,0,0.8));
            transition: all 0.3s ease;
        }

        .jump { transform: translateY(-60px) scale(1.1); }

        /* КЛИК-ЭФФЕКТ */
        .tap-effect {
            position: absolute; pointer-events: none; font-size: 45px; font-weight: 900;
            color: white; text-shadow: 0 0 20px var(--gold);
            animation: flyUp 0.7s ease-out forwards; z-index: 100;
        }
        @keyframes flyUp {
            0% { transform: translateY(0) scale(1); opacity: 1; }
            100% { transform: translateY(-250px) scale(1.5); opacity: 0; }
        }

        /* МЕНЮ GLASSMORPHISM */
        nav {
            position: fixed; bottom: 30px; left: 5%; width: 90%; height: 80px;
            background: rgba(255,255,255,0.05); backdrop-filter: blur(20px);
            border-radius: 30px; border: 1px solid rgba(255,255,255,0.1);
            display: flex; justify-content: space-around; align-items: center; z-index: 1000;
        }
        .nav-btn { text-align: center; opacity: 0.5; transition: 0.3s; flex: 1; color: white; text-decoration: none; font-size: 13px; }
        .nav-btn.active { opacity: 1; color: var(--neon); transform: translateY(-5px); text-shadow: 0 0 10px var(--neon); }

        .modal {
            display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.96);
            z-index: 2000; padding: 40px 20px; animation: fadeIn 0.3s;
        }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .item-card {
            background: rgba(255,255,255,0.06); border-radius: 20px; padding: 20px;
            margin-bottom: 15px; display: flex; align-items: center; gap: 20px;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .buy-btn { background: var(--gold); border: none; padding: 15px 20px; border-radius: 15px; font-weight: 900; }
    </style>
</head>
<body>

    <canvas id="money-canvas"></canvas>

    <header>
        <div id="balance">💰 <span id="val">0</span></div>
        <div class="profit-text">PROFIT: +<span id="ps">0</span>/SEC</div>
    </header>

    <div id="game-area" onmousedown="handleTap(event)" ontouchstart="handleTap(event)">
        <div id="ground"></div>
        <div id="donald-container">
            <img id="donald" src="https://www.pngarts.com/files/3/Donald-Duck-PNG-Transparent-Image.png">
        </div>
    </div>

    <nav>
        <div class="nav-btn active" onclick="toggleMod('none', this)">🏡<br>Farm</div>
        <div class="nav-btn" onclick="toggleMod('shop', this)">⚡<br>Upgrades</div>
        <div class="nav-btn" onclick="toggleMod('skins', this)">🎨<br>Skins</div>
    </nav>

    <div id="shop" class="modal">
        <h1 style="text-align:center; color:var(--gold);">FARM MARKET</h1>
        <div class="item-card">
            <div><b>Golden Corn</b><br><small>+5 per tap</small></div>
            <button class="buy-btn" onclick="upgrade(1)">Cost: <span id="c1">100</span></button>
        </div>
        <div class="item-card">
            <div><b>Auto Tractor</b><br><small>+15 per sec</small></div>
            <button class="buy-btn" onclick="upgrade(2)">Cost: <span id="c2">500</span></button>
        </div>
        <button onclick="toggleMod('none')" style="width:100%; padding:20px; background:none; color:white; border:none; font-weight:bold;">BACK</button>
    </div>

    <div id="skins" class="modal">
        <h1 style="text-align:center; color:var(--gold);">WARDROBE</h1>
        <div id="skin-list"></div>
        <button onclick="toggleMod('none')" style="width:100%; padding:20px; background:none; color:white; border:none; font-weight:bold;">CLOSE</button>
    </div>

    <script>
        let score = 0, income = 0, tapPower = 1, tapCount = 0, costs = [100, 500];

        // АНИМАЦИЯ ФОНА (ЧАСТИЦЫ)
        const canvas = document.getElementById('money-canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;
        let particles = Array.from({length: 40}, () => ({
            x: Math.random() * canvas.width, 
            y: Math.random() * canvas.height, 
            s: Math.random() * 2 + 1,
            speed: Math.random() * 0.4 + 0.1
        }));

        function draw() {
            ctx.clearRect(0,0,canvas.width,canvas.height);
            particles.forEach(p => {
                ctx.globalAlpha = 0.3;
                ctx.font = "20px serif";
                ctx.fillText("💰", p.x, p.y);
                p.y -= p.speed; // Монетки плывут вверх к счетчику
                if(p.y < -20) p.y = canvas.height + 20;
            });
            requestAnimationFrame(draw);
        }
        draw();

        function handleTap(e) {
            if(e.type === 'mousedown' && 'ontouchstart' in window) return;
            score += tapPower; tapCount++; updateUI();

            const container = document.getElementById('donald-container');
            const img = document.getElementById('donald');

            // ПРЫЖОК
            container.classList.remove('jump');
            void container.offsetWidth;
            container.classList.add('jump');

            // СМЕНА ПОЗЫ КАЖДЫЕ 10 КЛИКОВ
            if(tapCount % 10 === 0) {
                const poses = ['scaleX(1)', 'scaleX(-1)', 'rotate(10deg)', 'rotate(-10deg)'];
                img.style.transform = poses[Math.floor(Math.random() * poses.length)];
            }

            const touch = e.touches ? e.touches[0] : e;
            const div = document.createElement('div');
            div.className = 'tap-effect'; div.innerText = '+$' + tapPower;
            div.style.left = touch.clientX + 'px'; div.style.top = touch.clientY + 'px';
            document.body.appendChild(div);
            setTimeout(() => div.remove(), 700);
        }

        function updateUI() {
            document.getElementById('val').innerText = Math.floor(score);
            document.getElementById('ps').innerText = income;
            document.getElementById('c1').innerText = costs[0];
            document.getElementById('c2').innerText = costs[1];
        }

        function upgrade(n) {
            let i = n-1;
            if(score >= costs[i]) {
                score -= costs[i];
                if(n===1) tapPower += 5; else income += 15;
                costs[i] = Math.round(costs[i] * 2.8); updateUI();
            }
        }

        function toggleMod(id, el) {
            document.querySelectorAll('.modal').forEach(m => m.style.display = 'none');
            if(id !== 'none') document.getElementById(id).style.display = 'block';
            if(el) {
                document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
                el.classList.add('active');
            }
        }

        setInterval(() => { score += income; updateUI(); }, 1000);
    </script>
</body>
</html>
