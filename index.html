<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Donald Elite Combat</title>
    <style>
        :root { 
            --gold: #ffd700; 
            --neon-blue: #00f2ff; 
            --neon-green: #39ff14;
            --premium-bg: radial-gradient(circle at center, #001a33 0%, #000 100%);
        }
        body { 
            background: #000; color: white; font-family: 'Arial Rounded MT Bold', 'Helvetica', sans-serif; 
            margin: 0; display: flex; flex-direction: column; align-items: center; 
            height: 100vh; overflow: hidden; user-select: none;
        }

        #gold-rain { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; pointer-events: none; }
        body::before {
            content: ''; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--premium-bg); z-index: -2;
        }

        /* Баланс */
        #header { width: 100%; padding: 25px 0; text-align: center; z-index: 10; }
        #balance { 
            font-size: 58px; font-weight: 900; color: var(--gold); 
            text-shadow: 0 0 25px rgba(255, 215, 0, 0.6); display: flex; align-items: center; justify-content: center; gap: 12px;
        }
        #balance img { width: 50px; }

        /* ГЛАВНЫЙ ГЕРОЙ - ДОНАЛЬД */
        #donald-btn {
            width: 280px; height: 280px; border-radius: 50%;
            background: url('https://img.icons8.com/color/480/donald-duck.png') center/85% no-repeat,
                        radial-gradient(circle, #ffcc00 0%, #ff8800 100%);
            border: 6px solid #fff; box-shadow: 0 0 60px rgba(255, 200, 0, 0.5);
            margin-top: 20px; cursor: pointer; transition: transform 0.05s; z-index: 5;
            position: relative;
        }
        #donald-btn:active { transform: scale(0.94); }

        /* Энергия */
        #energy-box { width: 85%; margin-top: 40px; text-align: center; }
        #bar { width: 100%; height: 12px; background: rgba(255,255,255,0.1); border-radius: 20px; border: 1px solid var(--gold); overflow: hidden; }
        #fill { width: 100%; height: 100%; background: linear-gradient(90deg, var(--gold), #ff5500); transition: 0.3s; }

        /* НИЖНЕЕ МЕНЮ - 3D ИКОНКИ */
        #footer { 
            position: fixed; bottom: 20px; width: 92%; 
            background: rgba(255, 255, 255, 0.07); backdrop-filter: blur(25px); 
            border: 1px solid rgba(255, 215, 0, 0.3); border-radius: 24px; 
            padding: 12px 0; display: flex; justify-content: space-around; z-index: 100;
        }
        .nav-item { text-align: center; color: #888; font-size: 11px; flex: 1; transition: 0.3s; }
        .nav-item img { width: 36px; height: 36px; display: block; margin: 0 auto 4px; }
        .nav-item.active { color: var(--gold); transform: translateY(-5px); text-shadow: 0 0 10px gold; }

        /* ОКНА (МОДАЛКИ) - ПЛАВНО И СТИЛЬНО */
        .modal { 
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,5,0.9); backdrop-filter: blur(15px); z-index: 1000; padding: 20px; box-sizing: border-box;
            animation: modalIn 0.4s cubic-bezier(0.18, 0.89, 0.32, 1.28); 
        }
        @keyframes modalIn {
            from { opacity: 0; transform: scale(0.9); }
            to { opacity: 1; transform: scale(1); }
        }

        .modal h1 { color: var(--gold); text-align: center; font-size: 32px; margin-bottom: 30px; text-shadow: 0 0 15px gold; }

        .card { 
            background: linear-gradient(135deg, rgba(255,255,255,0.05) 0%, rgba(255,255,255,0.01) 100%);
            border: 1px solid rgba(255,215,0,0.3); border-radius: 20px; padding: 20px; 
            margin-bottom: 15px; display: flex; justify-content: space-between; align-items: center;
        }
        .card b { font-size: 20px; color: #fff; }
        .card span { color: var(--gold); font-size: 14px; display: block; margin-top: 4px; }

        .btn-buy { 
            background: linear-gradient(to bottom, #ffd700, #ffaa00); color: #000; border: none; 
            padding: 12px 20px; border-radius: 12px; font-weight: 900; box-shadow: 0 4px 10px rgba(255,215,0,0.2);
        }

        .close-btn { 
            width: 100%; padding: 18px; border-radius: 15px; border: 1px solid #444; 
            background: none; color: #888; margin-top: 10px; font-weight: bold;
        }

        /* Анимация монет при тапе */
        .tap-anim {
            position: absolute; color: var(--gold); font-size: 24px; font-weight: 900;
            pointer-events: none; animation: tapFly 0.6s ease-out forwards; z-index: 1000;
        }
        @keyframes tapFly {
            0% { opacity: 1; transform: translateY(0); }
            100% { opacity: 0; transform: translateY(-100px); }
        }
    </style>
</head>
<body>
    <canvas id="gold-rain"></canvas>
    
    <div id="header">
        <div id="balance"><img src="https://img.icons8.com/emoji/96/money-bag-emoji.png"><span id="val">0</span></div>
        <div style="color: #666; font-size: 14px; margin-top: 5px;">PROFIT: +<span id="ps">0</span>/sec</div>
    </div>

    <div id="donald-btn"></div>

    <div id="energy-box">
        <div style="margin-bottom: 10px;">⚡ <span id="e">1000</span> / 1000</div>
        <div id="bar"><div id="fill"></div></div>
    </div>

    <div id="footer">
        <div class="nav-item active" onclick="closeModals(this)">
            <img src="https://img.icons8.com/fluency/96/home.png">Home
        </div>
        <div class="nav-item" onclick="openModal('shop', this)">
            <img src="https://img.icons8.com/fluency/96/rocket.png">Mining
        </div>
        <div class="nav-item" onclick="openModal('donate', this)">
            <img src="https://img.icons8.com/fluency/96/diamond.png">Stars
        </div>
    </div>

    <div id="shop" class="modal">
        <h1>MINING</h1>
        <div class="card">
            <div><b>Golden Click</b><span>Cost: <span id="c1">100</span></span></div>
            <button class="btn-buy" onclick="buy(1)">UPGRADE</button>
        </div>
        <div class="card">
            <div><b>Auto Farm</b><span>Cost: <span id="c2">500</span></span></div>
            <button class="btn-buy" onclick="buy(2)">UPGRADE</button>
        </div>
        <button class="close-btn" onclick="closeModals()">CLOSE</button>
    </div>

    <div id="donate" class="modal">
        <h1>DONATE</h1>
        <div class="card" style="border-color: var(--neon-blue);">
            <div><b>Starter Pack</b><span>50,000 Coins</span></div>
            <button class="btn-buy" style="background: #0088cc; color: #fff;" onclick="alert('Stars...')">100 ⭐</button>
        </div>
        <div class="card" style="border-color: var(--gold);">
            <div><b>Whale Pack</b><span>1,000,000 Coins</span></div>
            <button class="btn-buy" style="background: #0088cc; color: #fff;" onclick="alert('Stars...')">1000 ⭐</button>
        </div>
        <button class="close-btn" onclick="closeModals()">CLOSE</button>
    </div>

    <script>
        let score = 0, energy = 1000, tap = 1, income = 0, costs = [100, 500];

        // Золотой дождь
        const canvas = document.getElementById('gold-rain');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;
        const particles = [];
        for(let i=0; i<30; i++) particles.push({x: Math.random()*canvas.width, y: Math.random()*canvas.height, s: Math.random()*2+1});

        function drawRain() {
            ctx.clearRect(0,0,canvas.width,canvas.height);
            ctx.fillStyle = "rgba(255, 215, 0, 0.3)";
            particles.forEach(p => {
                ctx.fillText("💰", p.x, p.y);
                p.y += p.s; if(p.y > canvas.height) p.y = -20;
            });
            requestAnimationFrame(drawRain);
        }
        drawRain();

        function updateUI() {
            document.getElementById('val').innerText = Math.floor(score);
            document.getElementById('e').innerText = energy;
            document.getElementById('fill').style.width = (energy/10) + '%';
            document.getElementById('ps').innerText = income;
            document.getElementById('c1').innerText = costs[0];
            document.getElementById('c2').innerText = costs[1];
        }

        document.getElementById('donald-btn').addEventListener('pointerdown', (e) => {
            if (energy < tap) return;
            score += tap; energy -= tap;
            
            let t = document.createElement('div');
            t.className = 'tap-anim';
            t.innerText = '+' + tap;
            t.style.left = e.clientX + 'px'; t.style.top = e.clientY + 'px';
            document.body.appendChild(t);
            setTimeout(() => t.remove(), 600);
            updateUI();
        });

        function openModal(id, el) {
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            el.classList.add('active');
            document.getElementById(id).style.display = 'block';
        }
        function closeModals(el) {
            document.querySelectorAll('.modal').forEach(m => m.style.display = 'none');
            if(el) {
                document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
                el.classList.add('active');
            }
        }

        function buy(id) {
            let i = id - 1;
            if (score >= costs[i]) {
                score -= costs[i];
                if(id===1) tap += 2; else income += 10;
                costs[i] = Math.floor(costs[i] * 2.5);
                updateUI();
            }
        }

        setInterval(() => { score += income; if(energy < 1000) energy = Math.min(1000, energy + 5); updateUI(); }, 1000);
    </script>
</body>
</html>
