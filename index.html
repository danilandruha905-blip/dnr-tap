<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Donald Farm Elite V10</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --gold: #FFD700; --green: #00ff88; --bg: #010805; }
        
        body { 
            margin: 0; padding: 0; color: white; font-family: 'Arial Black', sans-serif;
            height: 100vh; overflow: hidden; display: flex; flex-direction: column;
            background: var(--bg);
        }

        /* ЖИВОЙ ФОН ФЕРМЫ С ПАДАЮЩЕЙ ВВЕРХ КУКУРУЗОЙ */
        #bg {
            position: fixed; inset: 0; z-index: -1;
            background: radial-gradient(circle at 50% 50%, #032013 0%, #010805 100%);
        }

        .farm-particle {
            position: absolute;
            bottom: -50px;
            pointer-events: none;
            user-select: none;
            animation: riseUp linear infinite;
            will-change: transform, opacity;
        }

        @keyframes riseUp {
            0% { transform: translateY(0) rotate(0deg) scale(0.5); opacity: 0; }
            10% { opacity: 0.8; }
            90% { opacity: 0.8; }
            100% { transform: translateY(-110vh) rotate(360deg) scale(1.2); opacity: 0; }
        }

        /* ИНТЕРФЕЙС */
        header { padding: 50px 20px 10px; text-align: center; }
        #balance-card {
            background: rgba(0, 50, 20, 0.2); padding: 20px; border-radius: 30px;
            backdrop-filter: blur(15px); border: 2px solid var(--gold);
            box-shadow: 0 0 40px rgba(0, 255, 100, 0.2);
        }
        #balance { font-size: 55px; color: var(--gold); text-shadow: 2px 2px 0 #000; }
        
        .energy-bg { width: 100%; height: 15px; background: #001a0a; border-radius: 10px; margin-top: 10px; overflow: hidden; border: 1px solid #1a331a; }
        #energy-fill { height: 100%; width: 100%; background: linear-gradient(90deg, #55ff00, var(--gold)); transition: width 0.2s; }

        /* ХАРАКТЕР И ОДЕЖДА (НОВАЯ СИСТЕМА СЛОЕВ) */
        #game-area { flex: 1; display: flex; align-items: center; justify-content: center; position: relative; }
        #char-container { position: relative; width: 300px; height: 300px; transition: transform 0.05s ease; cursor: pointer; }
        .layer { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: contain; pointer-events: none; user-select: none; }
        
        /* Исправление положения одежды */
        #layer-head { z-index: 10; transform: translateY(-35px) scale(0.65); }
        #layer-glasses { z-index: 9; transform: translateY(-28px) scale(0.65); }
        #layer-shirt { z-index: 8; transform: translateY(15px) scale(0.9); }

        .jump { transform: scale(1.1) translateY(-30px); }

        /* КНОПКИ НИЖНЕГО МЕНЮ */
        nav { position: fixed; bottom: 20px; width: 94%; left: 3%; height: 75px; background: rgba(0,20,10,0.85); border-radius: 25px; display: flex; border: 2px solid rgba(255,255,255,0.05); backdrop-filter: blur(15px); z-index: 100; }
        .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; opacity: 0.5; transition: 0.2s; cursor: pointer; color: white; font-size: 11px; font-weight: bold; text-decoration: none; }
        .nav-item.active { opacity: 1; color: var(--gold); transform: translateY(-3px); }

        /* ОКНА */
        .modal { display: none; position: fixed; inset: 0; background: rgba(1,8,5,0.98); z-index: 2000; padding: 40px 20px; overflow-y: auto; backdrop-filter: blur(10px); }
        .item-card { background: rgba(0,50,20,0.2); border-radius: 20px; padding: 18px; margin-bottom: 12px; display: flex; align-items: center; justify-content: space-between; border: 1px solid rgba(255,255,255,0.05); }
        .buy-btn { background: var(--gold); border: none; padding: 12px 20px; border-radius: 12px; font-weight: bold; cursor: pointer; color: black; }
        .buy-btn.active { background: #2ecc71; color: white; }
    </style>
</head>
<body>

<div id="bg"></div>

<header>
    <div id="balance-card">
        <div id="balance">💰 <span id="score">0</span></div>
        <div class="energy-bg"><div id="energy-fill"></div></div>
        <div style="font-size: 14px; margin-top: 5px; opacity: 0.8;">⚡️ <span id="e-val">1000</span>/1000</div>
    </div>
</header>

<div id="game-area" onmousedown="tap(event)" ontouchstart="tap(event)">
    <div id="char-container">
        <img class="layer" src="https://upload.wikimedia.org/wikipedia/en/thumb/b/b4/Donald_Duck.svg/220px-Donald_Duck.svg.png">
        <img id="layer-head" class="layer" src="" style="display: none;">
        <img id="layer-glasses" class="layer" src="" style="display: none;">
        <img id="layer-shirt" class="layer" src="" style="display: none;">
    </div>
</div>

<nav>
    <div class="nav-item active" onclick="show('main', this)">🏠<span>Farm</span></div>
    <div class="nav-item" onclick="show('wardrobe', this)">👕<span>Одежда</span></div>
    <div class="nav-item" onclick="show('shop', this)">🚀<span>Empire</span></div>
    <a href="https://t.me/wallet?startapp=transfer-UQAkVfSEE83-fup86oEFV6a7rxgD5DKPfoEfVVDUk8C1WeEQ" target="_blank" class="nav-item">💎<span>Donate</span></a>
</nav>

<div id="wardrobe" class="modal">
    <h2 style="color:var(--gold); text-align:center;">ГАРДЕРОБ ФЕРМЕРА</h2>
    
    <h3 style="color:var(--green)">ГОЛОВНЫЕ УБОРЫ</h3>
    <div id="cat-head"></div>

    <h3 style="color:var(--green)">ОЧКИ</h3>
    <div id="cat-glasses"></div>

    <h3 style="color:var(--green)">КОФТЫ</h3>
    <div id="cat-shirt"></div>

    <button onclick="show('main')" style="width:100%; padding:20px; color:gray; background:none; border:none; font-weight:bold; cursor:pointer;">ЗАКРЫТЬ</button>
</div>

<div id="shop" class="modal">
    <h2 style="color:var(--gold); text-align:center;">ПРОКАЧКА ФЕРМЫ</h2>
    <div class="item-card"><div><b>Mega Tap</b><br><small>+5 к клику</small></div><button class="buy-btn" onclick="upgrade('tap')">💰 <span id="c-tap">100</span></button></div>
    <div class="item-card"><div><b>Авто-Комбайн</b><br><small>+20/сек</small></div><button class="buy-btn" onclick="upgrade('auto')">💰 <span id="c-auto">500</span></button></div>
    <button onclick="show('main')" style="width:100%; padding:20px; color:gray; background:none; border:none; cursor:pointer;">ЗАКРЫТЬ</button>
</div>

<script>
    const tg = window.Telegram.WebApp;
    tg.expand();

    // Загрузка состояния (Используем новую версию ключа v10)
    let g = JSON.parse(localStorage.getItem('donald_v10')) || {
        score: 0, tap: 1, auto: 0, cTap: 100, cAuto: 500, energy: 1000,
        items: [], equipped: { head: null, glasses: null, shirt: null }
    };

    // БАЗА ДАННЫХ ОДЕЖДЫ (ИСПРАВЛЕННЫЕ НАДЕЖНЫЕ ССЫЛКИ)
    const db = {
        head: [
            { id: 'h1', name: "Кепка Фермера", img: "https://upload.wikimedia.org/wikipedia/commons/thumb/c/ca/Cap_icon.svg/120px-Cap_icon.svg.png", price: 1000 },
            { id: 'h2', name: "Шляпа Магната", img: "https://upload.wikimedia.org/wikipedia/commons/thumb/b/b3/Top_hat_icon.svg/120px-Top_hat_icon.svg.png", price: 15000 }
        ],
        glasses: [
            { id: 'g1', name: "Черные очки", img: "https://upload.wikimedia.org/wikipedia/commons/thumb/c/c5/Solar_glasses_icon.svg/120px-Solar_glasses_icon.svg.png", price: 3000 },
            { id: 'g2', name: "Маска V", img: "https://upload.wikimedia.org/wikipedia/commons/thumb/a/a2/Anon-mask.svg/120px-Anon-mask.svg.png", price: 75000 }
        ],
        shirt: [
            { id: 's1', name: "Худи Фермы", img: "https://upload.wikimedia.org/wikipedia/commons/thumb/f/f6/Hoodie_icon.svg/120px-Hoodie_icon.svg.png", price: 10000 },
            { id: 's2', name: "Кофта Rich", img: "https://upload.wikimedia.org/wikipedia/commons/thumb/a/a0/Business_shirt_icon.svg/120px-Business_shirt_icon.svg.png", price: 50000 }
        ]
    };

    function save() { localStorage.setItem('donald_v10', JSON.stringify(g)); }

    function update() {
        document.getElementById('score').innerText = Math.floor(g.score);
        document.getElementById('e-val').innerText = Math.floor(g.energy);
        document.getElementById('energy-fill').style.width = (g.energy / 10) + '%';
        document.getElementById('c-tap').innerText = g.cTap;
        document.getElementById('c-auto').innerText = g.cAuto;
        
        // Обновляем отображение надетой одежды
        ['head', 'glasses', 'shirt'].forEach(cat => {
            const el = document.getElementById('layer-' + cat);
            if (g.equipped[cat]) {
                const item = db[cat].find(i => i.id === g.equipped[cat]);
                el.src = item.img;
                el.style.display = 'block';
            } else {
                el.style.display = 'none';
            }
        });
        renderWardrobe();
        save();
    }

    function tap(e) {
        if (g.energy < 1) { tg.HapticFeedback.notificationOccurred('warning'); return; }
        if (e.type === 'touchstart') e.preventDefault();
        
        g.score += g.tap; g.energy -= 1;
        tg.HapticFeedback.impactOccurred('heavy');

        // Анимация прыжка
        const cont = document.getElementById('char-container');
        cont.classList.remove('jump'); void cont.offsetWidth; cont.classList.add('jump');

        // Эффект +1
        const x = e.clientX || e.touches[0].clientX;
        const y = e.clientY || e.touches[0].clientY;
        const pop = document.createElement('div');
        pop.style.cssText = `position:fixed; left:${x}px; top:${y}px; color:gold; font-weight:bold; font-size:24px; pointer-events:none; z-index:1000; animation: riseUp 0.6s forwards;`;
        pop.innerText = '+' + g.tap;
        document.body.appendChild(pop);
        setTimeout(() => pop.remove(), 600);
        update();
    }

    function upgrade(type) {
        if (type === 'tap' && g.score >= g.cTap) { g.score -= g.cTap; g.tap += 5; g.cTap *= 3; }
        if (type === 'auto' && g.score >= g.cAuto) { g.score -= g.cAuto; g.auto += 20; g.cAuto *= 3; }
        update();
    }

    function renderWardrobe() {
        ['head', 'glasses', 'shirt'].forEach(cat => {
            const div = document.getElementById('cat-' + cat);
            div.innerHTML = '';
            db[cat].forEach(item => {
                const isBought = g.items.includes(item.id);
                const isWearing = g.equipped[cat] === item.id;
                div.innerHTML += `
                    <div class="item-card">
                        <div><b>${item.name}</b><br><small>${isBought ? 'В наличии' : 'Цена: '+item.price}</small></div>
                        <button class="buy-btn ${isWearing ? 'active' : ''}" onclick="manageItem('${cat}', '${item.id}', ${item.price})">
                            ${isWearing ? 'СНЯТЬ' : (isBought ? 'НАДЕТЬ' : 'КУПИТЬ')}
                        </button>
                    </div>`;
            });
        });
    }

    function manageItem(cat, id, price) {
        if (!g.items.includes(id)) { // КУПИТЬ
            if (g.score >= price) { 
                g.score -= price; g.items.push(id); 
                tg.HapticFeedback.notificationOccurred('success');
            } else { tg.HapticFeedback.notificationOccurred('error'); return; }
        }
        // НАДЕТЬ/СНЯТЬ
        g.equipped[cat] = (g.equipped[cat] === id) ? null : id;
        tg.HapticFeedback.impactOccurred('light');
        update();
    }

    function show(id, el) {
        document.querySelectorAll('.modal').forEach(m => m.style.display = 'none');
        if (id !== 'main') document.getElementById(id).style.display = 'block';
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        if (el) el.classList.add('active');
    }

    // АНИМИРОВАННЫЙ ФОН (ПАДАЕТ ВВЕРХ)
    const symbols = ['🌽', '💰', '💎', '🪙'];
    for(let i=0; i<35; i++) {
        setTimeout(() => {
            let p = document.createElement('div');
            p.className = 'farm-particle';
            p.innerText = symbols[Math.floor(Math.random() * symbols.length)];
            p.style.left = Math.random() * 100 + 'vw';
            p.style.fontSize = Math.random() * 20 + 15 + 'px';
            p.style.animationDuration = Math.random() * 3 + 3 + 's';
            p.style.animationDelay = Math.random() * 5 + 's';
            document.getElementById('bg').appendChild(p);
        }, i * 150);
    }

    // Авто-доход и реген энергии
    setInterval(() => {
        g.score += g.auto / 10;
        if (g.energy < 1000) g.energy += 1;
        update();
    }, 100);

    // Первичный рендер
    update();
</script>
</body>
</html>
