<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Donald Golden Empire V24</title>
    <style>
        :root { --gold: #FFD700; --blue: #00F2FF; }
        body { 
            background: #000; color: white; font-family: sans-serif; 
            margin: 0; height: 100vh; overflow: hidden; display: flex; flex-direction: column; align-items: center;
        }
        #bg { position: fixed; inset: 0; z-index: -1; background: radial-gradient(circle, #001a33, #000); }
        #balance { font-size: 60px; font-weight: 900; color: var(--gold); margin-top: 40px; text-shadow: 0 0 20px gold; }
        
        /* НОВЫЙ ДОНАЛЬД (SVG) */
        #btn {
            position: relative; width: 280px; height: 280px; margin-top: 20px;
            cursor: pointer; transition: 0.1s; z-index: 5;
        }
        #btn:active { transform: scale(0.9); }
        
        /* СТИЛЬНЫЙ МАГАЗИН */
        .modal { 
            display: none; position: fixed; inset: 0; z-index: 100;
            background: rgba(0,0,0,0.95); backdrop-filter: blur(20px); padding: 20px;
        }
        .card { 
            background: rgba(255,255,255,0.1); border: 1px solid var(--gold);
            border-radius: 20px; padding: 15px; margin-bottom: 10px;
            display: flex; justify-content: space-between; align-items: center;
        }
        .buy-btn { background: var(--gold); border: none; padding: 10px 20px; border-radius: 10px; font-weight: bold; }

        /* МЕНЮ */
        #menu { 
            position: fixed; bottom: 20px; width: 90%; height: 70px;
            background: rgba(255,255,255,0.1); border-radius: 20px;
            display: flex; justify-content: space-around; align-items: center;
        }
    </style>
</head>
<body>
    <div id="bg"></div>
    <div id="balance">💰 <span id="score">0</span></div>

    <div id="btn" onclick="tap(event)">
        <svg viewBox="0 0 100 100" style="width:100%; height:100%;">
            <circle cx="50" cy="50" r="48" fill="white" stroke="gold" stroke-width="2"/>
            <path d="M20 55 Q50 95 80 55" fill="#ff8800" stroke="black"/>
            <ellipse cx="35" cy="40" rx="5" ry="8" fill="black"/>
            <ellipse cx="65" cy="40" rx="5" ry="8" fill="black"/>
            <path d="M40 15 L60 15 L50 5 Z" fill="blue"/>
        </svg>
    </div>

    <div id="menu">
        <div onclick="openMod('main')">🏠 Главная</div>
        <div onclick="openMod('shop')">🚀 Маг</div>
        <div onclick="openMod('vip')">💎 VIP</div>
    </div>

    <div id="shop" class="modal">
        <h2 style="color:gold; text-align:center;">МАГАЗИН</h2>
        <div class="card">
            <div><b>Супер Клик</b><br><small>Цена: 100</small></div>
            <button class="buy-btn" onclick="alert('Куплено!')">UP</button>
        </div>
        <button onclick="openMod('main')" style="width:100%; color:white; background:none; border:none; margin-top:20px;">ЗАКРЫТЬ</button>
    </div>

    <script>
        let s = 0;
        function tap(e) {
            s++; document.getElementById('score').innerText = s;
            // Частицы
            let p = document.createElement('div');
            p.innerText = "💰"; p.style.position = "absolute";
            p.style.left = e.clientX + 'px'; p.style.top = e.clientY + 'px';
            p.style.fontSize = "30px"; p.style.transition = "0.5s";
            document.body.appendChild(p);
            setTimeout(() => { p.style.transform = "translateY(-100px)"; p.style.opacity = "0"; }, 10);
            setTimeout(() => p.remove(), 500);
        }
        function openMod(id) {
            document.querySelectorAll('.modal').forEach(m => m.style.display = 'none');
            if(id !== 'main') document.getElementById(id).style.display = 'block';
        }
    </script>
</body>
</html>
