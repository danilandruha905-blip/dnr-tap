<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Donald Combat</title>
    <style>
        :root {
            --main-color: #ffd700;
            --bg-color: #001a33;
            --font-family: 'Arial', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            background-image: radial-gradient(circle at center, rgba(0, 51, 102, 0.8) 0%, rgba(0, 0, 0, 1) 100%), 
                              url('https://img.icons8.com/color/96/donald-duck.png');
            background-repeat: repeat;
            background-size: 100px 100px;
            color: white;
            font-family: var(--font-family);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            user-select: none;
        }

        #header {
            width: 100%;
            padding: 30px 20px;
            text-align: center;
            box-sizing: border-box;
            background: rgba(0,0,0,0.5);
            border-bottom: 2px solid var(--main-color);
        }

        #score-container {
            font-size: 52px;
            font-weight: bold;
            color: var(--main-color);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            text-shadow: 0 0 15px rgba(255,215,0,0.7);
        }

        #score-container img {
            width: 50px;
            height: 50px;
        }

        #coin-area {
            flex-grow: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        #coin {
            width: 280px;
            height: 280px;
            border-radius: 50%;
            /* Анимированный Дональд Дак вместо желтой монеты */
            background: url('https://img.icons8.com/color/512/donald-duck.png') center/80% no-repeat,
                        radial-gradient(circle, #ffd700 0%, #b8860b 100%);
            border: 10px solid #fff;
            box-shadow: 0 0 50px rgba(255,215,0,0.8);
            cursor: pointer;
            transition: transform 0.05s ease-in-out;
            -webkit-tap-highlight-color: transparent;
        }

        #coin:active {
            transform: scale(0.95);
        }

        /* Анимация летящего Дональда при тапе */
        .fly-duck {
            position: absolute;
            width: 60px;
            height: 60px;
            background: url('https://img.icons8.com/color/96/donald-duck.png') center/contain no-repeat;
            pointer-events: none;
            z-index: 100;
            animation: flyToScore 0.8s ease-out forwards;
        }

        @keyframes flyToScore {
            0% {
                opacity: 1;
                transform: translateY(0) scale(1) rotate(0deg);
            }
            100% {
                opacity: 0;
                /* Летит вверх к счетчику */
                transform: translateY(-400px) scale(0.3) rotate(360deg);
            }
        }

        #bottom-ui {
            width: 100%;
            padding: 20px;
            background: rgba(0,0,0,0.8);
            border-top: 2px solid var(--main-color);
            box-sizing: border-box;
        }

        #energy-box {
            display: flex;
            align-items: center;
            gap: 10px;
            color: white;
            font-size: 18px;
            margin-bottom: 20px;
        }

        #energy-bar {
            flex-grow: 1;
            height: 12px;
            background-color: #333;
            border-radius: 6px;
            overflow: hidden;
            border: 1px solid #555;
        }

        #energy-fill {
            height: 100%;
            width: 58.4%; /* Твое текущее значение */
            background: linear-gradient(90deg, rgba(255,215,0,1) 0%, rgba(255,165,0,1) 100%);
            transition: width 0.3s ease;
        }

        #nav-menu {
            display: flex;
            justify-content: space-around;
            width: 100%;
        }

        .nav-item {
            text-align: center;
            color: #888;
            font-size: 14px;
            cursor: pointer;
            transition: color 0.2s;
        }

        .nav-item img {
            width: 28px;
            height: 28px;
            display: block;
            margin: 0 auto 5px;
            opacity: 0.6;
        }

        .nav-item.active {
            color: var(--main-color);
        }

        .nav-item.active img {
            opacity: 1;
        }
    </style>
</head>
<body>

    <div id="header">
        <div style="color: #aaa; font-size: 14px; margin-bottom: 5px;">ПРИБЫЛЬ В ЧАС: +0</div>
        <div id="score-container">
            <img src="https://img.icons8.com/emoji/96/money-bag-emoji.png" alt="money">
            <span id="score-val">457</span>
        </div>
    </div>

    <div id="coin-area">
        <div id="coin"></div>
    </div>

    <div id="bottom-ui">
        <div id="energy-box">
            <span>⚡ 584 / 1000</span>
            <div id="energy-bar">
                <div id="energy-fill"></div>
            </div>
        </div>

        <div id="nav-menu">
            <div class="nav-item active">
                <img src="https://img.icons8.com/ios-filled/50/ffffff/home.png" alt="home">
                Биржа
            </div>
            <div class="nav-item">
                <img src="https://img.icons8.com/ios-filled/50/ffffff/rocket.png" alt="mining">
                Майнинг
            </div>
            <div class="nav-item">
                <img src="https://img.icons8.com/ios-filled/50/ffffff/group.png" alt="friends">
                Друзья
            </div>
            <div class="nav-item">
                <img src="https://img.icons8.com/ios-filled/50/ffffff/coins.png" alt="airdrop">
                Airdrop
            </div>
        </div>
    </div>

    <script>
        const coin = document.getElementById('coin');
        const scoreVal = document.getElementById('score-val');
        const coinArea = document.getElementById('coin-area');
        let currentScore = 457;

        // Обработка клика
        coin.addEventListener('click', (event) => {
            // Увеличиваем счет
            currentScore++;
            scoreVal.innerText = currentScore;

            // Создаем летящего Дональда
            createFlyingDuck(event.clientX, event.clientY);
        });

        function createFlyingDuck(x, y) {
            const duck = document.createElement('div');
            duck.className = 'fly-duck';
            
            // Позиционируем утку в месте клика
            duck.style.left = (x - 30) + 'px'; // Центрируем (ширина 60px / 2)
            duck.style.top = (y - 30) + 'px';

            // Добавляем на поле
            coinArea.appendChild(duck);

            // Удаляем элемент после завершения анимации
            setTimeout(() => {
                duck.remove();
            }, 800); // Время анимации
        }
    </script>

</body>
</html>
